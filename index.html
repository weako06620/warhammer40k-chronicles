<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warhammer 40,000 — Chroniques de l'Imperium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05030200;
    --bg0: #080604;
    --bg1: #110d09;
    --bg2: #1a1208;
    --bg3: #241a0c;
    --border: #3a2810;
    --border2: #5a3e18;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --parchment: #d4b896;
    --parchment2: #b89870;
    --crimson: #8b1a1a;
    --crimson2: #b52020;
    --bloodred: #cc2222;
    --steel: #7a8a96;
    --chaos: #6b0f8b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg0);
    color: var(--parchment);
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 18px;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(139,26,26,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(107,15,139,0.08) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='0' width='1' height='1' fill='rgba(255,255,255,0.012)'/%3E%3C/svg%3E");
  }

  /* ─── SCAN LINE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 999;
  }

  #app {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
  }

  /* ─── DECORATIVE BORDER ─── */
  .panel {
    border: 1px solid var(--border);
    background: var(--bg1);
    position: relative;
    padding: 2rem;
  }
  .panel::before, .panel::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--gold);
    border-style: solid;
  }
  .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  .panel .corner-tr, .panel .corner-bl {
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--gold);
    border-style: solid;
  }
  .panel .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .panel .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

  /* ─── HEADER ─── */
  .game-header {
    text-align: center;
    padding: 2.5rem 0 1.5rem;
    position: relative;
  }

  .aquila-symbol {
    font-size: 3rem;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 0.5rem;
    opacity: 0.85;
  }

  .title-main {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-shadow: 0 0 30px rgba(201,168,76,0.3), 0 2px 4px rgba(0,0,0,0.8);
    line-height: 1.2;
  }
  .title-sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.75rem, 2vw, 1rem);
    color: var(--parchment2);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
    color: var(--border2);
    font-size: 0.75rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2), transparent);
  }
  .divider-icon { color: var(--gold); font-size: 1rem; flex-shrink: 0; }

  /* ─── STATS BAR ─── */
  #stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .stat-block {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 0.6rem 0.75rem;
    text-align: center;
    position: relative;
  }
  .stat-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--parchment2);
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--gold);
  }
  .stat-bar-outer {
    width: 100%;
    height: 3px;
    background: var(--bg3);
    margin-top: 4px;
    overflow: hidden;
  }
  .stat-bar-inner {
    height: 100%;
    transition: width 0.6s ease;
  }
  .bar-health  { background: linear-gradient(90deg, #8b1a1a, #cc2222); }
  .bar-res     { background: linear-gradient(90deg, #1a4a8b, #2266cc); }
  .bar-honor   { background: linear-gradient(90deg, #6b5a10, #c9a84c); }

  /* ─── SCENE PANEL ─── */
  #scene-title {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--gold);
    text-align: center;
    margin-bottom: 1.2rem;
    letter-spacing: 0.05em;
  }

  #narrative-box {
    line-height: 1.85;
    font-size: 1.05rem;
    color: var(--parchment);
    min-height: 120px;
    position: relative;
  }
  #narrative-box .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--gold);
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
    margin-left: 2px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ─── CHOICES ─── */
  #choices-area {
    margin-top: 1.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .choice-btn {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--parchment);
    font-family: 'Crimson Text', serif;
    font-size: 1rem;
    padding: 0.85rem 1.2rem;
    cursor: pointer;
    text-align: left;
    position: relative;
    transition: all 0.2s;
    line-height: 1.5;
    overflow: hidden;
  }
  .choice-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--crimson);
    transition: background 0.2s;
  }
  .choice-btn:hover {
    background: var(--bg3);
    border-color: var(--gold);
    color: var(--gold2);
  }
  .choice-btn:hover::before { background: var(--gold); }
  .choice-btn:active { transform: scale(0.99); }
  .choice-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .choice-tag {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-right: 0.5rem;
    color: var(--crimson2);
  }

  /* ─── FACTION SELECTION ─── */
  .faction-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-top: 1rem;
  }
  .faction-card {
    border: 1px solid var(--border);
    background: var(--bg2);
    padding: 1.2rem 1rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .faction-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(201,168,76,0.04);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .faction-card:hover { border-color: var(--gold); transform: translateY(-2px); }
  .faction-card:hover::after { opacity: 1; }
  .faction-icon { font-size: 2.2rem; margin-bottom: 0.5rem; display: block; }
  .faction-name {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.05em;
  }
  .faction-desc {
    font-size: 0.8rem;
    color: var(--parchment2);
    margin-top: 0.4rem;
    line-height: 1.4;
    font-style: italic;
  }
  .faction-stat-line {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: var(--steel);
    letter-spacing: 0.1em;
    margin-top: 0.7rem;
    border-top: 1px solid var(--border);
    padding-top: 0.5rem;
  }

  /* ─── INPUT ─── */
  .name-input-wrap {
    margin-top: 1.5rem;
    display: flex;
    gap: 0.75rem;
    align-items: stretch;
  }
  .name-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--parchment);
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    outline: none;
    letter-spacing: 0.05em;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--gold); }
  .name-input::placeholder { color: var(--border2); }

  .btn-primary {
    background: var(--crimson);
    border: 1px solid var(--crimson2);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.75rem 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary:hover { background: var(--crimson2); border-color: var(--gold); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--parchment2);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 1rem;
  }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

  /* ─── LOADING ─── */
  .loading-wrap {
    text-align: center;
    padding: 2rem;
    color: var(--parchment2);
  }
  .skull-spinner {
    font-size: 2rem;
    animation: pulse-skull 1.5s ease-in-out infinite;
    display: block;
    margin-bottom: 0.75rem;
  }
  @keyframes pulse-skull {
    0%,100% { opacity: 0.4; transform: scale(0.95); }
    50%      { opacity: 1;   transform: scale(1.05); }
  }
  .loading-text {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: flicker 2s ease-in-out infinite;
  }
  @keyframes flicker {
    0%,100%{opacity:1} 50%{opacity:0.6}
  }

  /* ─── ENDING ─── */
  .ending-panel {
    text-align: center;
    padding: 1rem;
  }
  .ending-symbol { font-size: 3rem; margin-bottom: 1rem; display: block; }
  .ending-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.5rem;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  .ending-text {
    font-style: italic;
    line-height: 1.8;
    color: var(--parchment);
    margin-bottom: 1.5rem;
  }

  /* ─── LORE QUOTES ─── */
  .lore-quote {
    font-style: italic;
    color: var(--parchment2);
    font-size: 0.9rem;
    text-align: center;
    border-left: 2px solid var(--crimson);
    padding: 0.5rem 1rem;
    margin: 1.5rem 0;
    line-height: 1.6;
  }

  /* ─── SCENE COUNTER ─── */
  .scene-counter {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--border2);
    text-align: right;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  /* ─── NOTIFICATION ─── */
  .stat-change-notif {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border-radius: 2px;
    margin: 0 3px;
    animation: fadeUp 2s ease forwards;
  }
  .notif-pos { color: #4ccc4c; background: rgba(76,204,76,0.1); }
  .notif-neg { color: #cc4c4c; background: rgba(204,76,76,0.1); }
  @keyframes fadeUp {
    0%   { opacity: 0; transform: translateY(8px); }
    20%  { opacity: 1; transform: translateY(0); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-8px); }
  }

  #notif-area {
    min-height: 28px;
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin: 0.5rem 0;
    align-items: center;
  }

  .intro-lore {
    font-style: italic;
    color: var(--parchment2);
    line-height: 1.9;
    font-size: 1rem;
    margin-bottom: 1.2rem;
  }

  .faction-selected-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--bg3);
    border: 1px solid var(--border2);
    padding: 0.4rem 0.8rem;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
  }

  @media (max-width: 500px) {
    .faction-grid { grid-template-columns: 1fr 1fr; }
    #stats-bar { grid-template-columns: repeat(3, 1fr); gap: 0.4rem; }
    .stat-value { font-size: 0.95rem; }
    .panel { padding: 1.2rem; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header class="game-header">
    <div class="aquila-symbol">☩</div>
    <h1 class="title-main">Warhammer 40,000</h1>
    <p class="title-sub">Chroniques de l'Imperium</p>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content"></main>

</div>

<script>
/* ═══════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════ */
const STATE = {
  phase: 'intro',
  faction: null,
  characterName: '',
  health: 100,
  resources: 100,
  honor: 50,
  scene: 0,
  maxScenes: 6,
  history: [],
  choices: [],
  factionData: null
};

const FACTIONS = [
  {
    id: 'space_marine',
    icon: '⚔️',
    name: 'Space Marine',
    chapter: 'Ultramarines',
    desc: 'Champion des fils de l\'Imperium',
    statLine: 'FORCE · ENDURANCE · HONNEUR',
    statLabel: 'Munitions',
    startHonor: 70,
    color: '#1a4a8b',
    lore: 'Un Astartes de première génération, forgé dans la tradition d\'Ultramar.'
  },
  {
    id: 'inquisitor',
    icon: '👁',
    name: 'Inquisiteur',
    chapter: 'Ordo Hereticus',
    desc: 'Chasseur de démons et d\'hérétiques',
    statLabel: 'Psyker-Énergie',
    statLine: 'RUSE · POUVOIR PSYCHIQUE · AUTORITÉ',
    startHonor: 50,
    color: '#6b0f8b',
    lore: 'Un Inquisiteur de l\'Ordo Hereticus, mandaté pour purifier l\'hérésie.'
  },
  {
    id: 'imperial_guard',
    icon: '🛡',
    name: 'Garde Impérial',
    chapter: '8ème Cadian',
    desc: 'Soldat de l\'Astra Militarum',
    statLabel: 'Ravitaillement',
    statLine: 'COURAGE · NOMBRE · SACRIFICE',
    startHonor: 50,
    color: '#3a5a1a',
    lore: 'Un vétéran Cadien, survivant de vingt campagnes pour l\'Aigle Doré.'
  },
  {
    id: 'tech_priest',
    icon: '⚙️',
    name: 'Prêtre-Technicien',
    chapter: 'Adeptus Mechanicus',
    desc: 'Serviteur du Dieu-Machine',
    statLabel: 'Énergie Mechadendrite',
    statLine: 'LOGIQUE · OMNISSIAH · BIONIQUE',
    startHonor: 40,
    color: '#8b3a1a',
    lore: 'Un Magos de Mars, à la recherche de technologie perdue sur des mondes en ruines.'
  },
  {
    id: 'space_wolves',
    icon: '🐺',
    name: 'Space Wolf',
    chapter: 'Loups du Fenris',
    desc: 'Guerrier barbare de Fenris',
    statLabel: 'Rage Bestiale',
    statLine: 'FÉROCITÉ · HONNEUR-CLAN · INSTINCT',
    startHonor: 60,
    color: '#2a3a5a',
    lore: 'Un Long Fang des Loups du Fenris, portant la marque de Russ.'
  },
  {
    id: 'chaos',
    icon: '🌀',
    name: 'Guerrier du Chaos',
    chapter: 'Légion des Damnés',
    desc: 'Renégat au service des Dieux',
    statLabel: 'Faveur Chaotique',
    statLine: 'CORRUPTION · PUISSANCE · MALICE',
    startHonor: 20,
    color: '#5a0f5a',
    lore: 'Un Astartes renégat, maudit et glorifié par les Dieux du Chaos.'
  }
];

/* ═══════════════════════════════════════════════
   RENDER HELPERS
═══════════════════════════════════════════════ */
function mkPanel(inner) {
  return `<div class="panel"><div class="corner-tr"></div><div class="corner-bl"></div>${inner}</div>`;
}

function mkDivider(icon='✦') {
  return `<div class="divider"><span class="divider-icon">${icon}</span></div>`;
}

function mkStats() {
  const f = STATE.factionData;
  const resLabel = f ? f.statLabel : 'Ressources';
  const hPct = Math.max(0, STATE.health);
  const rPct = Math.max(0, STATE.resources);
  const honor = STATE.honor;
  const honorLabel = honor > 60 ? 'Gloire' : honor > 30 ? 'Honneur' : 'Déchéance';
  return `
  <div id="stats-bar">
    <div class="stat-block">
      <span class="stat-label">Points de Vie</span>
      <span class="stat-value">${hPct}</span>
      <div class="stat-bar-outer"><div class="stat-bar-inner bar-health" style="width:${hPct}%"></div></div>
    </div>
    <div class="stat-block">
      <span class="stat-label">${resLabel}</span>
      <span class="stat-value">${rPct}</span>
      <div class="stat-bar-outer"><div class="stat-bar-inner bar-res" style="width:${rPct}%"></div></div>
    </div>
    <div class="stat-block">
      <span class="stat-label">${honorLabel}</span>
      <span class="stat-value">${honor}</span>
      <div class="stat-bar-outer"><div class="stat-bar-inner bar-honor" style="width:${honor}%"></div></div>
    </div>
  </div>`;
}

function setHTML(html) {
  document.getElementById('main-content').innerHTML = html;
}

/* ═══════════════════════════════════════════════
   PHASES
═══════════════════════════════════════════════ */
function showIntro() {
  STATE.phase = 'intro';
  setHTML(mkPanel(`
    <div class="corner-tr" style="display:none"></div>
    <p class="intro-lore">
      Dans le 41ème millénaire, il n'y a pas de paix parmi les étoiles — seulement un éternel bain de sang et le massacre de millions de guerriers au nom de l'Imperium de l'Humanité.
    </p>
    <div class="lore-quote">
      « Il y a un cent milliards de galaxies dans l'univers. Chacune en contient des milliards de mondes. Et dans chacun de ces mondes, l'Homme souffre. »
    </div>
    <p class="intro-lore">
      Vous êtes l'un des rares élus capables de changer le destin d'un monde. Votre mission vous mènera à l'abîme. Votre foi vous sauvera — ou vous perdra.
    </p>
    ${mkDivider('☩')}
    <p style="text-align:center; font-family:'Cinzel',serif; font-size:0.8rem; letter-spacing:0.2em; color:var(--parchment2)">CHOISISSEZ VOTRE FACTION</p>
    <div class="faction-grid" style="margin-top:1rem">
      ${FACTIONS.map(f => `
        <div class="faction-card" onclick="selectFaction('${f.id}')">
          <span class="faction-icon">${f.icon}</span>
          <div class="faction-name">${f.name}</div>
          <div class="faction-desc">${f.desc}</div>
          <div class="faction-stat-line">${f.statLine}</div>
        </div>
      `).join('')}
    </div>
  `));
}

function selectFaction(id) {
  STATE.faction = id;
  STATE.factionData = FACTIONS.find(f => f.id === id);
  STATE.honor = STATE.factionData.startHonor;
  showNameInput();
}

function showNameInput() {
  const f = STATE.factionData;
  STATE.phase = 'name';
  setHTML(mkPanel(`
    <div style="text-align:center; margin-bottom:1.2rem">
      <div class="faction-selected-badge">${f.icon} ${f.name} — ${f.chapter}</div>
      <p style="font-style:italic; color:var(--parchment2); font-size:0.95rem">${f.lore}</p>
    </div>
    ${mkDivider()}
    <p style="font-family:'Cinzel',serif; font-size:0.9rem; letter-spacing:0.12em; color:var(--parchment2); text-align:center; margin-bottom:0.75rem">
      INSCRIVEZ LE NOM DE VOTRE GUERRIER
    </p>
    <div class="name-input-wrap">
      <input class="name-input" id="name-field" type="text" placeholder="Nom du guerrier..." maxlength="30" autocomplete="off" />
      <button class="btn-primary" onclick="startGame()">⚔ POUR L'EMPEROR</button>
    </div>
    <button class="btn-secondary" onclick="showIntro()" style="display:block; margin:1rem auto 0;">← Changer de Faction</button>
  `));
  setTimeout(() => {
    const inp = document.getElementById('name-field');
    if (inp) {
      inp.focus();
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') startGame(); });
    }
  }, 50);
}

function startGame() {
  const nameField = document.getElementById('name-field');
  const name = (nameField ? nameField.value.trim() : '') || 'Anonyme';
  STATE.characterName = name;
  STATE.scene = 0;
  STATE.history = [];
  STATE.health = 100;
  STATE.resources = 100;
  STATE.honor = STATE.factionData.startHonor;
  STATE.phase = 'game';
  generateScene(null);
}

/* ═══════════════════════════════════════════════
   API CALL
═══════════════════════════════════════════════ */
async function callClaude(userMessage) {
  const f = STATE.factionData;
  const isFirstScene = STATE.scene === 0;
  const isFinalScene = STATE.scene >= STATE.maxScenes - 1;

  const systemPrompt = `Tu es le Maître du Jeu d'une aventure narrative dans l'univers Warhammer 40,000 (WH40K), jouée en français.

LE JOUEUR:
- Faction: ${f.name} (${f.chapter})
- Nom: ${STATE.characterName}
- ${f.lore}
- Points de vie: ${STATE.health}/100
- ${f.statLabel}: ${STATE.resources}/100
- Honneur/Corruption: ${STATE.honor}/100 (0=chaos/honte, 100=gloire impériale)
- Scène actuelle: ${STATE.scene + 1}/${STATE.maxScenes}
- Scène finale: ${isFinalScene}

TON RÔLE:
Génère une aventure épique, grimdark et immersive dans l'esprit WH40K: brutale, désespérée, mais remplie de gloire possible. Utilise la langue des codex: Imperium, Chaos, xenos, psyker, bolter, chaîne-épée, etc.

RÈGLES DE JEUX:
- Chaque scène doit comporter exactement 3 choix tactiques et moraux intéressants
- Les choix doivent avoir des conséquences réelles sur les stats
- Varie les situations: combat, exploration, dilemme moral, diplomatie, horreur cosmique
- ${isFinalScene ? 'C\'est la SCÈNE FINALE : confrontation ultime avec boss final et résolution de la mission' : ''}
- Si les PV tombent à 0 ou moins: le guerrier meurt (type is_death: true)

RÉPONSE FORMAT: Réponds UNIQUEMENT en JSON valide, sans markdown, sans backticks:
{
  "scene_title": "Titre court et évocateur (max 6 mots)",
  "narrative": "Texte narratif (150-250 mots), immersif et dramatique, en français WH40K",
  "choices": [
    {
      "text": "Description du choix (1-2 phrases, commencer par un verbe d'action)",
      "tag": "COMBAT|TACTIQUE|FOI|RUSE|SACRIFICE|HÉRÉSIE|EXPLORATION",
      "health_delta": -20,
      "resource_delta": -10,
      "honor_delta": 10
    },
    { ... },
    { ... }
  ],
  "is_final": ${isFinalScene},
  "is_death": false
}

Les deltas doivent être réalistes: combat (health -5 à -30), sacrifice peut donner +honor, hérésie donne +resource mais -honor. Ne pas mettre tous les deltas à 0.`;

  const messages = [...STATE.history];
  if (userMessage) {
    messages.push({ role: 'user', content: userMessage });
  } else {
    messages.push({
      role: 'user',
      content: `Commence l'aventure avec une scène d'introduction pour ${STATE.characterName}, ${f.name} de ${f.chapter}. Situe l'action dans un contexte de crise: invasion Tyranide, hérésie Chaos, archéologie xenos maudite, ou purge planétaire selon la faction.`
    });
  }

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages
    })
  });

  if (!response.ok) throw new Error(`API error: ${response.status}`);
  const data = await response.json();
  const text = data.content.find(b => b.type === 'text')?.text || '';

  // Update history
  if (userMessage) {
    STATE.history.push({ role: 'user', content: userMessage });
  } else {
    STATE.history.push({ role: 'user', content: messages[messages.length - 1].content });
  }
  STATE.history.push({ role: 'assistant', content: text });

  // Parse JSON
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

/* ═══════════════════════════════════════════════
   SCENE RENDERING
═══════════════════════════════════════════════ */
function showLoading() {
  const msgs = [
    'Consultation des Annales Impériales...',
    'Interrogation de la Bibliotheca...',
    'Transmission de données en cours...',
    'Le Dieu-Machine calcule...',
    'La volonté de l\'Emperor se manifeste...'
  ];
  const msg = msgs[Math.floor(Math.random() * msgs.length)];
  setHTML(mkPanel(`
    ${mkStats()}
    <div class="loading-wrap">
      <span class="skull-spinner">💀</span>
      <span class="loading-text">${msg}</span>
    </div>
  `));
}

async function generateScene(choiceText, deltas) {
  showLoading();

  // Apply stat deltas
  if (deltas) {
    const old = { health: STATE.health, resources: STATE.resources, honor: STATE.honor };
    STATE.health    = Math.min(100, Math.max(0, STATE.health    + (deltas.health_delta    || 0)));
    STATE.resources = Math.min(100, Math.max(0, STATE.resources + (deltas.resource_delta  || 0)));
    STATE.honor     = Math.min(100, Math.max(0, STATE.honor     + (deltas.honor_delta     || 0)));

    // Death check
    if (STATE.health <= 0) {
      renderDeath();
      return;
    }
  }

  STATE.scene++;

  try {
    const sceneData = await callClaude(choiceText);

    if (sceneData.is_death || STATE.health <= 0) {
      renderDeath();
      return;
    }
    if (sceneData.is_final || STATE.scene > STATE.maxScenes) {
      renderEnding(sceneData);
      return;
    }

    renderScene(sceneData, deltas);
  } catch (err) {
    console.error(err);
    setHTML(mkPanel(`
      ${mkStats()}
      <p style="color:var(--bloodred); font-family:'Cinzel',serif; text-align:center; padding: 2rem 0;">
        ⚠ ERREUR DE TRANSMISSION — Les astropathes ont perdu le contact.<br>
        <small style="font-size:0.75rem; color:var(--parchment2)">${err.message}</small>
      </p>
      <div style="text-align:center; margin-top:1rem">
        <button class="btn-secondary" onclick="generateScene(null)">↻ RECONNECTER</button>
      </div>
    `));
  }
}

function renderScene(data, prevDeltas) {
  const sceneCounterText = `MISSION · ACTE ${STATE.scene} / ${STATE.maxScenes}`;
  const choicesHTML = (data.choices || []).map((c, i) => `
    <button class="choice-btn" onclick="pickChoice(${i})">
      <span class="choice-tag">[${c.tag || 'ACTION'}]</span>${c.text}
    </button>
  `).join('');

  // Notification deltas
  let notifHTML = '';
  if (prevDeltas) {
    const parts = [];
    if (prevDeltas.health_delta)   parts.push(`<span class="stat-change-notif ${prevDeltas.health_delta > 0 ? 'notif-pos' : 'notif-neg'}">${prevDeltas.health_delta > 0 ? '+' : ''}${prevDeltas.health_delta} PV</span>`);
    if (prevDeltas.resource_delta) parts.push(`<span class="stat-change-notif ${prevDeltas.resource_delta > 0 ? 'notif-pos' : 'notif-neg'}">${prevDeltas.resource_delta > 0 ? '+' : ''}${prevDeltas.resource_delta} RES</span>`);
    if (prevDeltas.honor_delta)    parts.push(`<span class="stat-change-notif ${prevDeltas.honor_delta > 0 ? 'notif-pos' : 'notif-neg'}">${prevDeltas.honor_delta > 0 ? '+' : ''}${prevDeltas.honor_delta} HON</span>`);
    notifHTML = `<div id="notif-area">${parts.join('')}</div>`;
  } else {
    notifHTML = `<div id="notif-area"></div>`;
  }

  STATE.choices = data.choices || [];

  setHTML(`
    ${mkStats()}
    ${notifHTML}
    ${mkPanel(`
      <div class="scene-counter">${sceneCounterText} &mdash; ${STATE.characterName} · ${STATE.factionData.name}</div>
      <div id="scene-title">${data.scene_title || 'Scène'}</div>
      ${mkDivider('✦')}
      <div id="narrative-box"><span id="narrative-text"></span><span class="typing-cursor"></span></div>
      <div id="choices-area" style="opacity:0; pointer-events:none">${choicesHTML}</div>
    `)}
  `);

  typeText(data.narrative || '', () => {
    document.querySelector('.typing-cursor')?.remove();
    const ca = document.getElementById('choices-area');
    if (ca) { ca.style.opacity = '1'; ca.style.pointerEvents = ''; }
  });
}

function pickChoice(idx) {
  const choice = STATE.choices[idx];
  if (!choice) return;

  // Disable all buttons
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

  generateScene(
    `J'ai choisi: "${choice.text}". Continue l'histoire en tenant compte de cette décision et de ses conséquences narratives.`,
    {
      health_delta:   choice.health_delta   || 0,
      resource_delta: choice.resource_delta || 0,
      honor_delta:    choice.honor_delta    || 0
    }
  );
}

function typeText(text, onDone, speed = 18) {
  const el = document.getElementById('narrative-text');
  if (!el) { onDone && onDone(); return; }
  let i = 0;
  el.textContent = '';
  const iv = setInterval(() => {
    if (i < text.length) {
      el.textContent += text[i++];
    } else {
      clearInterval(iv);
      onDone && onDone();
    }
  }, speed);
}

/* ═══════════════════════════════════════════════
   ENDINGS
═══════════════════════════════════════════════ */
function renderEnding(data) {
  const honor = STATE.honor;
  let endingType, symbol, title, epilogue;

  if (honor >= 70) {
    endingType = 'gloire';
    symbol = '☩';
    title = 'Gloire Éternelle pour l\'Emperor';
    epilogue = `${STATE.characterName} entre dans la légende de l'Imperium. Ses exploits seront gravés dans les Annales de la guerre, chanté par des milliers de bardes dans des milliers de mondes. L'Emperor lui-même reconnaîtrait sa valeur.`;
  } else if (honor >= 40) {
    endingType = 'honneur';
    symbol = '⚔️';
    title = 'Devoir Accompli';
    epilogue = `La mission est terminée. ${STATE.characterName} a servi l'Imperium avec honneur, ni saint ni démon — simplement un soldat dans un univers impitoyable. L'Emperor approuve.`;
  } else if (honor >= 20) {
    endingType = 'chute';
    symbol = '💀';
    title = 'Le Prix de la Survie';
    epilogue = `${STATE.characterName} a survécu, mais à quel prix ? Les choix faits dans l'ombre pèsent lourd. Les Inquisiteurs murmureront. La corruption flétrit l'âme. L'Emperor voit tout.`;
  } else {
    endingType = 'heresy';
    symbol = '🌀';
    title = 'L\'Hérésie Consumée';
    epilogue = `L'âme de ${STATE.characterName} appartient désormais aux Dieux du Chaos. Ce qui était autrefois un guerrier de l'Imperium est maintenant un outil du Chaos Éternel. Les Dieux rient.`;
  }

  const narrativeText = data?.narrative || epilogue;

  setHTML(`
    ${mkStats()}
    ${mkPanel(`
      <div class="ending-panel">
        <span class="ending-symbol">${symbol}</span>
        <div class="ending-title">${title}</div>
        ${mkDivider()}
        <div class="ending-text">${narrativeText}</div>
        <p style="font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.2em; color:var(--parchment2); margin-bottom:1.5rem">
          SCORE D'HONNEUR FINAL: ${honor}/100
        </p>
        <button class="btn-primary" onclick="restartGame()" style="margin:0 auto; display:block">
          ↻ NOUVELLE PARTIE
        </button>
        <button class="btn-secondary" onclick="showIntro()" style="display:block; margin:0.75rem auto 0">
          ← Changer de Faction
        </button>
      </div>
    `)}
  `);
}

function renderDeath() {
  setHTML(`
    ${mkPanel(`
      <div class="ending-panel">
        <span class="ending-symbol" style="color:var(--bloodred)">💀</span>
        <div class="ending-title" style="color:var(--bloodred)">Mort Pour l'Emperor</div>
        ${mkDivider()}
        <p class="ending-text">
          ${STATE.characterName} est tombé au combat. Le corps revient à la poussière,
          mais l'âme rejoindra peut-être les légions éternelles de l'Emperor — si elle
          était assez pure. L'Imperium pleure ses martyrs, et l'Imperium avance.
        </p>
        <div class="lore-quote" style="margin-bottom:1.5rem">
          « Pour mourir dans la gloire de l'Emperor est le plus grand honneur qui soit. »
        </div>
        <button class="btn-primary" onclick="startGame()" style="margin:0 auto; display:block">
          ↻ RECOMMENCER
        </button>
        <button class="btn-secondary" onclick="showIntro()" style="display:block; margin:0.75rem auto 0">
          ← Changer de Faction
        </button>
      </div>
    `)}
  `);
}

function restartGame() {
  STATE.history = [];
  STATE.scene = 0;
  startGame();
}

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
showIntro();
</script>
</body>
</html>
