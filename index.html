<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Warhammer 40,000 — Chroniques de l'Imperium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#080604;--bg1:#110d09;--bg2:#1a1208;--bg3:#241a0c;
  --bd:#3a2810;--bd2:#5a3e18;--bd3:#7a5a28;
  --gold:#c9a84c;--gold2:#e8c96a;
  --parch:#d4b896;--parch2:#b89870;--parch3:#9a7850;
  --crim:#8b1a1a;--crim2:#b52020;--blood:#cc2222;
  --steel:#7a8a96;--grn:#4caa4c;
}
body{background:var(--bg0);color:var(--parch);font-family:'Crimson Text',Georgia,serif;
  font-size:clamp(15px,2.4vw,18px);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse at 15% 0%,rgba(139,26,26,.16) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 100%,rgba(107,15,139,.10) 0%,transparent 55%)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
#app{max-width:840px;margin:0 auto;padding:1.2rem 1rem 5rem}
.hdr{text-align:center;padding:1.8rem 0 .8rem}
.aquila{font-size:clamp(2rem,6vw,3rem);color:var(--gold);display:block;margin-bottom:.3rem;text-shadow:0 0 30px rgba(201,168,76,.5)}
.t-main{font-family:'Cinzel Decorative',serif;font-size:clamp(1.2rem,4.5vw,2.2rem);font-weight:700;color:var(--gold);letter-spacing:.06em;text-shadow:0 0 40px rgba(201,168,76,.4),0 2px 8px rgba(0,0,0,.95);line-height:1.2}
.t-sub{font-family:'Cinzel',serif;font-size:clamp(.55rem,2vw,.78rem);color:var(--parch2);letter-spacing:.28em;text-transform:uppercase;margin-top:.35rem}
.panel{border:1px solid var(--bd);background:var(--bg1);position:relative;padding:clamp(.85rem,3.5vw,1.7rem)}
.c1,.c2,.c3,.c4{position:absolute;width:14px;height:14px;border-color:var(--gold);border-style:solid}
.c1{top:-1px;left:-1px;border-width:2px 0 0 2px}.c2{top:-1px;right:-1px;border-width:2px 2px 0 0}
.c3{bottom:-1px;left:-1px;border-width:0 0 2px 2px}.c4{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.div{display:flex;align-items:center;gap:.7rem;margin:.9rem 0;color:var(--bd2)}
.div::before,.div::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--bd2),transparent)}
.div span{color:var(--gold);font-size:.85rem;flex-shrink:0}
#sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin-bottom:.6rem}
@media(max-width:400px){#sbar{grid-template-columns:repeat(2,1fr)}}
.sb{background:var(--bg2);border:1px solid var(--bd);padding:.45rem .5rem;text-align:center}
.sl{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.13em;color:var(--parch2);text-transform:uppercase;display:block;margin-bottom:2px;line-height:1.2}
.sv{font-family:'Cinzel',serif;font-size:clamp(.82rem,2.4vw,.98rem);font-weight:600;color:var(--gold)}
.sbo{width:100%;height:2px;background:var(--bg3);margin-top:3px;overflow:hidden}
.sbi{height:100%;transition:width .6s ease}
.bh{background:linear-gradient(90deg,#6b1010,#cc2222)}.br{background:linear-gradient(90deg,#10386b,#2266cc)}
.bn{background:linear-gradient(90deg,#5a4a0a,#c9a84c)}.bi{background:linear-gradient(90deg,#1a5a1a,#3ab03a)}
#topbar{display:flex;align-items:center;gap:.4rem;margin-bottom:.65rem;flex-wrap:wrap}
.tbarbtn{background:var(--bg3);border:1px solid var(--bd2);color:var(--parch2);font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .65rem;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.tbarbtn:hover{border-color:var(--gold);color:var(--gold)}
.tbarbtn.fiche{border-color:var(--bd3);color:var(--gold2)}.tbarbtn.fiche:hover{background:rgba(201,168,76,.1)}
#savemsg2{font-family:'Cinzel',serif;font-size:.5rem;color:var(--parch3);flex:1;text-align:right;letter-spacing:.06em}
#inv-bar{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.65rem;min-height:20px}
.ibadge{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.06em;padding:2px 7px;border:1px solid var(--bd3);background:var(--bg3);color:var(--gold2);display:inline-flex;align-items:center;gap:3px}
.ibadge.eq{border-color:var(--gold);background:rgba(201,168,76,.07)}
50%{transform:scaleY(1)}}.chmark{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;color:var(--bd2);text-transform:uppercase;text-align:right;margin-bottom:.4rem}
#stitle{font-family:'Cinzel',serif;font-size:clamp(.92rem,3vw,1.18rem);font-weight:600;color:var(--gold);text-align:center;margin-bottom:.8rem;letter-spacing:.04em;line-height:1.3}
.pgnum{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.14em;color:var(--parch3);text-align:center;margin:.5rem 0}
.stag{display:inline-block;font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.15em;text-transform:uppercase;padding:3px 8px;margin-bottom:.7rem;border:1px solid}
.t-exp{color:#6ab0d4;border-color:#2a5a7a;background:rgba(42,90,122,.08)}
.t-com{color:var(--blood);border-color:var(--crim);background:rgba(139,26,26,.08)}
.t-che{color:#c8940a;border-color:#8a6000;background:rgba(200,148,10,.08)}
.t-lor{color:#8090d4;border-color:#3a4a8b;background:rgba(58,74,139,.08)}
.t-npc{color:#6ab08a;border-color:#1a6b3a;background:rgba(26,107,58,.08)}
.t-tra{color:#d46a6a;border-color:#882222;background:rgba(136,34,34,.08)}
.t-eve{color:var(--gold2);border-color:var(--bd3);background:rgba(201,168,76,.06)}
#nbox{line-height:1.95;font-size:clamp(.9rem,2.3vw,1.01rem);color:var(--parch);min-height:80px}
#nbox p{margin-bottom:.65rem}#nbox p:last-child{margin-bottom:0}
.tcur{display:inline-block;width:2px;height:1em;background:var(--gold);vertical-align:text-bottom;animation:blink 1s step-end infinite;margin-left:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.outbox{background:var(--bg3);border-left:3px solid var(--gold);padding:.75rem .95rem;margin-top:.7rem;font-style:italic;color:var(--parch);line-height:1.85;font-size:clamp(.86rem,2.2vw,.95rem)}
.outbox.og{border-left-color:var(--grn)}.outbox.ob{border-left-color:var(--blood)}.outbox.oc{border-left-color:#c8940a}
.lootln{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.09em;color:#c8940a;text-align:center;padding:.38rem;margin:.45rem 0;border:1px dashed rgba(200,148,10,.3);background:rgba(200,148,10,.04)}
.robln{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.09em;color:var(--blood);text-align:center;padding:.38rem;margin:.45rem 0;border:1px dashed var(--crim);background:rgba(139,26,26,.06)}
#carea{margin-top:1.2rem;display:flex;flex-direction:column;gap:.5rem}
.cbtn{background:var(--bg2);border:1px solid var(--bd2);color:var(--parch);font-family:'Crimson Text',serif;font-size:clamp(.86rem,2.2vw,.96rem);padding:.72rem .9rem .72rem 1rem;cursor:pointer;text-align:left;position:relative;transition:all .18s;line-height:1.5;width:100%}
.cbtn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--crim);transition:background .18s}
.cbtn:hover{background:var(--bg3);border-color:var(--gold);color:var(--gold2)}
.cbtn:hover::before{background:var(--gold)}.cbtn:active{transform:scale(.99)}.cbtn:disabled{opacity:.3;cursor:not-allowed}
.clet{font-family:'Cinzel',serif;font-size:.63rem;font-weight:600;color:var(--gold);margin-right:.45rem;letter-spacing:.04em}
.chint{display:block;font-size:.75rem;color:var(--parch3);font-style:italic;margin-top:.12rem;padding-left:1.35rem}
.cbtn.cc::before{background:#c8940a}.cbtn.cc:hover{border-color:#c8940a;color:#e8b840}
.cbtn.cn::before{background:#2a6b2a}.cbtn.co::before{background:var(--blood)}.cbtn.ce::before{background:#2a6a9a}
.dtag{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.1em;padding:1px 5px;border:1px solid var(--bd3);color:var(--parch3);margin-right:.3rem;vertical-align:middle;background:var(--bg3)}
#nextbtn{display:none;width:100%;margin-top:1rem;background:var(--bg3);border:1px solid var(--gold);color:var(--gold2);font-family:'Cinzel',serif;font-size:.75rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:.72rem 1.2rem;cursor:pointer;transition:all .2s}
#nextbtn:hover{background:rgba(201,168,76,.12)}.#nextbtn:active{transform:scale(.99)}
#narea{min-height:22px;display:flex;justify-content:center;gap:.35rem;flex-wrap:wrap;margin:.3rem 0;align-items:center}
.notif{display:inline-block;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.07em;padding:2px 6px;animation:fu 2.8s ease forwards}
.np{color:#6ccc6c;background:rgba(108,204,108,.1)}.nn{color:#cc6c6c;background:rgba(204,108,108,.1)}
@keyframes fu{0%{opacity:0;transform:translateY(5px)}15%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateY(-5px)}}
#dice-overlay{display:none;position:fixed;inset:0;background:rgba(4,2,1,.9);z-index:500;align-items:center;justify-content:center;flex-direction:column;padding:1rem}
#dice-overlay.show{display:flex}
.dice-box{background:var(--bg1);border:1px solid var(--bd2);padding:1.8rem 1.5rem;max-width:420px;width:100%;text-align:center}
.dice-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem}
#dface{width:80px;height:80px;border:2px solid var(--gold);background:var(--bg2);font-family:'Cinzel',serif;font-size:2.5rem;font-weight:700;color:var(--gold2);display:inline-flex;align-items:center;justify-content:center;margin-bottom:.5rem;box-shadow:0 0 20px rgba(201,168,76,.15),inset 0 0 12px rgba(0,0,0,.6)}
#dface.rolling{animation:droll .1s ease-in-out infinite alternate}
#dface.land{animation:dland .4s ease-out forwards}
@keyframes droll{0%{transform:rotate(-8deg) scale(.96)}100%{transform:rotate(8deg) scale(1.04)}}
@keyframes dland{0%{transform:rotate(5deg) scale(1.15)}60%{transform:rotate(-2deg) scale(.97)}100%{transform:rotate(0) scale(1)}}
.dlabel{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--parch3);margin-bottom:1rem}
#dresult{font-family:'Cinzel',serif;font-size:.88rem;letter-spacing:.08em;color:var(--gold2);padding:.5rem .8rem;background:rgba(201,168,76,.08);border:1px solid var(--bd3);margin-bottom:.8rem;min-height:2.2rem}
.dtable{width:100%;border-collapse:collapse;font-size:.72rem}
.dtable td{padding:.28rem .45rem;border-bottom:1px solid var(--bg3);color:var(--parch2)}
.dtable td:first-child{font-family:'Cinzel',serif;font-size:.6rem;font-weight:600;color:var(--gold);width:50px}
.dtable tr.dactive td{background:rgba(201,168,76,.12);color:var(--gold2)}
#sheet-overlay{display:none;position:fixed;inset:0;background:rgba(4,2,1,.97);z-index:400;overflow-y:auto;padding:1rem}
#sheet-overlay.show{display:block}
.sh-inner{max-width:560px;margin:0 auto}
.sh-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.sh-title{font-family:'Cinzel Decorative',serif;font-size:clamp(.9rem,3vw,1.2rem);color:var(--gold);letter-spacing:.06em}
.sh-close{background:transparent;border:1px solid var(--bd2);color:var(--parch2);font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.38rem .75rem;cursor:pointer;transition:all .18s}
.sh-close:hover{border-color:var(--blood);color:var(--blood)}
.sh-id{display:flex;align-items:center;gap:.9rem;padding:.65rem .85rem;background:var(--bg2);border:1px solid var(--bd);margin-bottom:.75rem}
.sh-icon{font-size:1.9rem;flex-shrink:0}
.sh-name{font-family:'Cinzel',serif;font-size:.95rem;font-weight:600;color:var(--gold)}
.sh-faction{font-size:.75rem;color:var(--parch2);font-style:italic;margin-top:.2rem}
.sh-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.45rem;margin-bottom:.75rem}
.sh-stat{background:var(--bg2);border:1px solid var(--bd);padding:.45rem .4rem;text-align:center}
.sh-stat-lbl{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.1em;color:var(--parch3);text-transform:uppercase;display:block;margin-bottom:2px}
.sh-stat-val{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:var(--gold)}
.sh-stat-val.up{color:var(--grn)}
.sh-sec{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--parch3);margin-bottom:.45rem}
.eq-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:.75rem}
@media(max-width:480px){.eq-row{grid-template-columns:repeat(2,1fr)}}
.eq-slot{background:var(--bg2);border:1px dashed var(--bd2);padding:.6rem .55rem;text-align:center;cursor:pointer;transition:all .2s;min-height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.22rem}
.eq-slot.full{border-style:solid;border-color:var(--bd3);background:rgba(201,168,76,.04)}
.eq-slot.full:hover{border-color:var(--gold)}
.eq-slot-lbl{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--parch3)}
.eq-slot-ico{font-size:1.3rem}
.eq-slot-name{font-family:'Cinzel',serif;font-size:.56rem;color:var(--gold2);letter-spacing:.04em}
.eq-slot-bonus{font-size:.62rem;color:var(--grn);font-style:italic}
.eq-slot-empty{font-size:.62rem;color:var(--bd2);font-style:italic}
.pack-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:.75rem}
.pk-slot{background:var(--bg2);border:1px dashed var(--bd2);padding:.5rem .4rem;text-align:center;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.2rem}
.pk-slot.full{border-style:solid;border-color:var(--bd3)}
.pk-ico{font-size:1.1rem}.pk-name{font-family:'Cinzel',serif;font-size:.48rem;color:var(--gold2);line-height:1.3}
.pk-use{background:var(--bg3);border:1px solid var(--bd2);color:var(--parch2);font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.07em;text-transform:uppercase;padding:2px 5px;cursor:pointer;margin-top:.15rem;transition:all .15s;width:100%}
.pk-use:hover{border-color:var(--gold);color:var(--gold)}
.inv-list{display:flex;flex-direction:column;gap:.38rem;max-height:220px;overflow-y:auto}
.inv-row{display:flex;align-items:center;gap:.55rem;padding:.45rem .65rem;background:var(--bg2);border:1px solid var(--bd)}
.inv-ico{font-size:1rem;flex-shrink:0}
.inv-info{flex:1}
.inv-name{font-family:'Cinzel',serif;font-size:.62rem;color:var(--gold);letter-spacing:.04em}
.inv-desc{font-size:.66rem;color:var(--parch2);font-style:italic;margin-top:1px}
.inv-btn{background:var(--crim);border:1px solid var(--crim2);color:var(--gold);font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;padding:.25rem .55rem;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.inv-btn:hover{background:var(--crim2);border-color:var(--gold)}
.inv-btn.pk{background:var(--bg3);border-color:var(--bd3);color:var(--parch2)}.inv-btn.pk:hover{border-color:var(--gold);color:var(--gold)}
.epanel{text-align:center;padding:.4rem}
.esym{font-size:2.5rem;margin-bottom:.6rem;display:block}
.etitle{font-family:'Cinzel Decorative',serif;font-size:clamp(.95rem,3.5vw,1.3rem);color:var(--gold);margin-bottom:.55rem}
.etxt{font-style:italic;line-height:1.9;color:var(--parch);margin-bottom:.9rem;font-size:clamp(.86rem,2.2vw,.96rem)}
.lq{font-style:italic;color:var(--parch2);font-size:.84rem;text-align:center;border-left:2px solid var(--crim);padding:.4rem .8rem;margin:.85rem 0;line-height:1.6}
.fbadge{display:inline-flex;align-items:center;gap:.4rem;background:var(--bg3);border:1px solid var(--bd2);padding:.28rem .62rem;font-family:'Cinzel',serif;font-size:.65rem;color:var(--gold);letter-spacing:.06em;margin-bottom:.7rem}
.ilore{font-style:italic;color:var(--parch2);line-height:1.88;font-size:clamp(.85rem,2.2vw,.93rem);margin-bottom:.85rem}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;margin-top:.85rem}
@media(max-width:480px){.fgrid{grid-template-columns:repeat(2,1fr)}}
.fc{border:1px solid var(--bd);background:var(--bg2);padding:clamp(.65rem,3vw,.95rem) .65rem;cursor:pointer;text-align:center;transition:all .22s}
.fc:hover{border-color:var(--gold);background:var(--bg3);transform:translateY(-2px)}
.fi{font-size:clamp(1.4rem,4.5vw,1.8rem);margin-bottom:.3rem;display:block}
.fn{font-family:'Cinzel',serif;font-size:clamp(.58rem,1.7vw,.75rem);font-weight:600;color:var(--gold);letter-spacing:.04em}
.fd{font-size:clamp(.62rem,1.7vw,.74rem);color:var(--parch2);margin-top:.22rem;line-height:1.3;font-style:italic}
.fsl{font-family:'Cinzel',serif;font-size:.48rem;color:var(--steel);letter-spacing:.07em;margin-top:.4rem;border-top:1px solid var(--bd);padding-top:.32rem}
.niw{margin-top:.95rem;display:flex;gap:.45rem;flex-wrap:wrap}
.ni{flex:1;min-width:140px;background:var(--bg2);border:1px solid var(--bd2);color:var(--parch);font-family:'Cinzel',serif;font-size:.86rem;padding:.62rem .82rem;outline:none;letter-spacing:.04em;transition:border-color .2s}
.ni:focus{border-color:var(--gold)}.ni::placeholder{color:var(--bd2)}
.btnp{background:var(--crim);border:1px solid var(--crim2);color:var(--gold);font-family:'Cinzel',serif;font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:.62rem 1rem;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.btnp:hover{background:var(--crim2);border-color:var(--gold)}
.btns{background:transparent;border:1px solid var(--bd2);color:var(--parch2);font-family:'Cinzel',serif;font-size:.63rem;letter-spacing:.12em;text-transform:uppercase;padding:.45rem .85rem;cursor:pointer;transition:all .2s;display:block;margin-top:.65rem}
.btns:hover{border-color:var(--gold);color:var(--gold)}

/* BOLTER IMAGE */
.bolter-img{display:block;max-width:220px;width:100%;margin:.6rem auto .2rem;opacity:.92;filter:drop-shadow(0 0 18px rgba(201,168,76,.35));}
.bolter-img-sm{display:inline-block;width:48px;height:auto;vertical-align:middle;margin-right:.4rem;opacity:.9;filter:drop-shadow(0 0 6px rgba(201,168,76,.3));}

.bolter-img{display:block;max-width:200px;width:100%;margin:.5rem auto .2rem;opacity:.92;filter:drop-shadow(0 0 16px rgba(201,168,76,.4));}
.bolter-img-sm{display:inline-block;width:44px;height:auto;vertical-align:middle;margin-right:.4rem;opacity:.9;filter:drop-shadow(0 0 5px rgba(201,168,76,.3));}

.armor-img{display:block;max-width:120px;width:100%;margin:.3rem auto .1rem;opacity:.93;filter:drop-shadow(0 0 14px rgba(30,60,120,.5)) drop-shadow(0 0 6px rgba(201,168,76,.3));}
.armor-img-sm{display:inline-block;width:36px;height:auto;vertical-align:middle;margin-right:.4rem;opacity:.9;filter:drop-shadow(0 0 4px rgba(30,60,120,.4));}

.relique-img{display:block;max-width:110px;width:100%;margin:.3rem auto .1rem;opacity:.93;filter:drop-shadow(0 0 14px rgba(201,168,76,.5)) drop-shadow(0 0 5px rgba(180,140,30,.3));}
.relique-img-sm{display:inline-block;width:32px;height:auto;vertical-align:middle;margin-right:.4rem;opacity:.9;filter:drop-shadow(0 0 4px rgba(201,168,76,.4));}

/* IMAGES ITEMS */
.bolter-img{display:block;max-width:200px;width:100%;margin:.5rem auto .2rem;opacity:.92;filter:drop-shadow(0 0 16px rgba(201,168,76,.4));}
.bolter-img-sm{display:inline-block;width:44px;height:auto;vertical-align:middle;margin-right:.4rem;opacity:.9;filter:drop-shadow(0 0 5px rgba(201,168,76,.3));}

/* TABLE DES COUPS PORTÉS (Loup Solitaire, adapté 40K)
   QPF = getMC() - enemyMC  (clamped -6 to +6)
   j = PV perdus par le joueur, e = PV perdus par l'ennemi */
var COMBAT_TABLE = {
  '-6':{j:8,e:0}, '-5':{j:7,e:1}, '-4':{j:6,e:2}, '-3':{j:5,e:3},
  '-2':{j:4,e:4}, '-1':{j:4,e:4},  '0':{j:3,e:4},
   '1':{j:3,e:5},  '2':{j:2,e:6},  '3':{j:1,e:7},
   '4':{j:0,e:8},  '5':{j:0,e:9},  '6':{j:0,e:10}
};

function getCombatDmg(qpf){
  var k = String(Math.max(-6,Math.min(6,Math.round(qpf))));
  return COMBAT_TABLE[k]||{j:3,e:4};
}

/* Maîtrise de Combat effective du joueur */
function getMC(){
  var mc = S.baseAtk;
  var w = S.equip.weapon;
  if(w) mc += (w.atk||0);
  if(S.doctrines.indexOf('maitrise_arme')>=0 && w) mc += 2;
  if(S.doctrines.indexOf('puissance_psy')>=0) mc += 2;
  return mc;
}

/* Génère un ennemi dynamique selon la phase ou la scène */
function getSceneEnemy(sc, c){
  if(sc && sc.enemy) return Object.assign({},sc.enemy);
  if(c  && c.enemy)  return Object.assign({},c.enemy);
  var base = S.baseAtk;
  var phase = S.act<=4?'e':S.act<=10?'m':S.act<=16?'l':'f';
  var tables = {
    e:[ {name:'Garde Hérétique',mc:base-2,pe:14},
        {name:'Pillard des Ruines',mc:base-1,pe:12},
        {name:'Ork Guerrier',mc:base-1,pe:16}],
    m:[ {name:'Champion Hérétique',mc:base,pe:18},
        {name:'Guerrier Nécron',mc:base+1,pe:16},
        {name:'Ork Nob',mc:base+1,pe:20}],
    l:[ {name:'Guerrier du Chaos',mc:base+2,pe:20},
        {name:'Seigneur Chaos',mc:base+2,pe:22},
        {name:'Traître d\'Élite',mc:base+1,pe:18}],
    f:[ {name:'Champion Démoniaque',mc:base+4,pe:28},
        {name:'Lord du Chaos',mc:base+3,pe:30},
        {name:'Seigneur Nécron',mc:base+3,pe:26}]
  };
  var pool = tables[phase];
  return Object.assign({},pool[Math.floor(Math.random()*pool.length)]);
}

/* ═══════ COMBAT ENGINE ═══════ */
var CS = null; // CombatState

function openCombat(choiceIdx){
  var sc = S.currentScene;
  var c  = sc.choices[choiceIdx];
  var enemy = getSceneEnemy(sc, c);

  // Doctrine camouflage : -2 MC ennemi en embuscade
  if(S.doctrines.indexOf('camouflage')>=0 &&
     (sc.type==='trap'||sc.type==='event'))
    enemy.mc = Math.max(1, enemy.mc-2);

  // Doctrine puissance_psy : +2 MC vs Chaos
  var playerMC = getMC();
  if(S.doctrines.indexOf('puissance_psy')>=0 &&
     sc.tags&&sc.tags.indexOf('chaos')>=0)
    playerMC += 2;

  CS = {
    choiceIdx:  choiceIdx,
    choice:     c,
    enemy:      {name:enemy.name, mc:enemy.mc, pe:enemy.pe, maxPe:enemy.pe},
    playerMC:   playerMC,
    playerPE:   clamp(S.hp,0,getMaxHp()),
    maxPE:      getMaxHp(),
    round:      0,
    totalLostJ: 0,
    totalLostE: 0,
    log:        [],
    rerollAvail: S.doctrines.indexOf('premonition')>=0 && !S.rerollUsed
  };
  renderCombat();
}

function renderCombat(){
  var cs  = CS;
  if(!cs) return;
  var qpf = cs.playerMC - cs.enemy.mc;
  var dmg = getCombatDmg(qpf);
  var qColor = qpf>0?'var(--grn)':qpf<0?'var(--crim)':'var(--gold)';
  var pPct = Math.round(cs.playerPE/cs.maxPE*100);
  var ePct = Math.round(cs.enemy.pe/cs.enemy.maxPe*100);

  var logH = '';
  cs.log.slice(-4).forEach(function(l){
    logH += '<div class="clog-row">&#9876; R'+l.r
      +(l.j>0?'&nbsp;&mdash;&nbsp;<span style="color:var(--crim)">'+S.name+' -'+l.j+' PV</span>':'')
      +'&nbsp;&middot;&nbsp;<span style="color:var(--grn)">'+cs.enemy.name+' -'+l.e+' PV</span></div>';
  });

  var html =
    '<div id="cov" style="background:var(--bg2);border:2px solid var(--crim);margin-top:.8rem;padding:.8rem .7rem;">'
    +'<div style="font-family:Cinzel,serif;font-size:.62rem;letter-spacing:.18em;color:var(--crim2);text-align:center;margin-bottom:.7rem">&#9876; COMBAT &mdash; Maîtrise de Combat</div>'

    // Fighters side by side
    +'<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:.5rem;align-items:center;margin-bottom:.6rem">'

    // Player
    +'<div style="text-align:center">'
    +'<div style="font-family:Cinzel,serif;font-size:.58rem;color:var(--gold);letter-spacing:.08em;margin-bottom:.15rem">'+S.name+'</div>'
    +'<div style="font-size:.62rem;color:var(--parch2);margin-bottom:.2rem">MC&nbsp;<strong style="color:var(--gold2)">'+cs.playerMC+'</strong></div>'
    +'<div style="background:var(--bg3);border:1px solid var(--bd);height:8px;border-radius:2px;overflow:hidden;margin-bottom:.2rem">'
    +'<div style="width:'+pPct+'%;height:100%;background:var(--grn);transition:width .4s"></div></div>'
    +'<div style="font-size:.6rem;color:var(--parch2)">'+cs.playerPE+'/'+cs.maxPE+' PV</div>'
    +'</div>'

    // QPF center
    +'<div style="text-align:center;padding:.3rem .4rem;border:1px solid '+qColor+';background:rgba(0,0,0,.3)">'
    +'<div style="font-size:.46rem;color:var(--parch3);letter-spacing:.1em">QPF</div>'
    +'<div style="font-family:Cinzel,serif;font-size:1.1rem;color:'+qColor+';">'+(qpf>0?'+':'')+qpf+'</div>'
    +'<div style="font-size:.42rem;color:var(--parch3);margin-top:.1rem">-'+dmg.j+' / -'+dmg.e+'</div>'
    +'</div>'

    // Enemy
    +'<div style="text-align:center">'
    +'<div style="font-family:Cinzel,serif;font-size:.58rem;color:var(--crim2);letter-spacing:.06em;margin-bottom:.15rem">'+cs.enemy.name+'</div>'
    +'<div style="font-size:.62rem;color:var(--parch2);margin-bottom:.2rem">MC&nbsp;<strong style="color:var(--crim2)">'+cs.enemy.mc+'</strong></div>'
    +'<div style="background:var(--bg3);border:1px solid var(--bd);height:8px;border-radius:2px;overflow:hidden;margin-bottom:.2rem">'
    +'<div style="width:'+ePct+'%;height:100%;background:var(--crim);transition:width .4s"></div></div>'
    +'<div style="font-size:.6rem;color:var(--parch2)">'+cs.enemy.pe+'/'+cs.enemy.maxPe+' PV</div>'
    +'</div>'
    +'</div>'

    // Log
    +(logH?'<div style="background:var(--bg);border:1px solid var(--bd);padding:.35rem .5rem;margin-bottom:.5rem;font-size:.58rem;color:var(--parch2);line-height:1.7">'+logH+'</div>':'')

    // Buttons
    +'<div style="display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center">'
    +'<button class="cbtn t-cbt" onclick="doCombatRound()" style="flex:1;min-width:120px">&#9876; Assaut — Round '+(cs.round+1)+'</button>'
    +'<button class="cbtn" onclick="doCombatFlee()" style="flex:1;min-width:100px">&#8617; Fuir (-'+Math.max(1,dmg.j)+' PV)</button>'
    +(cs.rerollAvail?'<button class="cbtn t-lore" onclick="useCombatReroll()" style="flex:0 0 auto">&#127922; Prémonition</button>':'')
    +'</div>'
    +'</div>';

  var ca = document.getElementById('carea');
  if(ca){ ca.style.opacity='1'; ca.style.pointerEvents=''; ca.innerHTML = html; }
  window.scrollTo({top:9999,behavior:'smooth'});
}

function doCombatRound(){
  var cs = CS;
  if(!cs) return;
  var qpf = cs.playerMC - cs.enemy.mc;
  var dmg = getCombatDmg(qpf);

  cs.round++;
  cs.playerPE  = Math.max(0, cs.playerPE  - dmg.j);
  cs.enemy.pe  = Math.max(0, cs.enemy.pe  - dmg.e);
  cs.totalLostJ += dmg.j;
  cs.totalLostE += dmg.e;
  cs.log.push({r:cs.round, j:dmg.j, e:dmg.e});

  if(cs.playerPE <= 0){
    // Player dies
    S.hp = 0;
    renderDeath();
    CS = null;
    return;
  }
  if(cs.enemy.pe <= 0){
    endCombatVictory();
    return;
  }
  renderCombat();
}

function doCombatFlee(){
  var cs = CS;
  if(!cs) return;
  var qpf = cs.playerMC - cs.enemy.mc;
  var dmg = getCombatDmg(qpf);
  // Fuite coûte le tableau de coups du joueur (coût de la couardise)
  var fuiteHP = -Math.max(1, dmg.j);
  var c = cs.choice;
  var fleeText = c.outBad || 'Vous rompez le combat et battez en retraite. L\'ennemi vocifère dans votre dos — mais vous êtes vivant, et c\'est tout ce qui compte pour l\'instant.';
  CS = null;
  // Apply flee cost through normal flow
  var deltas = {hp:fuiteHP, res:(c.res||0)-5, honor:(c.honor||0)-10, xp:Math.max(5,(c.xp||0)-10)};
  // Inline applyAndShow
  S.pendingDeltas = deltas;
  var nbox = document.getElementById('nbox');
  if(nbox){
    var ca=document.getElementById('carea');if(ca)ca.style.opacity='0';
    nbox.innerHTML='<div class="outbox ob">&#8617; REPLI &mdash; '+fleeText+'</div>';
  }
  var nb=document.getElementById('nextbtn');if(nb)nb.style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function useCombatReroll(){
  if(!CS||!CS.rerollAvail) return;
  CS.rerollAvail = false;
  S.rerollUsed = true;
  // Re-roll means enemy MC drops by d3 for this combat (represents tactical insight)
  var bonus = Math.ceil(Math.random()*3);
  CS.playerMC += bonus;
  CS.log.push({r:CS.round, j:0, e:0, note:'Prémonition : +'+bonus+' MC ce combat'});
  renderCombat();
}

function endCombatVictory(){
  var cs = CS;
  CS = null;
  S.lastCombatWon = true;
  var c = cs.choice;
  // Determine outcome
  var roundsStr = cs.round===1?'1 round':cs.round+' rounds';
  var victoryText = c.outGood && cs.totalLostJ===0 ? c.outGood
                  : cs.totalLostJ<=5               ? (c.outGood||c.out)
                  : c.out;
  victoryText += ' — Victoire en '+roundsStr+', '+cs.totalLostJ+' PV perdus.';

  var lootId = (cs.totalLostJ===0) ? (c.lootGood||c.loot) : (c.loot||null);
  var deltas = {
    hp: -cs.totalLostJ + (c.hp||0>0?c.hp:0),
    res: (c.res||0),
    honor: (c.honor||0),
    xp: (c.xp||0)
  };
  // Doctrine regen: +3 PV after combat victory
  if(S.doctrines.indexOf('regen')>=0) deltas.hp += 3;

  S.pendingDeltas = deltas;
  // Apply HP loss from combat
  S.hp = clamp(cs.playerPE + (deltas.hp||0), 0, getMaxHp());
  if(lootId) addItem(lootId);
  var nbox=document.getElementById('nbox');
  if(nbox){
    var ca=document.getElementById('carea');if(ca)ca.style.opacity='0';
    var lln=lootId&&ITEMS[lootId]?'<div class="lootln">&#128230; Objet trouvé : '+ITEMS[lootId].ico+' '+ITEMS[lootId].name+'</div>':'';
    nbox.innerHTML='<div class="outbox og">&#9876; VICTOIRE &mdash; '+victoryText+'</div>'+lln;
  }
  S.pendingDeltas={hp:0,res:deltas.res,honor:deltas.honor,xp:deltas.xp};
  var nb=document.getElementById('nextbtn');if(nb)nb.style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ═══════ DOCTRINE SELECTION ═══════ */
var selectedDoctrines = [];

function showDoctrineSelect(){

// Collect all currently active items (equipped slots + pack)
function activeItems(){
  var items=[];
  var eq=S.equip;
  if(eq.weapon)items.push(eq.weapon);
  if(eq.armor) items.push(eq.armor);
  if(eq.head)  items.push(eq.head);
  // Trinkets in inventory equip slot (slot='trinket') are stored in inventory - check equipped
  // Also check pack for passive trinkets
  for(var i=0;i<S.pack.length;i++){if(S.pack[i]&&S.pack[i].slot==='trinket')items.push(S.pack[i]);}
  // Also inventory trinkets that are equipped (we store equipped trinkets in S.equip via a trinket slot)
  if(S.equip.trinket)items.push(S.equip.trinket);
  return items;
}
function getAtk(){
  var total=S.baseAtk;
  var items=activeItems();
  for(var i=0;i<items.length;i++)total+=items[i].atk||0;
  return total;
}
function getDef(){
  var total=S.baseDef;
  var items=activeItems();
  for(var i=0;i<items.length;i++)total+=items[i].def||0;
  return Math.max(0,total);
}
function getMaxHp(){
  var total=S.maxHp;
  var items=activeItems();
  for(var i=0;i<items.length;i++)total+=items[i].hpBonus||0;
  return Math.max(10,total);
}
function clamp(v,lo,hi){lo=lo===undefined?0:lo;hi=hi===undefined?100:hi;return Math.min(hi,Math.max(lo,v));}

/* SOUND ENGINE */
var AC=null;
function getAC(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
document.addEventListener('click',function(){getAC();},{once:true});

function snd_pageTurn(){
  var ac=getAC();if(!ac)return;
  var len=Math.floor(ac.sampleRate*0.18);
  var buf=ac.createBuffer(1,len,ac.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.5)*0.55;
  var src=ac.createBufferSource();src.buffer=buf;
  var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(2800,ac.currentTime);f.frequency.linearRampToValueAtTime(800,ac.currentTime+0.16);f.Q.value=0.8;
  var g=ac.createGain();g.gain.setValueAtTime(0.7,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+0.18);
  src.connect(f);f.connect(g);g.connect(ac.destination);
  src.start();src.stop(ac.currentTime+0.2);
}

function snd_dice(){
  var ac=getAC();if(!ac)return;
  var clicks=[0,0.06,0.11,0.15,0.185,0.21];
  for(var i=0;i<clicks.length;i++){
    (function(t,last){
      var o=ac.createOscillator();var g=ac.createGain();
      o.type='sine';var freq=340+Math.random()*180;
      o.frequency.setValueAtTime(freq,ac.currentTime+t);
      o.frequency.exponentialRampToValueAtTime(freq*0.55,ac.currentTime+t+0.04);
      g.gain.setValueAtTime(0,ac.currentTime+t);
      g.gain.linearRampToValueAtTime(last?0.55:0.3,ac.currentTime+t+0.005);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+0.055);
      o.connect(g);g.connect(ac.destination);
      o.start(ac.currentTime+t);o.stop(ac.currentTime+t+0.06);
    })(clicks[i],i===clicks.length-1);
  }
}

function snd_battle(){
  var ac=getAC();if(!ac)return;
  var dur=1.8;
  var len=Math.floor(ac.sampleRate*dur);
  var buf=ac.createBuffer(1,len,ac.sampleRate);
  var bd=buf.getChannelData(0);
  for(var i=0;i<len;i++){var t=i/ac.sampleRate;bd[i]=(Math.random()*2-1)*0.35*Math.sin(t*22)*Math.max(0,1-t/dur);}
  var rumble=ac.createBufferSource();rumble.buffer=buf;
  var lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=160;
  var rg=ac.createGain();rg.gain.setValueAtTime(0.5,ac.currentTime);rg.gain.linearRampToValueAtTime(0,ac.currentTime+dur);
  rumble.connect(lp);lp.connect(rg);rg.connect(ac.destination);
  rumble.start();rumble.stop(ac.currentTime+dur);
  var impacts=[0.05,0.22,0.48,0.71,1.0,1.35];
  for(var j=0;j<impacts.length;j++){
    (function(t){
      var o=ac.createOscillator();var g=ac.createGain();
      o.type='sawtooth';o.frequency.setValueAtTime(95+Math.random()*60,ac.currentTime+t);
      o.frequency.exponentialRampToValueAtTime(35,ac.currentTime+t+0.18);
      g.gain.setValueAtTime(0.45,ac.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+0.22);
      var dist=ac.createWaveShaper();
      var c=new Float32Array(256);for(var k=0;k<256;k++)c[k]=Math.tanh((k/128-1)*4);
      dist.curve=c;
      o.connect(dist);dist.connect(g);g.connect(ac.destination);
      o.start(ac.currentTime+t);o.stop(ac.currentTime+t+0.25);
    })(impacts[j]);
  }
}

function snd_damnation(){
  var ac=getAC();if(!ac)return;
  var dur=2.5;
  var freqs=[55,82,110];
  for(var i=0;i<freqs.length;i++){
    (function(sf,idx){
      var o=ac.createOscillator();var g=ac.createGain();
      o.type=idx===0?'sawtooth':'sine';
      o.frequency.setValueAtTime(sf,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(sf*0.35,ac.currentTime+dur);
      g.gain.setValueAtTime(0.001,ac.currentTime);
      g.gain.linearRampToValueAtTime(0.28-idx*0.07,ac.currentTime+0.08);
      g.gain.linearRampToValueAtTime(0.001,ac.currentTime+dur);
      var lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=200;
      o.connect(lp);lp.connect(g);g.connect(ac.destination);
      o.start();o.stop(ac.currentTime+dur+0.1);
    })(freqs[i],i);
  }
  var sting=ac.createOscillator();var sg=ac.createGain();
  sting.type='square';sting.frequency.setValueAtTime(880,ac.currentTime);
  sting.frequency.exponentialRampToValueAtTime(220,ac.currentTime+1.2);
  sg.gain.setValueAtTime(0.001,ac.currentTime);sg.gain.linearRampToValueAtTime(0.12,ac.currentTime+0.05);
  sg.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+1.2);
  var hp=ac.createBiquadFilter();hp.type='bandpass';hp.frequency.value=600;hp.Q.value=3;
  sting.connect(hp);hp.connect(sg);sg.connect(ac.destination);
  sting.start();sting.stop(ac.currentTime+1.3);
  var ilen=Math.floor(ac.sampleRate*0.15);
  var ibuf=ac.createBuffer(1,ilen,ac.sampleRate);
  var idat=ibuf.getChannelData(0);
  for(var j=0;j<ilen;j++) idat[j]=(Math.random()*2-1)*Math.pow(1-j/ilen,0.6)*0.7;
  var isrc=ac.createBufferSource();isrc.buffer=ibuf;
  var ig=ac.createGain();ig.gain.value=0.55;
  isrc.connect(ig);ig.connect(ac.destination);
  isrc.start();isrc.stop(ac.currentTime+0.2);
}

/* DICE */
function rollD10(){return Math.ceil(Math.random()*10);}
function diceCategory(r){
  if(r===1) return {cat:'FUMBLE',  good:false,crit:false,fumble:true};
  if(r<=3)  return {cat:'RATE',    good:false,crit:false,fumble:false};
  if(r<=6)  return {cat:'TOUCHE',  good:true, crit:false,fumble:false};
  if(r<=8)  return {cat:'SOLIDE',  good:true, crit:false,fumble:false};
  if(r===9) return {cat:'CRITIQUE',good:true, crit:true, fumble:false};
  return           {cat:'MAITRISE',good:true, crit:true, fumble:false};
}
function animDice(result,cb){
  var el=document.getElementById('dface');if(!el){if(cb)cb();return;}
  var steps=[60,60,65,70,80,95,115,140,175,220,280,360];
  var i=0;el.className='rolling';el.style.color='var(--parch2)';
  function step(){
    if(i<steps.length-1){el.textContent=Math.ceil(Math.random()*10);setTimeout(step,steps[i++]);}
    else{el.textContent=result;el.className='land';el.style.color='var(--gold2)';if(cb)setTimeout(cb,500);}
  }
  step();
}
function highlightDice(r){
  document.querySelectorAll('#dtable tr').forEach(function(tr){
    tr.className=(r>=parseInt(tr.dataset.lo)&&r<=parseInt(tr.dataset.hi))?'dactive':'';
  });
}
function showDice(label,cb){
  var ov=document.getElementById('dice-overlay');
  var df=document.getElementById('dface');var dr=document.getElementById('dresult');
  var dt=document.getElementById('dice-title');
  if(dt)dt.textContent=label||'Lancer du Destin';
  if(df){df.textContent='?';df.className='';df.style.color='var(--parch2)';}
  if(dr)dr.textContent='';
  document.querySelectorAll('#dtable tr').forEach(function(tr){tr.className='';});
  ov.className='show';
  setTimeout(function(){
    snd_dice();
    var r=rollD10();
    animDice(r,function(){
      var cat=diceCategory(r);
      highlightDice(r);
      if(dr)dr.textContent=r+' \u2014 '+cat.cat;
      setTimeout(function(){ov.className='';if(cb)cb(r,cat);},1400);
    });
  },300);
}

/* INVENTORY */
function addItem(itemId){
  var it=ITEMS[itemId];if(!it)return;
  if(it.slot==='weapon'  &&!S.equip.weapon) {S.equip.weapon=it; applyBonus(it);return;}
  if(it.slot==='armor'   &&!S.equip.armor)  {S.equip.armor=it;  applyBonus(it);return;}
  if(it.slot==='head'    &&!S.equip.head)   {S.equip.head=it;   applyBonus(it);return;}
  if(it.slot==='trinket' &&!S.equip.trinket){S.equip.trinket=it;applyBonus(it);return;}
  var pi=S.pack.indexOf(null);
  if(pi>=0){S.pack[pi]=it;applyBonus(it);return;}
  S.inventory.push(it);applyBonus(it);
}
function applyBonus(it){
  if(it.resBonus)  S.res   =clamp(S.res   +it.resBonus);
  if(it.xpBonus)   S.xp   +=it.xpBonus;
  if(it.honorBonus)S.honor =clamp(S.honor +it.honorBonus);
  // hpBonus is handled dynamically via getMaxHp()
  // atk/def are handled dynamically via getAtk()/getDef()
}
function stripAll(){
  S.equip={weapon:null,armor:null,head:null,trinket:null};
  S.pack=[null,null,null,null];S.inventory=[];
  S.hp=clamp(S.hp,0,S.maxHp);
  snd_damnation();
}
function equipItem(idx){
  var it=S.inventory[idx];if(!it)return;
  var old=S.equip[it.slot];S.equip[it.slot]=it;S.inventory.splice(idx,1);
  if(old)S.inventory.push(old);openSheet();
}
function unequip(slot){var it=S.equip[slot];if(!it)return;S.equip[slot]=null;S.inventory.push(it);openSheet();}
function putInPack(idx){var it=S.inventory[idx];if(!it)return;var pi=S.pack.indexOf(null);if(pi<0)return;S.pack[pi]=it;S.inventory.splice(idx,1);openSheet();}
function unpack(pi){var it=S.pack[pi];if(!it)return;S.pack[pi]=null;S.inventory.push(it);openSheet();}
function usePack(pi){
  var it=S.pack[pi];if(!it)return;
  if(it.healHp) S.hp=clamp(S.hp+it.healHp,0,getMaxHp());
  if(it.resBonus) S.res=clamp(S.res+it.resBonus);
  S.pack[pi]=null;openSheet();
}

function openSheet(){
  var ov=document.getElementById('sheet-overlay');ov.className='show';
  var atk=getAtk(),def=getDef(),mhp=getMaxHp();
  var wHasBonus=S.equip.weapon&&(S.equip.weapon.atk||0)>0;
  var aHasBonus=(S.equip.armor&&(S.equip.armor.def||0)>0)||(S.equip.head&&(S.equip.head.def||0)>0);
  var tHasBonus=S.equip.trinket!=null;
  var slots=[
    {key:'weapon', lbl:'&#9876; Arme'},
    {key:'armor',  lbl:'&#128737; Armure'},
    {key:'head',   lbl:'&#9937; Tête'},
    {key:'trinket',lbl:'&#127942; Relique'}
  ];
  var eqHtml=slots.map(function(sd){
    var it=S.equip[sd.key];
    if(it){
      var _isArmor=it.slot==='armor'||it.slot==='head';
      var _wimg=(it.id==='bolter'||it.id==='bolter2')?'<img src="'+bolterSrc()+'" class="bolter-img" alt="'+it.name+'" />':
               _isArmor?'<img src="'+armorSrc()+'" class="armor-img" alt="'+it.name+'" />':
               it.id==='relique'?'<img src="'+reliqueSrc()+'" class="relique-img" alt="'+it.name+'" />':
               '<div class="eq-slot-ico">'+it.ico+'</div>';
      return '<div class="eq-slot full" onclick="unequip(\''+sd.key+'\')" title="Cliquer pour déséquiper">'
        +'<div class="eq-slot-lbl">'+sd.lbl+'</div>'+_wimg
        +'<div class="eq-slot-name">'+it.name+'</div>'
        +'<div class="eq-slot-bonus" style="font-size:.55rem;line-height:1.5">'+buildBonusStr(it)+'</div>'
        +'</div>';
    }
    return '<div class="eq-slot"><div class="eq-slot-lbl">'+sd.lbl+'</div><div class="eq-slot-empty">Vide</div></div>';
  }).join('');
  var packHtml=S.pack.map(function(it,i){
    if(it){
      var canUse=it.slot==='consumable'&&(it.healHp>0||it.resBonus>0);
      return '<div class="pk-slot full"><div class="pk-ico">'+it.ico+'</div><div class="pk-name">'+it.name+'</div>'
        +(canUse?'<button class="pk-use" onclick="usePack('+i+')">Utiliser</button>':'')
        +'<button class="pk-use" onclick="unpack('+i+')" style="margin-top:2px">Retirer</button></div>';
    }
    return '<div class="pk-slot"><div style="color:var(--bd2);font-size:.62rem;font-style:italic">Vide</div></div>';
  }).join('');
  var invHtml='';
  if(S.inventory.length){
    invHtml=S.inventory.map(function(it,i){
      var canEq=it.slot==='weapon'||it.slot==='armor'||it.slot==='head'||it.slot==='trinket';
      var canPk=it.slot==='consumable';
      var _invico=(it.id==='bolter'||it.id==='bolter2')?'<img src="'+bolterSrc()+'" class="bolter-img-sm" alt="'+it.name+'" />':(it.slot==='armor'||it.slot==='head')?'<img src="'+armorSrc()+'" class="armor-img-sm" alt="'+it.name+'" />':it.id==='relique'?'<img src="'+reliqueSrc()+'" class="relique-img-sm" alt="'+it.name+'" />':'<span class="inv-ico">'+it.ico+'</span>';
      return '<div class="inv-row">'+_invico
        +'<div class="inv-info"><div class="inv-name">'+it.name+'</div><div class="inv-desc">'+it.desc+'</div></div>'
        +(canEq?'<button class="inv-btn" onclick="equipItem('+i+')">Équiper</button>':'')
        +(canPk?'<button class="inv-btn pk" onclick="putInPack('+i+')">Sac</button>':'')
        +'</div>';
    }).join('');
  }else{invHtml='<div style="color:var(--parch3);font-style:italic;font-size:.78rem;padding:.5rem">Inventaire vide</div>';}
  document.getElementById('sh-content').innerHTML=
    '<div class="sh-hdr"><div class="sh-title">&#128203; Fiche du Guerrier</div>'
    +'<button class="sh-close" onclick="closeSheet()">&#10005; Fermer</button></div>'
    +'<div class="sh-id"><div class="sh-icon">'+(S.fdata?S.fdata.ico:'?')+'</div>'
    +'<div><div class="sh-name">'+S.name+'</div><div class="sh-faction">'+(S.fdata?S.fdata.name+' &mdash; '+S.fdata.chapter:'')+'</div></div></div>'
    +'<div class="sh-stats">'
    +'<div class="sh-stat"><span class="sh-stat-lbl">PV</span><span class="sh-stat-val">'+S.hp+'/'+mhp+'</span></div>'
    +'<div class="sh-stat"><span class="sh-stat-lbl">Attaque</span><span class="sh-stat-val'+(S.equip.weapon?' up':'')+'">'+atk+'</span></div>'
    +'<div class="sh-stat"><span class="sh-stat-lbl">Defense</span><span class="sh-stat-val'+((S.equip.armor||S.equip.head)?' up':'')+'">'+def+'</span></div>'
    +'<div class="sh-stat"><span class="sh-stat-lbl">Honneur</span><span class="sh-stat-val">'+S.honor+'</span></div>'
    +'</div>'
    +mkdiv()
    +'<div class="sh-sec">Equipement actif <span style="font-size:.5rem;color:var(--parch3)">(cliquer pour desequiper)</span></div>'
    +'<div class="eq-row">'+eqHtml+'</div>'
    +mkdiv()
    +'<div class="sh-sec">Sac a dos ('+S.pack.filter(Boolean).length+'/4)</div>'
    +'<div class="pack-row">'+packHtml+'</div>'
    +(S.inventory.length?mkdiv()+'<div class="sh-sec">Inventaire</div><div class="inv-list">'+invHtml+'</div>':'')
    +'<div style="margin-top:1.1rem;text-align:center"><button class="btns" onclick="closeSheet()">Retour a l\'aventure</button></div>';
}
function closeSheet(){document.getElementById('sheet-overlay').className='';}

/* SAVE / LOAD */
var SAVE_KEY='wh40k_v5';
function saveGame(){
  var sv={faction:S.faction,name:S.name,hp:S.hp,maxHp:S.maxHp,res:S.res,honor:S.honor,xp:S.xp,
    baseAtk:S.baseAtk,baseDef:S.baseDef,equip:S.equip,pack:S.pack,inventory:S.inventory,
    act:S.act,pageNum:S.pageNum,usedScenes:S.usedScenes.slice(),
    sceneId:S.currentScene?S.currentScene.id:null,at:new Date().toLocaleString('fr-FR')};
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(sv));showSaveMsg('Sauvegardé OK','var(--grn)');}
  catch(e){showSaveMsg('Erreur save','var(--blood)');}
}
function loadGame(){
  try{
    var raw=localStorage.getItem(SAVE_KEY);if(!raw){showSaveMsg('Aucune sauvegardé','var(--blood)');return;}
    var sv=JSON.parse(raw);
    S.faction=sv.faction;S.fdata=FACTIONS.filter(function(f){return f.id===sv.faction;})[0];
    if(!S.fdata){showSaveMsg('Fichier corrompu','var(--blood)');return;}
    S.name=sv.name;S.hp=sv.hp;S.maxHp=sv.maxHp||100;S.res=sv.res;S.honor=sv.honor;S.xp=sv.xp;
    S.baseAtk=sv.baseAtk||S.fdata.baseAtk;S.baseDef=sv.baseDef||S.fdata.baseDef;
    S.equip=sv.equip||{weapon:null,armor:null,head:null,trinket:null};
    S.pack=sv.pack||[null,null,null,null];S.inventory=sv.inventory||[];
    S.act=sv.act;S.pageNum=sv.pageNum||1;S.usedScenes=sv.usedScenes||[];S.pendingDeltas=null;
    var sc=sv.sceneId?SCENES.filter(function(s){return s.id===sv.sceneId;})[0]:null;
    if(sc){S.currentScene=sc;renderScene(sc,null);}else{S.act--;nextScene(null,null);}
    showSaveMsg('Chargé: '+sv.at,'var(--grn)');
  }catch(e){showSaveMsg('Illisible','var(--blood)');}
}
function hasSave(){try{return!!localStorage.getItem(SAVE_KEY);}catch(e){return false;}}
function showSaveMsg(msg,col){
  var el=document.getElementById('savemsg2');
  if(el){el.textContent=msg;el.style.color=col;setTimeout(function(){if(el){el.textContent=saveStatusText();el.style.color='';}},3200);}
}
function saveStatusText(){
  try{var r=localStorage.getItem(SAVE_KEY);if(!r)return 'Pas de sauvegardé';var s=JSON.parse(r);return s.name+' Ch.'+s.act+' '+s.at;}
  catch(e){return 'Pas de sauvegardé';}
}
