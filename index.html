<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Warhammer 40,000 — Chroniques de l'Imperium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#080604;--bg1:#110d09;--bg2:#1a1208;--bg3:#241a0c;
  --bd:#3a2810;--bd2:#5a3e18;--bd3:#7a5a28;
  --gold:#c9a84c;--gold2:#e8c96a;
  --parch:#d4b896;--parch2:#b89870;--parch3:#9a7850;
  --crim:#8b1a1a;--crim2:#b52020;--blood:#cc2222;
  --steel:#7a8a96;--grn:#4caa4c;
}
body{background:var(--bg0);color:var(--parch);font-family:'Crimson Text',Georgia,serif;
  font-size:clamp(15px,2.4vw,18px);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse at 15% 0%,rgba(139,26,26,.16) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 100%,rgba(107,15,139,.10) 0%,transparent 55%)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
#app{max-width:840px;margin:0 auto;padding:1.2rem 1rem 5rem}
.hdr{text-align:center;padding:1.8rem 0 .8rem}
.aquila{font-size:clamp(2rem,6vw,3rem);color:var(--gold);display:block;margin-bottom:.3rem;text-shadow:0 0 30px rgba(201,168,76,.5)}
.t-main{font-family:'Cinzel Decorative',serif;font-size:clamp(1.2rem,4.5vw,2.2rem);font-weight:700;color:var(--gold);letter-spacing:.06em;text-shadow:0 0 40px rgba(201,168,76,.4),0 2px 8px rgba(0,0,0,.95);line-height:1.2}
.t-sub{font-family:'Cinzel',serif;font-size:clamp(.55rem,2vw,.78rem);color:var(--parch2);letter-spacing:.28em;text-transform:uppercase;margin-top:.35rem}
.panel{border:1px solid var(--bd);background:var(--bg1);position:relative;padding:clamp(.85rem,3.5vw,1.7rem)}
.c1,.c2,.c3,.c4{position:absolute;width:14px;height:14px;border-color:var(--gold);border-style:solid}
.c1{top:-1px;left:-1px;border-width:2px 0 0 2px}.c2{top:-1px;right:-1px;border-width:2px 2px 0 0}
.c3{bottom:-1px;left:-1px;border-width:0 0 2px 2px}.c4{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.div{display:flex;align-items:center;gap:.7rem;margin:.9rem 0;color:var(--bd2)}
.div::before,.div::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--bd2),transparent)}
.div span{color:var(--gold);font-size:.85rem;flex-shrink:0}
#sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin-bottom:.6rem}
@media(max-width:400px){#sbar{grid-template-columns:repeat(2,1fr)}}
.sb{background:var(--bg2);border:1px solid var(--bd);padding:.45rem .5rem;text-align:center}
.sl{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.13em;color:var(--parch2);text-transform:uppercase;display:block;margin-bottom:2px;line-height:1.2}
.sv{font-family:'Cinzel',serif;font-size:clamp(.82rem,2.4vw,.98rem);font-weight:600;color:var(--gold)}
.sbo{width:100%;height:2px;background:var(--bg3);margin-top:3px;overflow:hidden}
.sbi{height:100%;transition:width .6s ease}
.bh{background:linear-gradient(90deg,#6b1010,#cc2222)}.br{background:linear-gradient(90deg,#10386b,#2266cc)}
.bn{background:linear-gradient(90deg,#5a4a0a,#c9a84c)}.bi{background:linear-gradient(90deg,#1a5a1a,#3ab03a)}
#topbar{display:flex;align-items:center;gap:.4rem;margin-bottom:.65rem;flex-wrap:wrap}
.tbarbtn{background:var(--bg3);border:1px solid var(--bd2);color:var(--parch2);font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .65rem;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.tbarbtn:hover{border-color:var(--gold);color:var(--gold)}
.tbarbtn.fiche{border-color:var(--bd3);color:var(--gold2)}.tbarbtn.fiche:hover{background:rgba(201,168,76,.1)}
#savemsg2{font-family:'Cinzel',serif;font-size:.5rem;color:var(--parch3);flex:1;text-align:right;letter-spacing:.06em}
#inv-bar{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.65rem;min-height:20px}
.ibadge{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.06em;padding:2px 7px;border:1px solid var(--bd3);background:var(--bg3);color:var(--gold2);display:inline-flex;align-items:center;gap:3px}
.ibadge.eq{border-color:var(--gold);background:rgba(201,168,76,.07)}
#ttsbar{display:flex;align-items:center;gap:.4rem;padding:.42rem .65rem;background:var(--bg2);border:1px solid var(--bd);margin-bottom:.65rem;flex-wrap:wrap}
.tbtn{background:transparent;border:1px solid var(--bd2);color:var(--parch2);font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.09em;text-transform:uppercase;padding:.28rem .55rem;cursor:pointer;transition:all .18s;flex-shrink:0}
.tbtn:hover{border-color:var(--gold);color:var(--gold)}.tbtn.on{background:var(--crim);border-color:var(--crim2);color:var(--gold)}
.tlbl{font-family:'Cinzel',serif;font-size:.53rem;letter-spacing:.12em;color:var(--parch3);text-transform:uppercase;white-space:nowrap}
.wave{display:flex;align-items:center;gap:2px;height:13px}
.wave span{width:2px;background:var(--gold);border-radius:1px;animation:wv 1s ease-in-out infinite}
.wave span:nth-child(2){animation-delay:.1s;height:8px}.wave span:nth-child(3){animation-delay:.2s;height:12px}
.wave span:nth-child(4){animation-delay:.3s;height:6px}.wave span:nth-child(5){animation-delay:.4s;height:10px}
@keyframes wv{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}.wave.h{display:none}
.spsel{background:var(--bg2);border:1px solid var(--bd2);color:var(--parch2);font-family:'Cinzel',serif;font-size:.53rem;letter-spacing:.07em;padding:.25rem .4rem;cursor:pointer;outline:none}
.chmark{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;color:var(--bd2);text-transform:uppercase;text-align:right;margin-bottom:.4rem}
#stitle{font-family:'Cinzel',serif;font-size:clamp(.92rem,3vw,1.18rem);font-weight:600;color:var(--gold);text-align:center;margin-bottom:.8rem;letter-spacing:.04em;line-height:1.3}
.pgnum{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.14em;color:var(--parch3);text-align:center;margin:.5rem 0}
.stag{display:inline-block;font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.15em;text-transform:uppercase;padding:3px 8px;margin-bottom:.7rem;border:1px solid}
.t-exp{color:#6ab0d4;border-color:#2a5a7a;background:rgba(42,90,122,.08)}
.t-com{color:var(--blood);border-color:var(--crim);background:rgba(139,26,26,.08)}
.t-che{color:#c8940a;border-color:#8a6000;background:rgba(200,148,10,.08)}
.t-lor{color:#8090d4;border-color:#3a4a8b;background:rgba(58,74,139,.08)}
.t-npc{color:#6ab08a;border-color:#1a6b3a;background:rgba(26,107,58,.08)}
.t-tra{color:#d46a6a;border-color:#882222;background:rgba(136,34,34,.08)}
.t-eve{color:var(--gold2);border-color:var(--bd3);background:rgba(201,168,76,.06)}
#nbox{line-height:1.95;font-size:clamp(.9rem,2.3vw,1.01rem);color:var(--parch);min-height:80px}
#nbox p{margin-bottom:.65rem}#nbox p:last-child{margin-bottom:0}
.tcur{display:inline-block;width:2px;height:1em;background:var(--gold);vertical-align:text-bottom;animation:blink 1s step-end infinite;margin-left:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.outbox{background:var(--bg3);border-left:3px solid var(--gold);padding:.75rem .95rem;margin-top:.7rem;font-style:italic;color:var(--parch);line-height:1.85;font-size:clamp(.86rem,2.2vw,.95rem)}
.outbox.og{border-left-color:var(--grn)}.outbox.ob{border-left-color:var(--blood)}.outbox.oc{border-left-color:#c8940a}
.lootln{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.09em;color:#c8940a;text-align:center;padding:.38rem;margin:.45rem 0;border:1px dashed rgba(200,148,10,.3);background:rgba(200,148,10,.04)}
.robln{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.09em;color:var(--blood);text-align:center;padding:.38rem;margin:.45rem 0;border:1px dashed var(--crim);background:rgba(139,26,26,.06)}
#carea{margin-top:1.2rem;display:flex;flex-direction:column;gap:.5rem}
.cbtn{background:var(--bg2);border:1px solid var(--bd2);color:var(--parch);font-family:'Crimson Text',serif;font-size:clamp(.86rem,2.2vw,.96rem);padding:.72rem .9rem .72rem 1rem;cursor:pointer;text-align:left;position:relative;transition:all .18s;line-height:1.5;width:100%}
.cbtn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--crim);transition:background .18s}
.cbtn:hover{background:var(--bg3);border-color:var(--gold);color:var(--gold2)}
.cbtn:hover::before{background:var(--gold)}.cbtn:active{transform:scale(.99)}.cbtn:disabled{opacity:.3;cursor:not-allowed}
.clet{font-family:'Cinzel',serif;font-size:.63rem;font-weight:600;color:var(--gold);margin-right:.45rem;letter-spacing:.04em}
.chint{display:block;font-size:.75rem;color:var(--parch3);font-style:italic;margin-top:.12rem;padding-left:1.35rem}
.cbtn.cc::before{background:#c8940a}.cbtn.cc:hover{border-color:#c8940a;color:#e8b840}
.cbtn.cn::before{background:#2a6b2a}.cbtn.co::before{background:var(--blood)}.cbtn.ce::before{background:#2a6a9a}
.dtag{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.1em;padding:1px 5px;border:1px solid var(--bd3);color:var(--parch3);margin-right:.3rem;vertical-align:middle;background:var(--bg3)}
#nextbtn{display:none;width:100%;margin-top:1rem;background:var(--bg3);border:1px solid var(--gold);color:var(--gold2);font-family:'Cinzel',serif;font-size:.75rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:.72rem 1.2rem;cursor:pointer;transition:all .2s}
#nextbtn:hover{background:rgba(201,168,76,.12)}.#nextbtn:active{transform:scale(.99)}
#narea{min-height:22px;display:flex;justify-content:center;gap:.35rem;flex-wrap:wrap;margin:.3rem 0;align-items:center}
.notif{display:inline-block;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.07em;padding:2px 6px;animation:fu 2.8s ease forwards}
.np{color:#6ccc6c;background:rgba(108,204,108,.1)}.nn{color:#cc6c6c;background:rgba(204,108,108,.1)}
@keyframes fu{0%{opacity:0;transform:translateY(5px)}15%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateY(-5px)}}
#dice-overlay{display:none;position:fixed;inset:0;background:rgba(4,2,1,.9);z-index:500;align-items:center;justify-content:center;flex-direction:column;padding:1rem}
#dice-overlay.show{display:flex}
.dice-box{background:var(--bg1);border:1px solid var(--bd2);padding:1.8rem 1.5rem;max-width:420px;width:100%;text-align:center}
.dice-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem}
#dface{width:80px;height:80px;border:2px solid var(--gold);background:var(--bg2);font-family:'Cinzel',serif;font-size:2.5rem;font-weight:700;color:var(--gold2);display:inline-flex;align-items:center;justify-content:center;margin-bottom:.5rem;box-shadow:0 0 20px rgba(201,168,76,.15),inset 0 0 12px rgba(0,0,0,.6)}
#dface.rolling{animation:droll .1s ease-in-out infinite alternate}
#dface.land{animation:dland .4s ease-out forwards}
@keyframes droll{0%{transform:rotate(-8deg) scale(.96)}100%{transform:rotate(8deg) scale(1.04)}}
@keyframes dland{0%{transform:rotate(5deg) scale(1.15)}60%{transform:rotate(-2deg) scale(.97)}100%{transform:rotate(0) scale(1)}}
.dlabel{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--parch3);margin-bottom:1rem}
#dresult{font-family:'Cinzel',serif;font-size:.88rem;letter-spacing:.08em;color:var(--gold2);padding:.5rem .8rem;background:rgba(201,168,76,.08);border:1px solid var(--bd3);margin-bottom:.8rem;min-height:2.2rem}
.dtable{width:100%;border-collapse:collapse;font-size:.72rem}
.dtable td{padding:.28rem .45rem;border-bottom:1px solid var(--bg3);color:var(--parch2)}
.dtable td:first-child{font-family:'Cinzel',serif;font-size:.6rem;font-weight:600;color:var(--gold);width:50px}
.dtable tr.dactive td{background:rgba(201,168,76,.12);color:var(--gold2)}
#sheet-overlay{display:none;position:fixed;inset:0;background:rgba(4,2,1,.97);z-index:400;overflow-y:auto;padding:1rem}
#sheet-overlay.show{display:block}
.sh-inner{max-width:560px;margin:0 auto}
.sh-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.sh-title{font-family:'Cinzel Decorative',serif;font-size:clamp(.9rem,3vw,1.2rem);color:var(--gold);letter-spacing:.06em}
.sh-close{background:transparent;border:1px solid var(--bd2);color:var(--parch2);font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.38rem .75rem;cursor:pointer;transition:all .18s}
.sh-close:hover{border-color:var(--blood);color:var(--blood)}
.sh-id{display:flex;align-items:center;gap:.9rem;padding:.65rem .85rem;background:var(--bg2);border:1px solid var(--bd);margin-bottom:.75rem}
.sh-icon{font-size:1.9rem;flex-shrink:0}
.sh-name{font-family:'Cinzel',serif;font-size:.95rem;font-weight:600;color:var(--gold)}
.sh-faction{font-size:.75rem;color:var(--parch2);font-style:italic;margin-top:.2rem}
.sh-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.45rem;margin-bottom:.75rem}
.sh-stat{background:var(--bg2);border:1px solid var(--bd);padding:.45rem .4rem;text-align:center}
.sh-stat-lbl{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.1em;color:var(--parch3);text-transform:uppercase;display:block;margin-bottom:2px}
.sh-stat-val{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:var(--gold)}
.sh-stat-val.up{color:var(--grn)}
.sh-sec{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--parch3);margin-bottom:.45rem}
.eq-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;margin-bottom:.75rem}
.eq-slot{background:var(--bg2);border:1px dashed var(--bd2);padding:.6rem .55rem;text-align:center;cursor:pointer;transition:all .2s;min-height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.22rem}
.eq-slot.full{border-style:solid;border-color:var(--bd3);background:rgba(201,168,76,.04)}
.eq-slot.full:hover{border-color:var(--gold)}
.eq-slot-lbl{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--parch3)}
.eq-slot-ico{font-size:1.3rem}
.eq-slot-name{font-family:'Cinzel',serif;font-size:.56rem;color:var(--gold2);letter-spacing:.04em}
.eq-slot-bonus{font-size:.62rem;color:var(--grn);font-style:italic}
.eq-slot-empty{font-size:.62rem;color:var(--bd2);font-style:italic}
.pack-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:.75rem}
.pk-slot{background:var(--bg2);border:1px dashed var(--bd2);padding:.5rem .4rem;text-align:center;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.2rem}
.pk-slot.full{border-style:solid;border-color:var(--bd3)}
.pk-ico{font-size:1.1rem}.pk-name{font-family:'Cinzel',serif;font-size:.48rem;color:var(--gold2);line-height:1.3}
.pk-use{background:var(--bg3);border:1px solid var(--bd2);color:var(--parch2);font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.07em;text-transform:uppercase;padding:2px 5px;cursor:pointer;margin-top:.15rem;transition:all .15s;width:100%}
.pk-use:hover{border-color:var(--gold);color:var(--gold)}
.inv-list{display:flex;flex-direction:column;gap:.38rem;max-height:220px;overflow-y:auto}
.inv-row{display:flex;align-items:center;gap:.55rem;padding:.45rem .65rem;background:var(--bg2);border:1px solid var(--bd)}
.inv-ico{font-size:1rem;flex-shrink:0}
.inv-info{flex:1}
.inv-name{font-family:'Cinzel',serif;font-size:.62rem;color:var(--gold);letter-spacing:.04em}
.inv-desc{font-size:.66rem;color:var(--parch2);font-style:italic;margin-top:1px}
.inv-btn{background:var(--crim);border:1px solid var(--crim2);color:var(--gold);font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;padding:.25rem .55rem;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.inv-btn:hover{background:var(--crim2);border-color:var(--gold)}
.inv-btn.pk{background:var(--bg3);border-color:var(--bd3);color:var(--parch2)}.inv-btn.pk:hover{border-color:var(--gold);color:var(--gold)}
.epanel{text-align:center;padding:.4rem}
.esym{font-size:2.5rem;margin-bottom:.6rem;display:block}
.etitle{font-family:'Cinzel Decorative',serif;font-size:clamp(.95rem,3.5vw,1.3rem);color:var(--gold);margin-bottom:.55rem}
.etxt{font-style:italic;line-height:1.9;color:var(--parch);margin-bottom:.9rem;font-size:clamp(.86rem,2.2vw,.96rem)}
.lq{font-style:italic;color:var(--parch2);font-size:.84rem;text-align:center;border-left:2px solid var(--crim);padding:.4rem .8rem;margin:.85rem 0;line-height:1.6}
.fbadge{display:inline-flex;align-items:center;gap:.4rem;background:var(--bg3);border:1px solid var(--bd2);padding:.28rem .62rem;font-family:'Cinzel',serif;font-size:.65rem;color:var(--gold);letter-spacing:.06em;margin-bottom:.7rem}
.ilore{font-style:italic;color:var(--parch2);line-height:1.88;font-size:clamp(.85rem,2.2vw,.93rem);margin-bottom:.85rem}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;margin-top:.85rem}
@media(max-width:480px){.fgrid{grid-template-columns:repeat(2,1fr)}}
.fc{border:1px solid var(--bd);background:var(--bg2);padding:clamp(.65rem,3vw,.95rem) .65rem;cursor:pointer;text-align:center;transition:all .22s}
.fc:hover{border-color:var(--gold);background:var(--bg3);transform:translateY(-2px)}
.fi{font-size:clamp(1.4rem,4.5vw,1.8rem);margin-bottom:.3rem;display:block}
.fn{font-family:'Cinzel',serif;font-size:clamp(.58rem,1.7vw,.75rem);font-weight:600;color:var(--gold);letter-spacing:.04em}
.fd{font-size:clamp(.62rem,1.7vw,.74rem);color:var(--parch2);margin-top:.22rem;line-height:1.3;font-style:italic}
.fsl{font-family:'Cinzel',serif;font-size:.48rem;color:var(--steel);letter-spacing:.07em;margin-top:.4rem;border-top:1px solid var(--bd);padding-top:.32rem}
.niw{margin-top:.95rem;display:flex;gap:.45rem;flex-wrap:wrap}
.ni{flex:1;min-width:140px;background:var(--bg2);border:1px solid var(--bd2);color:var(--parch);font-family:'Cinzel',serif;font-size:.86rem;padding:.62rem .82rem;outline:none;letter-spacing:.04em;transition:border-color .2s}
.ni:focus{border-color:var(--gold)}.ni::placeholder{color:var(--bd2)}
.btnp{background:var(--crim);border:1px solid var(--crim2);color:var(--gold);font-family:'Cinzel',serif;font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:.62rem 1rem;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.btnp:hover{background:var(--crim2);border-color:var(--gold)}
.btns{background:transparent;border:1px solid var(--bd2);color:var(--parch2);font-family:'Cinzel',serif;font-size:.63rem;letter-spacing:.12em;text-transform:uppercase;padding:.45rem .85rem;cursor:pointer;transition:all .2s;display:block;margin-top:.65rem}
.btns:hover{border-color:var(--gold);color:var(--gold)}
</style>
</head>
<body>
<div id="app">
  <header class="hdr">
    <span class="aquila">&#9769;</span>
    <h1 class="t-main">Warhammer 40,000</h1>
    <p class="t-sub">Chroniques de l'Imperium</p>
  </header>
  <main id="main"></main>
</div>
<div id="dice-overlay">
  <div class="dice-box">
    <div class="dice-title" id="dice-title">Lancer du Destin</div>
    <div id="dface">?</div>
    <div class="dlabel">D10</div>
    <div id="dresult"></div>
    <table class="dtable" id="dtable">

/* SOUND ENGINE */
var AC=null;
function getAC(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
document.addEventListener('click',function(){getAC();},{once:true});

function snd_pageTurn(){
  var ac=getAC();if(!ac)return;
  var len=Math.floor(ac.sampleRate*0.18);
  var buf=ac.createBuffer(1,len,ac.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.5)*0.55;
  var src=ac.createBufferSource();src.buffer=buf;
  var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(2800,ac.currentTime);f.frequency.linearRampToValueAtTime(800,ac.currentTime+0.16);f.Q.value=0.8;
  var g=ac.createGain();g.gain.setValueAtTime(0.7,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+0.18);
  src.connect(f);f.connect(g);g.connect(ac.destination);
  src.start();src.stop(ac.currentTime+0.2);
}

function snd_dice(){
  var ac=getAC();if(!ac)return;
  var clicks=[0,0.06,0.11,0.15,0.185,0.21];
  for(var i=0;i<clicks.length;i++){
    (function(t,last){
      var o=ac.createOscillator();var g=ac.createGain();
      o.type='sine';var freq=340+Math.random()*180;
      o.frequency.setValueAtTime(freq,ac.currentTime+t);
      o.frequency.exponentialRampToValueAtTime(freq*0.55,ac.currentTime+t+0.04);
      g.gain.setValueAtTime(0,ac.currentTime+t);
      g.gain.linearRampToValueAtTime(last?0.55:0.3,ac.currentTime+t+0.005);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+0.055);
      o.connect(g);g.connect(ac.destination);
      o.start(ac.currentTime+t);o.stop(ac.currentTime+t+0.06);
    })(clicks[i],i===clicks.length-1);
  }
}

function snd_battle(){
  var ac=getAC();if(!ac)return;
  var dur=1.8;
  var len=Math.floor(ac.sampleRate*dur);
  var buf=ac.createBuffer(1,len,ac.sampleRate);
  var bd=buf.getChannelData(0);
  for(var i=0;i<len;i++){var t=i/ac.sampleRate;bd[i]=(Math.random()*2-1)*0.35*Math.sin(t*22)*Math.max(0,1-t/dur);}
  var rumble=ac.createBufferSource();rumble.buffer=buf;
  var lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=160;
  var rg=ac.createGain();rg.gain.setValueAtTime(0.5,ac.currentTime);rg.gain.linearRampToValueAtTime(0,ac.currentTime+dur);
  rumble.connect(lp);lp.connect(rg);rg.connect(ac.destination);
  rumble.start();rumble.stop(ac.currentTime+dur);
  var impacts=[0.05,0.22,0.48,0.71,1.0,1.35];
  for(var j=0;j<impacts.length;j++){
    (function(t){
      var o=ac.createOscillator();var g=ac.createGain();
      o.type='sawtooth';o.frequency.setValueAtTime(95+Math.random()*60,ac.currentTime+t);
      o.frequency.exponentialRampToValueAtTime(35,ac.currentTime+t+0.18);
      g.gain.setValueAtTime(0.45,ac.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+0.22);
      var dist=ac.createWaveShaper();
      var c=new Float32Array(256);for(var k=0;k<256;k++)c[k]=Math.tanh((k/128-1)*4);
      dist.curve=c;
      o.connect(dist);dist.connect(g);g.connect(ac.destination);
      o.start(ac.currentTime+t);o.stop(ac.currentTime+t+0.25);
    })(impacts[j]);
  }
}

function snd_damnation(){
  var ac=getAC();if(!ac)return;
  var dur=2.5;
  var freqs=[55,82,110];
  for(var i=0;i<freqs.length;i++){
    (function(sf,idx){
      var o=ac.createOscillator();var g=ac.createGain();
      o.type=idx===0?'sawtooth':'sine';
      o.frequency.setValueAtTime(sf,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(sf*0.35,ac.currentTime+dur);
      g.gain.setValueAtTime(0.001,ac.currentTime);
      g.gain.linearRampToValueAtTime(0.28-idx*0.07,ac.currentTime+0.08);
      g.gain.linearRampToValueAtTime(0.001,ac.currentTime+dur);
      var lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=200;
      o.connect(lp);lp.connect(g);g.connect(ac.destination);
      o.start();o.stop(ac.currentTime+dur+0.1);
    })(freqs[i],i);
  }
  var sting=ac.createOscillator();var sg=ac.createGain();
  sting.type='square';sting.frequency.setValueAtTime(880,ac.currentTime);
  sting.frequency.exponentialRampToValueAtTime(220,ac.currentTime+1.2);
  sg.gain.setValueAtTime(0.001,ac.currentTime);sg.gain.linearRampToValueAtTime(0.12,ac.currentTime+0.05);
  sg.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+1.2);
  var hp=ac.createBiquadFilter();hp.type='bandpass';hp.frequency.value=600;hp.Q.value=3;
  sting.connect(hp);hp.connect(sg);sg.connect(ac.destination);
  sting.start();sting.stop(ac.currentTime+1.3);
  var ilen=Math.floor(ac.sampleRate*0.15);
  var ibuf=ac.createBuffer(1,ilen,ac.sampleRate);
  var idat=ibuf.getChannelData(0);
  for(var j=0;j<ilen;j++) idat[j]=(Math.random()*2-1)*Math.pow(1-j/ilen,0.6)*0.7;
  var isrc=ac.createBufferSource();isrc.buffer=ibuf;
  var ig=ac.createGain();ig.gain.value=0.55;
  isrc.connect(ig);ig.connect(ac.destination);
  isrc.start();isrc.stop(ac.currentTime+0.2);
}

/* TTS */
var synt=window.speechSynthesis;
var voices=[];
var ttsQueue=[];
var ttsActive=false;

function loadV(){
  if(!synt)return;
  var all=synt.getVoices();
  var frAll=all.filter(function(v){return v.lang.startsWith('fr');});
  var maleNames=['thomas','thomas (premium)','nicolas','pierre','henri','guillaume','french male','homme','male'];
  var male=frAll.filter(function(v){
    var n=v.name.toLowerCase();
    return maleNames.some(function(m){return n.indexOf(m)>=0;});
  });
  if(male.length){voices=male;}
  else if(frAll.length){voices=frAll;}
  else{voices=all;}
}
if(synt){loadV();synt.onvoiceschanged=loadV;}

function getBestVoice(){
  var maleNames=['thomas','thomas (premium)','nicolas','pierre','henri','guillaume','french male','homme'];
  for(var i=0;i<voices.length;i++){
    var n=voices[i].name.toLowerCase();
    if(maleNames.some(function(m){return n.indexOf(m)>=0;}))return voices[i];
  }
  var frFR=voices.filter(function(v){return v.lang==='fr-FR';});
  if(frFR.length)return frFR[0];
  return voices[0]||null;
}

function cleanTxt(txt){
  return txt
    .replace(/<[^>]*>/g,'')
    .replace(/&[a-z0-9#]+;/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

// Split text into natural breath-groups for human-paced reading
function splitSentences(txt){
  var t=cleanTxt(txt);
  // Replace paragraph breaks with sentence-ending markers
  t=t.replace(/\n\n/g,' [P] ');
  // Split on sentence endings, keeping the punctuation
  var raw=t.split(/(?<=[.!?])\s+|(?<=\?)\s+|(?<=!)\s+|\[P\]/);
  var out=[];
  for(var i=0;i<raw.length;i++){
    var s=raw[i].trim();
    if(!s)continue;
    // If a sentence is very long, break at a natural comma pause
    if(s.length>120){
      var halves=s.split(/,\s+(?=\w)/);
      var buf='';
      for(var j=0;j<halves.length;j++){
        buf=buf?(buf+', '+halves[j]):halves[j];
        if(buf.length>70||j===halves.length-1){out.push(buf.trim());buf='';}
      }
    } else {
      out.push(s);
    }
  }
  return out.filter(function(s){return s.length>1;});
}

// Speak a queue of sentences with natural gaps
function speakQueue(sentences, idx){
  if(!ttsActive||!synt)return;
  if(idx>=sentences.length){ttsActive=false;S.isSpeaking=false;updWave(false);return;}
  var s=sentences[idx];
  // Detect dramatic punctuation for longer pauses
  var prevEndsWithColon=idx>0&&/[:—]$/.test(sentences[idx-1]);
  var gap=prevEndsWithColon?320:idx===0?0:120;
  setTimeout(function(){
    if(!ttsActive||!synt)return;
    var u=new SpeechSynthesisUtterance(s);
    var v=getBestVoice();
    if(v)u.voice=v;
    // Vary rate slightly per sentence for naturalness (±0.04)
    var baseRate=0.84;
    var jitter=(Math.random()*0.08)-0.04;
    u.rate=baseRate+jitter;
    // Slightly higher pitch for short exclamations, lower for long exposition
    u.pitch=s.length<30?0.88:0.82;
    u.volume=1;
    u.onstart=function(){S.isSpeaking=true;updWave(true);};
    u.onend=function(){
      // Natural pause between sentences: 80-180ms depending on ending punctuation
      var pause=s.match(/[.!?]$/)
        ?(s.match(/[!?]$/)?160:110)
        :60;
      setTimeout(function(){speakQueue(sentences,idx+1);},pause);
    };
    u.onerror=function(){speakQueue(sentences,idx+1);};
    synt.speak(u);
  },gap);
}

function speak(txt){
  if((!S.ttsOn&&!S.autoRead)||!synt)return;
  synt.cancel();
  ttsActive=true;
  ttsQueue=splitSentences(txt);
  if(!ttsQueue.length){ttsActive=false;return;}
  speakQueue(ttsQueue,0);
}

function stopSpeak(){
  ttsActive=false;
  ttsQueue=[];
  if(synt){synt.cancel();}
  S.isSpeaking=false;
  updWave(false);
}
function updWave(a){
  var w=document.getElementById('ttswave');if(w)w.className='wave'+(a?'':' h');
  var b=document.getElementById('ttsbtn');
  if(b){b.className='tbtn'+(S.ttsOn?' on':'');b.innerHTML=S.ttsOn?'&#128266; Voix ON':'&#128263; Voix OFF';}
  var ab=document.getElementById('autobtn');
  if(ab){ab.className='tbtn'+(S.autoRead?' on':'');ab.innerHTML=S.autoRead?'&#9654; Auto ON':'&#9654; Auto OFF';}
}
function toggleTTS(){
  S.ttsOn=!S.ttsOn;
  updWave(false);
  if(!S.ttsOn){stopSpeak();}
  else if(S.curNar)speak(S.curNar);
}
function toggleAutoRead(){
  S.autoRead=!S.autoRead;
  if(S.autoRead&&!S.ttsOn){S.ttsOn=true;}
  updWave(false);
  if(!S.autoRead)stopSpeak();
  else if(S.curNar)speak(S.curNar);
}

/* DICE */
function rollD10(){return Math.ceil(Math.random()*10);}
function diceCategory(r){
  if(r===1) return {cat:'FUMBLE',  good:false,crit:false,fumble:true};
  if(r<=3)  return {cat:'RATE',    good:false,crit:false,fumble:false};
  if(r<=6)  return {cat:'TOUCHE',  good:true, crit:false,fumble:false};
  if(r<=8)  return {cat:'SOLIDE',  good:true, crit:false,fumble:false};
  if(r===9) return {cat:'CRITIQUE',good:true, crit:true, fumble:false};
  return           {cat:'MAITRISE',good:true, crit:true, fumble:false};
}
function animDice(result,cb){
  var el=document.getElementById('dface');if(!el){if(cb)cb();return;}
  var steps=[60,60,65,70,80,95,115,140,175,220,280,360];
  var i=0;el.className='rolling';el.style.color='var(--parch2)';
  function step(){
    if(i<steps.length-1){el.textContent=Math.ceil(Math.random()*10);setTimeout(step,steps[i++]);}
    else{el.textContent=result;el.className='land';el.style.color='var(--gold2)';if(cb)setTimeout(cb,500);}
  }
  step();
}

function showDice(label,cb){
  var ov=document.getElementById('dice-overlay');
  var df=document.getElementById('dface');var dr=document.getElementById('dresult');
  var dt=document.getElementById('dice-title');
  if(dt)dt.textContent=label||'Lancer du Destin';
  if(df){df.textContent='?';df.className='';df.style.color='var(--parch2)';}
  if(dr)dr.textContent='';
  document.querySelectorAll('#dtable tr').forEach(function(tr){tr.className='';});
  ov.className='show';
  setTimeout(function(){
    snd_dice();
    var r=rollD10();
    animDice(r,function(){
      var cat=diceCategory(r);
      highlightDice(r);
      if(dr)dr.textContent=r+' \u2014 '+cat.cat;
      setTimeout(function(){ov.className='';if(cb)cb(r,cat);},1400);
    });
  },300);
}

/* INVENTORY */
function addItem(itemId){
  var it=ITEMS[itemId];if(!it)return;
  if(it.slot==='weapon'&&!S.equip.weapon){S.equip.weapon=it;applyBonus(it);return;}
  if(it.slot==='armor' &&!S.equip.armor) {S.equip.armor=it; applyBonus(it);return;}
  if(it.slot==='head'  &&!S.equip.head)  {S.equip.head=it;  applyBonus(it);return;}
  var pi=S.pack.indexOf(null);
  if(pi>=0){S.pack[pi]=it;applyBonus(it);return;}
  S.inventory.push(it);applyBonus(it);
}
function applyBonus(it){
  if(it.resBonus)  S.res=clamp(S.res+it.resBonus);
  if(it.xpBonus)   S.xp+=it.xpBonus;
  if(it.honorBonus)S.honor=clamp(S.honor+it.honorBonus);
}
function stripAll(){
  S.equip={weapon:null,armor:null,head:null};
  S.pack=[null,null,null,null];S.inventory=[];
  S.hp=clamp(S.hp,0,S.maxHp);
  snd_damnation();
}
function equipItem(idx){
  var it=S.inventory[idx];if(!it)return;
  var old=S.equip[it.slot];S.equip[it.slot]=it;S.inventory.splice(idx,1);
  if(old)S.inventory.push(old);openSheet();
}
function unequip(slot){var it=S.equip[slot];if(!it)return;S.equip[slot]=null;S.inventory.push(it);openSheet();}
function putInPack(idx){var it=S.inventory[idx];if(!it)return;var pi=S.pack.indexOf(null);if(pi<0)return;S.pack[pi]=it;S.inventory.splice(idx,1);openSheet();}
function unpack(pi){var it=S.pack[pi];if(!it)return;S.pack[pi]=null;S.inventory.push(it);openSheet();}
function usePack(pi){var it=S.pack[pi];if(!it||!it.healHp)return;S.hp=clamp(S.hp+it.healHp,0,getMaxHp());S.pack[pi]=null;openSheet();}

/* CHARACTER SHEET */
function openSheet(){
  var ov=document.getElementById('sheet-overlay');ov.className='show';
  var atk=getAtk(),def=getDef(),mhp=getMaxHp();
  var slots=[{key:'weapon',lbl:'&#9876; Arme'},{key:'armor',lbl:'&#128737; Armure'},{key:'head',lbl:'&#9937; Tete'}];
  var eqHtml=slots.map(function(sd){
    var it=S.equip[sd.key];
    if(it){
      var b='';if(it.atk)b+='+'+it.atk+' ATK ';if(it.def)b+='+'+it.def+' DEF ';if(it.hpBonus)b+='+'+it.hpBonus+' PV max';
      return '<div class="eq-slot full" onclick="unequip(\''+sd.key+'\')" title="Cliquer pour desequiper">'
        +'<div class="eq-slot-lbl">'+sd.lbl+'</div><div class="eq-slot-ico">'+it.ico+'</div>'
        +'<div class="eq-slot-name">'+it.name+'</div><div class="eq-slot-bonus">'+b.trim()+'</div></div>';
    }
    return '<div class="eq-slot"><div class="eq-slot-lbl">'+sd.lbl+'</div><div class="eq-slot-empty">Vide</div></div>';
  }).join('');
  var packHtml=S.pack.map(function(it,i){
    if(it){
      var canUse=it.slot==='consumable'&&it.healHp>0;
      return '<div class="pk-slot full"><div class="pk-ico">'+it.ico+'</div><div class="pk-name">'+it.name+'</div>'
        +(canUse?'<button class="pk-use" onclick="usePack('+i+')">Utiliser</button>':'')
        +'<button class="pk-use" onclick="unpack('+i+')" style="margin-top:2px">Retirer</button></div>';
    }
    return '<div class="pk-slot"><div style="color:var(--bd2);font-size:.62rem;font-style:italic">Vide</div></div>';
  }).join('');
  var invHtml='';
  if(S.inventory.length){
    invHtml=S.inventory.map(function(it,i){
      var canEq=it.slot==='weapon'||it.slot==='armor'||it.slot==='head';
      var canPk=it.slot==='consumable'||it.slot==='trinket';
      var b=it.desc;if(it.atk)b+=' +'+it.atk+' ATK';if(it.def)b+=' +'+it.def+' DEF';if(it.hpBonus)b+=' +'+it.hpBonus+' PV';if(it.healHp)b+=' Soin '+it.healHp;
      return '<div class="inv-row"><span class="inv-ico">'+it.ico+'</span>'
        +'<div class="inv-info"><div class="inv-name">'+it.name+'</div><div class="inv-desc">'+b+'</div></div>'
        +(canEq?'<button class="inv-btn" onclick="equipItem('+i+')">Equiper</button>':'')
        +(canPk?'<button class="inv-btn pk" onclick="putInPack('+i+')">Sac</button>':'')
        +'</div>';
    }).join('');
  }else{invHtml='<div style="color:var(--parch3);font-style:italic;font-size:.78rem;padding:.5rem">Inventaire vide</div>';}
  document.getElementById('sh-content').innerHTML=
    '<div class="sh-hdr"><div class="sh-title">&#128203; Fiche du Guerrier</div>'
    +'<button class="sh-close" onclick="closeSheet()">&#10005; Fermer</button></div>'
    +'<div class="sh-id"><div class="sh-icon">'+(S.fdata?S.fdata.ico:'?')+'</div>'
    +'<div><div class="sh-name">'+S.name+'</div><div class="sh-faction">'+(S.fdata?S.fdata.name+' &mdash; '+S.fdata.chapter:'')+'</div></div></div>'
    +'<div class="sh-stats">'
    +'<div class="sh-stat"><span class="sh-stat-lbl">PV</span><span class="sh-stat-val">'+S.hp+'/'+mhp+'</span></div>'
    +'<div class="sh-stat"><span class="sh-stat-lbl">Attaque</span><span class="sh-stat-val'+(S.equip.weapon?' up':'')+'">'+atk+'</span></div>'
    +'<div class="sh-stat"><span class="sh-stat-lbl">Defense</span><span class="sh-stat-val'+((S.equip.armor||S.equip.head)?' up':'')+'">'+def+'</span></div>'
    +'<div class="sh-stat"><span class="sh-stat-lbl">Honneur</span><span class="sh-stat-val">'+S.honor+'</span></div>'
    +'</div>'
    +mkdiv()
    +'<div class="sh-sec">Equipement actif <span style="font-size:.5rem;color:var(--parch3)">(cliquer pour desequiper)</span></div>'
    +'<div class="eq-row">'+eqHtml+'</div>'
    +mkdiv()
    +'<div class="sh-sec">Sac a dos ('+S.pack.filter(Boolean).length+'/4)</div>'
    +'<div class="pack-row">'+packHtml+'</div>'
    +(S.inventory.length?mkdiv()+'<div class="sh-sec">Inventaire</div><div class="inv-list">'+invHtml+'</div>':'')
    +'<div style="margin-top:1.1rem;text-align:center"><button class="btns" onclick="closeSheet()">Retour a l\'aventure</button></div>';
}
function closeSheet(){document.getElementById('sheet-overlay').className='';}

/* SAVE / LOAD */
var SAVE_KEY='wh40k_v5';
function saveGame(){
  var sv={faction:S.faction,name:S.name,hp:S.hp,maxHp:S.maxHp,res:S.res,honor:S.honor,xp:S.xp,
    baseAtk:S.baseAtk,baseDef:S.baseDef,equip:S.equip,pack:S.pack,inventory:S.inventory,
    act:S.act,pageNum:S.pageNum,usedScenes:S.usedScenes.slice(),
    sceneId:S.currentScene?S.currentScene.id:null,at:new Date().toLocaleString('fr-FR')};
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(sv));showSaveMsg('Sauvegardé OK','var(--grn)');}
  catch(e){showSaveMsg('Erreur save','var(--blood)');}
}
function loadGame(){
  try{
    var raw=localStorage.getItem(SAVE_KEY);if(!raw){showSaveMsg('Aucune sauvegardé','var(--blood)');return;}
    var sv=JSON.parse(raw);
    S.faction=sv.faction;S.fdata=FACTIONS.filter(function(f){return f.id===sv.faction;})[0];
    if(!S.fdata){showSaveMsg('Fichier corrompu','var(--blood)');return;}
    S.name=sv.name;S.hp=sv.hp;S.maxHp=sv.maxHp||100;S.res=sv.res;S.honor=sv.honor;S.xp=sv.xp;
    S.baseAtk=sv.baseAtk||S.fdata.baseAtk;S.baseDef=sv.baseDef||S.fdata.baseDef;
    S.equip=sv.equip||{weapon:null,armor:null,head:null};
    S.pack=sv.pack||[null,null,null,null];S.inventory=sv.inventory||[];
    S.act=sv.act;S.pageNum=sv.pageNum||1;S.usedScenes=sv.usedScenes||[];S.pendingDeltas=null;
    var sc=sv.sceneId?SCENES.filter(function(s){return s.id===sv.sceneId;})[0]:null;
    if(sc){S.currentScene=sc;renderScene(sc,null);}else{S.act--;nextScene(null,null);}
    showSaveMsg('Chargé: '+sv.at,'var(--grn)');
  }catch(e){showSaveMsg('Illisible','var(--blood)');}
}
function hasSave(){try{return!!localStorage.getItem(SAVE_KEY);}catch(e){return false;}}
function showSaveMsg(msg,col){
  var el=document.getElementById('savemsg2');
  if(el){el.textContent=msg;el.style.color=col;setTimeout(function(){if(el){el.textContent=saveStatusText();el.style.color='';}},3200);}
}
function saveStatusText(){
  try{var r=localStorage.getItem(SAVE_KEY);if(!r)return 'Pas de sauvegardé';var s=JSON.parse(r);return s.name+' Ch.'+s.act+' '+s.at;}
  catch(e){return 'Pas de sauvegardé';}
}

{id:'survivor_group',phase:'mid',tags:['all'],type:'npc',title:'Les Survivants du Secteur 7',
 nar:function(s){var t='L\'odeur vous frappé avant de les voir : sueur, peur concentree, et rations imperiales ouvertes depuis trop longtemps.';t+=' Vingt-trois civils, entassés dans une chapelle depuis neuf jours. Des enfants blottis contre leurs parents. Un vieil homme qui tient un aquila en cuivre comme si sa vie en dependait.';t+='\n\nLeur responsable se levé. Soeur Miriam, femme d\'une cinquantaine d\'années, regard direct, voix posée malgre la fatigue écrite sur chaque ligne de son visage. Elle vous regardé avec une franchise qui vous prend par surprise.\n\nVous venez nous sauver ? Où vous venez prendre ce qu\'il nous reste ?';return t;},
 choices:[
  {text:'Les escorter vers la zone securisee.',ico:'&#128694;',type:'sacrifice',hint:'Couteux — honneur maximal',hp:-10,res:-20,honor:30,xp:20,out:'Deux heures d\'escorte sous les tirs. Vingt-trois personnes atteignent la sécurité.'},
  {text:'Leur donner provisions et instructions.',ico:'&#128506;',type:'explore',hint:'Aide partielle',hp:0,res:-15,honor:15,xp:15,out:'Vous leur laissez la moitie de vos rations et une carte. Vous n\'êtes pas certain qu\'ils y arriveront.'},
  {text:'Recruter les volontaires capables.',ico:'&#128101;',type:'npc',hint:'Renfort de combat',hp:0,res:0,honor:10,xp:10,out:'Cinq volontaires — dont un ancien Garde mécanicien. Ils connaissent le secteur mieux que vous.'}
 ]},
{id:'warp_anomaly',phase:'mid',tags:['all'],type:'trap',title:'L\'Anomalie du Warp',
 nar:function(s){var t='La réalité se fissure. Ce n\'est pas une metaphore.';t+='\n\nDans le coin de la salle, la où le mur rencontre le sol, quelque chose a cede dans le tissu de l\'espace normal. Une déchirure. Elle crepite comme de l\'electricite statique a echelle gigantesque. Des couleurs y apparaissent qui n\'ont pas de nom dans le lexique humain.';t+='\n\nDerriere la fissure, des formes — l\'idee de formes, le concept de quelque chose qui veut avoir un corps et n\'en a pas encore. Elles poussent contre la membrane de réalité comme des doigts contre du tissu tendu.\n\nLa fissure grossit. Dans dix minutes elle sera suffisamment large. Et quelque chose derrière elle sait déjà que vous êtes la.';return t;},
 choices:[
  {text:'Sceller la fissure par la priere.',ico:'&#10013;',type:'faith',hint:'Efficace si l\'honneur est élève',hp:-10,res:-5,honor:20,xp:25,dice:true,out:'Vous imposez votre volonte contre le Warp. La fissure se referme.',outBad:'La fissure résisté. Quelque chose vous effleure — doigts froids traversant votre ame.',outGood:'La fissure se referme instantanement. Un objet de foi chute au sol.',lootGood:'relique'},
  {text:'Grenade plasma pour fermer la fissure.',ico:'&#128163;',type:'combat',hint:'Forcé brute',hp:-15,res:-25,honor:5,xp:15,out:'La decharge ionise la fissure et la forcé a se refermer. Brutal. Efficace.'},
  {text:'Ignorer la fissure et progresser vite.',ico:'&#127939;',type:'explore',hint:'Rapide — la fissure reste',hp:-5,res:0,honor:-10,xp:5,out:'Vous traversez en courant. Quelque chose vous effleure dans la semi-réalité.'}
 ]},
{id:'vision_emperor',phase:'early',tags:['marine','guard','wolves','inquisitor'],type:'event',title:'La Vision du Trône Dore',
 nar:function(s){var t='Cela arrive entre deux battements de coeur.';t+='\n\nLa réalité ne disparaît pas — elle devient transparente. A travers elle, vous voyez Terra. Vous voyez le Trône d\'Or. Vous le voyez, Lui — ce squelette de lumière et de volonte absolue, assis sur le siège de Sa propre agonie depuis dix mille ans.';t+='\n\nIl tourne la tête vers vous. Pas de yeux. Pas de visage. Et pourtant vous savez, avec une certitude qui écrasé tout, qu\'Il vous voit. Qu\'Il vous a toujours vu.\n\nLa vision dure peut-être une seconde. Peut-être une éternité. Quand elle se retire, vos joues sont humides. Vous n\'avez aucun souvenir d\'avoir pleure.';return t;},
 choices:[
  {text:'Mediter sur la vision — laisser la foi se renforcer.',ico:'&#128591;',type:'faith',hint:'Restauration et honneur',hp:15,res:0,honor:25,xp:20,out:'Dix minutes immobile. Quand vous vous levez, la peur est absente.'},
  {text:'Agir immediatement — suivre l\'intuition.',ico:'&#127939;',type:'explore',hint:'Bonus XP et decouverte',hp:0,res:0,honor:15,xp:30,dice:true,out:'Vous suivez l\'intuition et trouvez exactement ce dont vous aviez besoin.',outBad:'L\'intuition vous emmene dans une impasse sous les tirs ennemis.',outGood:'Providence imperiale : équipement de qualite abandonné la.',lootGood:'casque'},
  {text:'Ignorer la vision — rester rationnel.',ico:'&#129504;',type:'explore',hint:'Rationnel',hp:0,res:10,honor:0,xp:10,out:'Vous chassez la vision. Des hallucinations en zone de combat sont normales.'}
 ]},
{id:'plague_village',phase:'mid',tags:['all'],type:'event',title:'Le Village de la Mort Douce',
 nar:function(s){var t='Le village de Keth\'al aurait du être mort depuis quatre jours. Les symptomes — les necroses rampantes, les nodules qui bougent sous la peau — font de Nurgle une évidence. Et pourtant les habitants marchent encore. Et ils sourient.';t+='\n\nC\'est le sourire qui vous troublé le plus.';t+='\n\nQuatre cents ames. Le Commissaire regional a déjà transmis les coordonnees pour la purge orbitale. Sa voix dans votre oreillette est plate, professionnelle. Mais a vos pieds, une petite fille vous tend une fleur des champs toute froissee. Ses yeux sont intacts. Pas encore contamines. Pas encore.';return t;},
 choices:[
  {text:'Ordonner la quarantaine et chercher un remede.',ico:'&#127973;',type:'sacrifice',hint:'Humanité — couteux',hp:-5,res:-20,honor:20,xp:20,dice:true,out:'La quarantaine tient. Un Biologis trouve la source. Soixante personnes survivent.',outBad:'La quarantaine cede. La maladie se répand.',outGood:'Quarantaine parfaite. Cent personnes survivent.',lootGood:'donnees'},
  {text:'Autoriser la purge orbitale immediate.',ico:'&#9732;',type:'combat',hint:'Efficace — zero risque',hp:0,res:0,honor:-15,xp:10,out:'L\'orbite brule proprement. La contamination est stoppee.'},
  {text:'Interroger les survivants avant de décider.',ico:'&#128172;',type:'npc',hint:'Peut révéler une troisieme option',hp:-10,res:-10,honor:10,xp:25,dice:true,out:'Une vieille femme vous conduit a la source. La purge est chirurgicale. Cent personnes survivent.',loot:'donnees',outBad:'Les survivants paniquent et s\'eparpillent.',outGood:'Temoignage complet. La purge parfaite sauve cent vingt personnes.',lootGood:'coords'}
 ]},
{id:'traitor_general',phase:'late',tags:['all'],type:'event',title:'Trahison au Commandement',
 nar:function(s){var t='Le General Mordechai Veyne commande le Front Sud depuis quatorze mois. Quatorze mois pendant lesquels les offensives imperiales ont échoué avec une regularite qui dépassé la statistique, la malchance, et même l\'incompetence.';t+='\n\nVous avez le dossier. Trente-deux pages de preuves. Six bataillons massacres dans des embuscades parfaites. Des coordonnees vendues. Des noms d\'agents compromis.';t+='\n\nEt il est la, a cinq mètrès de vous, penchee sur sa table, dictant des ordres d\'une voix calme et assuree. Il ne sait pas que vous savez. Demain a l\'aube, une offensive de quarante mille hommes s\'ebranle. Si Mordechai en connaît les details...';return t;},
 choices:[
  {text:'L\'arrêter publiquement.',ico:'&#128226;',type:'faith',hint:'Justice — moral',hp:0,res:0,honor:20,xp:20,out:'Le scandale secoue le commandement. L\'offensive est retardee. Votre reputation gagne en purete.'},
  {text:'L\'eliminer discretement.',ico:'&#128481;',type:'explore',hint:'Efficace — l\'honneur en souffre',hp:-5,res:-5,honor:-10,xp:15,dice:true,out:'Mort accidentelle. L\'offensive reussit. Vous dormez moins bien.',outBad:'Un temoin vous observe. L\'Inquisition ouvert un dossier.',outGood:'Exécution propre. L\'offensive beneficie d\'un avantage de surprise total.'},
  {text:'Le retourner contre ses maîtrès.',ico:'&#127917;',type:'explore',hint:'Double jeu',hp:0,res:10,honor:5,xp:30,out:'Mordechai envoie de fausses positions au Chaos. Double victoire. Double secret.'}
 ]},
{id:'chaos_marines',phase:'late',tags:['marine','guard','wolves','inquisitor'],type:'combat',title:'Les Fils de la Ruine',
 nar:function(s){var t='Ils vous attendent. Ce n\'est pas une embuscade — ils vous ont délibérément laisse approcher. Quatre Marines du Chaos qui occupent le corridor avec la decontraction de gens qui n\'ont pas eu peur depuis très longtemps.';t+='\n\nLeurs armures sont des oeuvres d\'horreur : gravees de visages hurlants, couverts de symboles qui changent si vous les regardez trop longtemps. Le plus grand porte un brassard où sont cloues des cranes en rang serres. Chacun a appartenu a quelqu\'un.';t+='\n\nRejoins-nous, dit-il. Sa voix est presque aimable. Où tombé ici. Au moins, tombé en guerrier.\n\nDerriere eux, vous apercevez ce que vous êtes venu chercher. Il faut passer. Il faut.';return t;},
 choices:[
  {text:'Pour l\'Emperor — attaque frontale.',ico:'&#9769;',type:'combat',hint:'Honneur maximal',hp:-30,res:-20,honor:25,xp:30,dice:true,out:'Deux Marines du Chaos tombent. Les deux autres reculent en crachant des maledictions.',outBad:'Vous êtes repoussé violemment. Repli forcé.',outGood:'Assaut parfait. Tous les quatre neutralises.',lootGood:'armure2'},
  {text:'Feindre la consideration — puis frapper.',ico:'&#127917;',type:'combat',hint:'Rusé — moins de dégâts',hp:-20,res:-10,honor:10,xp:20,dice:true,out:'A la seconde où leur garde baisse, vous frappez. Deux morts, deux en fuite.',outBad:'Votre feinte est percee. Ils attaquent en coordination.',outGood:'La feinte est parfaite. Trois elimines avant qu\'ils reagissent.',loot:'armure1'},
  {text:'Contourner par un conduit d\'aeration.',ico:'&#128062;',type:'explore',hint:'Aucune perte, objectif retarde',hp:-5,res:-10,honor:-5,xp:10,out:'Un conduit d\'aeration. Lent mais efficace. Vous reapparaissez derrière eux.'}

{id:'pillards',phase:'mid',tags:['all'],type:'trap',title:'L\'Embuscade des Pillards',
 nar:function(s){var t='La première silhouette surgit de l\'ombre. Puis une autre. Cinq au total — mais vous suspectez qu\'il en reste derrière vous. Des gens désespérés qui avaient le temps de préparer cette rencontre, contrairement a vous.';t+='\n\nIls ne sont pas des soldats. Ils sont pires : des survivants. Maigres, blessés, les yeux de gens qui ont vu leur monde s\'effondrer et ont décidé que votre équipement les aiderait a survivre un jour de plus.';t+='\n\nLeur chef — un homme dont la moitie du visage est tissu cicatriciel — vous tient en joue avec un pistolet assemblé a partir de trois autres cassés. Son regard est calme. Resigne. Le regard de quelqu\'un qui a déjà décidé ce qu\'il ferait si vous refusiez.\n\nL\'équipement où la vie. Simple. On a besoin de tout ce que vous portez.';return t;},
 choices:[
  {text:'Résister — attaquer les pillards en forcé.',ico:'&#9876;',type:'combat',hint:'Combat — risque de mort',hp:-30,res:-10,honor:10,xp:20,dice:true,out:'Vous en neutralisez trois avant qu\'ils se dispersent. Blessé mais debout, équipement intact.',outBad:'Ils sont trop nombreux. Un coup a la nuque vous assomme. Quand vous reprenez conscience, tout a disparu.',rob:true,outGood:'Reflexes parfaits. Les cinq pillards fuient où tombent.',loot:'munitions'},
  {text:'Negocier — offrir des ressources contre votre liberté.',ico:'&#128172;',type:'npc',hint:'Perte ressources — équipement intact',hp:0,res:-40,honor:-5,xp:10,dice:true,out:'Ils acceptent vos ressources et vous laissent passer. Humiliant mais efficace.',outBad:'Ils prennent les ressources ET l\'équipement.',rob:true,outGood:'Votre sang-froid les impressionne. Ils prennent peu.'},
  {text:'Fuir a toute vitesse dans les ruines.',ico:'&#127939;',type:'explore',hint:'Fuite — chance pure',hp:-15,res:0,honor:0,xp:10,dice:true,out:'Vous disparaissez dans les ruines. Ils abandonnent la poursuite.',outBad:'Ils vous rattrapent dans un couloir sans issue. Vous êtes dépouillé.',rob:true,outGood:'Sprint parfait. Vous semez les pillards en moins de deux minutes.'}
 ]},
{id:'finale_heretic',phase:'finale',tags:['marine','guard','wolves','inquisitor'],type:'combat',title:'Confrontation Finale — Lord Malachar',
 nar:function(s){var t='Vous avez traversé l\'enfer pour arriver ici. Litteralement.';t+='\n\nLa salle du trône de Lord Malachar n\'a plus rien d\'imperial. Les colonnes sont des vertèbres geantes, les murs palpitent d\'une lente respiration, et le trône lui-même semble avoir poussé, organique, autour de l\'homme qui y siège depuis des millénaires.';t+='\n\nIl ne se levé pas quand vous entrez. Il vous regardé — et dans ce regard vous percevez quelque chose d\'inattendu. Pas de la haine. Pas du mepris.';t+='\n\nDe la curiosite.\n\nUn guerrier qui est alle si loin, dit-il. Sa voix emplit l\'espace comme si les murs parlaient. Mourir ici sera glorieux, '+s.name+'. Presque autant que de me rejoindre.\n\nL\'air crackle. Le moment final est venu.';return t;},
 choices:[
  {text:'Pour l\'Emperor — et pour tous ceux qui sont tombés !',ico:'&#9769;',type:'combat',hint:'Le chemin de la gloire',hp:-40,res:-20,honor:40,xp:50,dice:true,out:'Le duel dure une heure. Lord Malachar tombé en maudissant votre nom. Victorieux.',outBad:'Lord Malachar est trop puissant. Vous reculez blessé.',outGood:'Le duel est parfait. Malachar tombé stupefait.',lootGood:'armure2'},
  {text:'Faire s\'effondrer la salle sur lui.',ico:'&#128163;',type:'explore',hint:'Le chemin du stratege',hp:-20,res:-35,honor:25,xp:40,dice:true,out:'Les chargés font leur travail. Le plafond s\'effondré sur Malachar.',outBad:'Les chargés declenchent une reaction magique. Malachar en ressort renforcé.',outGood:'Effondrement parfait. Malachar disparaît sous des tonnes de pierre consecree.'},
  {text:'Attendre le moment de faiblesse — puis frapper.',ico:'&#127917;',type:'explore',hint:'Le chemin de la patience',hp:-25,res:-10,honor:30,xp:45,dice:true,out:'Il monologue. Vous attendez. La lame traversé son armure dans sa seconde d\'inattention.',outBad:'Il ne baisse jamais sa garde. Combat en position defavorable.',outGood:'Frapper au bon moment. La lame traversé directement son armure. Victoire.'}
 ]},
{id:'finale_hive',phase:'finale',tags:['marine','guard','wolves'],type:'combat',title:'Confrontation Finale — La Norn-Reine',
 nar:function(s){var t='Deux kilometres de chair vivante pour arriver jusqu\'ici. Deux kilometres de tissus synaptiques et de tunnels que la Norn-Reine a extrudes d\'elle-même — sauf que cette toile pese trois cent mille tonnes et recouvre deux continents.';t+='\n\nLa chambre centrale est une cathedrale de biologie. La Norn-Reine occupé son centre comme un organe vital. Trois milliards de creatures sur cette planète dependent de son signal synaptique. Si elle meurt, elles perdent la raison. Ce qui est pire que de mourir.';t+='\n\nElle vous percoit. Pas avec des yeux. Avec quelque chose de bien plus profond. Et pendant une fraction de seconde, vous captez une pensée qui n\'est pas la votre :\n\nJe savais que tu viendrais. Depuis le debut.';return t;},
 choices:[
  {text:'Charger — la tuer au prix de votre sante mentale.',ico:'&#128170;',type:'combat',hint:'Sacrifice ultime',hp:-45,res:-20,honor:45,xp:50,dice:true,out:'La douleur psychique est totale. Vous avancez quand même. La Norn-Reine meurt. Heros a jamais.',outBad:'La douleur psychique vous terrasse avant d\'atteindre la cible.',outGood:'Résistance mentale parfaite. La Norn-Reine meurt en moins d\'une minute.'},
  {text:'Bombardement orbital cible.',ico:'&#128640;',type:'explore',hint:'Strategie a distance',hp:-15,res:-35,honor:20,xp:35,dice:true,out:'Frappé orbitale. Vous courez vers la sortie. L\'essaim s\'effondré.',outBad:'Les coordonnees sont fausses. La frappé manque la chambre centrale.',outGood:'Frappé parfaite. La chambre est desintegree en trente secondes.'},
  {text:'Inverser la connexion synaptique.',ico:'&#128260;',type:'explore',hint:'Genie tactique',hp:-20,res:-30,honor:30,xp:45,dice:true,out:'L\'essaim devient une masse auto-devorante. La Norn-Reine hurle dans son propre vide.',outBad:'L\'inversion échoué partiellement. L\'essaim est perturbe mais fonctionnel.',outGood:'Inversion totale. Trois milliards de creatures se retournent contre leur propre mere.'}
 ]},
{id:'finale_techpriest',phase:'finale',tags:['techpriest','inquisitor'],type:'combat',title:'Confrontation Finale — L\'Overlord Éternel',
 nar:function(s){var t='Les systèmes mécaniques cessent de fonctionner dans un rayon de trente mètrès autour de lui.';t+=' Vos capteurs s\'eteignent un par un. L\'éclairage de votre casque vacille. Et le silence s\'installé — le silence des machines qui s\'arretent — que vous, Pretre-Technicien, ressentez comme une amputation.';t+='\n\nSzarekh n\'est pas debout. Il est simplement present, comme si debout était un concept trop trivial pour lui. Cinquante millions d\'années de mémoire deroulee dans un corps de métal vivant.';t+='\n\nOrganique, dit-il. Sa voix ressemble au son que ferait un orgue construit a partir de glas et de tonnerre. Ephemere. Êtes-vous venu mourir dans ma chambre ? Où avez-vous quelque chose d\'interessant a me proposer ?';return t;},

  {text:'Combat direct avec armes anti-Necron.',ico:'&#9876;',type:'combat',hint:'Combat technologique',hp:-30,res:-20,honor:25,xp:35,dice:true,out:'Vous trouvez le noeud de controle et le detruisez. L\'Overlord s\'effondré en métal inerte.',outBad:'Le Necron regenere chaque blessure. Vous reculez épuisé.',outGood:'Precision chirurgicale. Le noeud de controle détruit du premier coup.',lootGood:'armure2'},
  {text:'Parler a l\'Overlord — un accord millénaire.',ico:'&#128172;',type:'npc',hint:'Diplomatique imprevisible',hp:-5,res:15,honor:-10,xp:35,dice:true,out:'Szarekh est... interesse. Un accord est signé. Vous n\'êtes pas sur de ce que vous avez promis.',outBad:'Szarekh n\'a aucun interet a parler. Il attaque immediatement.',outGood:'L\'accord est favorable. Szarekh reculé ses forces de trois secteurs.'}
 ]},
{id:'finale_chaos',phase:'finale',tags:['chaos'],type:'event',title:'Confrontation Finale — L\'Ascension',
 nar:function(s){var t='Ils parlent tous en même temps, et leur voix ne fait qu\'une — un accord parfait qui resonne directement dans les os de votre crane.';t+='\n\nTu as prouvé ta valeur. L\'ascension t\'attend.';t+='\n\nDevant vous, un Champion des Ultramarines en armure immaculee, venu vous arrêter seul, comme si l\'univers entier regardait. Il ne dit rien. Il attend. Dans son regard, pas de haine — juste une tristesse infinie et une determination plus ancienne que la peur.';t+='\n\nDerriere vous, le Warp. Devant vous, l\'Empire. Entre les deux, l\'ame de '+s.name+' — la seule chose que personne ne peut prendre, mais que vous pouvez encore choisir de donner.';return t;},

  {text:'Negocier — prendre le pouvoir sans perdre l\'ame.',ico:'&#127917;',type:'explore',hint:'Le pari de Tzeentch',hp:-10,res:20,honor:-20,xp:35,dice:true,out:'Tzeentch vous accorde une parcelle de pouvoir sans Ascension complète.',outBad:'Les Dieux rejettent la negociation. Vous êtes attaque de toutes parts.',outGood:'Tzeentch rit. L\'accord parfait — vous gardez votre humanité. Pour l\'instant.'}

];

/* SCENE POOL */
function pickScene(){
  var phase=S.act<=2?'early':S.act<=5?'mid':S.act<=7?'late':'finale';
  var fid=S.faction;
  var pool=SCENES.filter(function(sc){
    if(S.usedScenes.indexOf(sc.id)>=0)return false;
    if(sc.phase!=='any'&&sc.phase!==phase)return false;
    return sc.tags.indexOf('all')>=0||sc.tags.indexOf(fid)>=0;
  });
  if(!pool.length)pool=SCENES.filter(function(sc){return sc.phase===phase&&S.usedScenes.indexOf(sc.id)<0;});
  if(!pool.length)pool=SCENES.filter(function(sc){return sc.phase==='late'&&S.usedScenes.indexOf(sc.id)<0;});
  if(!pool.length)pool=SCENES.filter(function(sc){return S.usedScenes.indexOf(sc.id)<0;});
  if(!pool.length)return SCENES[0];
  return pool[Math.floor(Math.random()*pool.length)];
}

/* FLOW */
function nextScene(ct,d){
  stopSpeak();
  if(d){
    S.hp=clamp(S.hp+(d.hp||0),0,getMaxHp());
    S.res=clamp(S.res+(d.res||0));
    S.honor=clamp(S.honor+(d.honor||0));
    S.xp=Math.max(0,S.xp+(d.xp||0));
    if(S.hp<=0){renderDeath();return;}
  }
  S.act++;
  if(S.act>S.maxActs){renderEnding();return;}
  var sc=pickScene();S.usedScenes.push(sc.id);S.currentScene=sc;
  renderScene(sc,d);
}

function renderScene(sc,pd){
  var isF=S.act>=S.maxActs;
  S.pageNum+=Math.floor(Math.random()*8)+4;
  if(sc.type==='combat')snd_battle();

  var notifH='<div id="narea">';
  if(pd){
    if(pd.hp)  notifH+='<span class="notif '+(pd.hp>0?'np':'nn')+'">'+(pd.hp>0?'+':'')+pd.hp+' PV</span>';
    if(pd.res) notifH+='<span class="notif '+(pd.res>0?'np':'nn')+'">'+(pd.res>0?'+':'')+pd.res+' RES</span>';
    if(pd.honor)notifH+='<span class="notif '+(pd.honor>0?'np':'nn')+'">'+(pd.honor>0?'+':'')+pd.honor+' HON</span>';
    if(pd.xp)  notifH+='<span class="notif np">+'+pd.xp+' XP</span>';
  }
  notifH+='</div>';

  var narTxt=typeof sc.nar==='function'?sc.nar(S):sc.nar;
  S.curNar=narTxt;

  var choH=(sc.choices||[]).map(function(c,i){
    var cclass=CC[c.type]?' '+CC[c.type]:'';
    var dtag=c.dice?'<span class="dtag">&#127922; DE</span>':'';
    return '<button class="cbtn'+cclass+'" onclick="pickChoice('+i+')">'
      +'<span class="clet">'+String.fromCharCode(65+i)+'.</span>'+dtag+(c.ico||'')+' '+c.text
      +(c.hint?'<span class="chint">&#8627; '+c.hint+'</span>':'')
      +'</button>';
  }).join('');

  var typeTag=sc.type?'<span class="stag '+(TC[sc.type]||'t-eve')+'">'+(TL[sc.type]||sc.type.toUpperCase())+'</span>':'';

  setMain(
    renderStats()+renderInv()+notifH+renderTopBar()+ttsBar()
    +mkpanel(
      '<div class="chmark">Chapitre '+S.act+' / '+S.maxActs+' &middot; '+S.name+' &middot; '+S.fdata.name+'</div>'
      +'<div style="text-align:center;margin-bottom:.55rem">'+typeTag+'</div>'
      +'<div id="stitle">'+sc.title+'</div>'
      +mkdiv('&#10022;')
      +'<div class="pgnum">&mdash; Page '+S.pageNum+' &mdash;</div>'
      +'<div id="nbox"><span id="ntxt"></span><span class="tcur" id="tcur"></span></div>'
      +'<button id="nextbtn" onclick="advancePage()">Tourner la page &#8594;</button>'
      +'<div id="carea" style="opacity:0;pointer-events:none;margin-top:1.1rem">'+choH+'</div>'
      +(isF?'<p style="font-family:\'Cinzel\',serif;font-size:.54rem;letter-spacing:.18em;color:var(--blood);text-align:center;margin-top:.65rem">&#9876; CONFRONTATION FINALE &#9876;</p>':'')
    )
  );

  typeWriter(narTxt,function(){
    var cur=document.getElementById('tcur');if(cur)cur.remove();
    var ca=document.getElementById('carea');if(ca){ca.style.opacity='1';ca.style.pointerEvents='';}
    if(S.ttsOn||S.autoRead)speak(narTxt);
  });
}

function pickChoice(idx){
  var sc=S.currentScene;var c=sc.choices[idx];if(!c)return;
  stopSpeak();
  document.querySelectorAll('.cbtn').forEach(function(b){b.disabled=true;});
  if(c.type==='combat'||sc.type==='combat')snd_battle();

  function applyAndShow(outText,lootId,deltas,robbed){
    if(robbed)stripAll();
    if(lootId)addItem(lootId);
    S.pendingDeltas=deltas;
    var nbox=document.getElementById('nbox');
    if(nbox){
      var ca=document.getElementById('carea');if(ca)ca.style.opacity='0';
      var ocls=robbed?'ob':(deltas.hp>0||deltas.honor>0)?'og':deltas.hp<-20?'ob':lootId?'oc':'';
      var lln=lootId&&ITEMS[lootId]?'<div class="lootln">&#128230; Objet trouve : '+ITEMS[lootId].ico+' '+ITEMS[lootId].name+' &mdash; '+ITEMS[lootId].desc+'</div>':'';
      var rln=robbed?'<div class="robln">&#9888; DEPOUILLE &mdash; Tout votre equipement est perdu</div>':'';
      nbox.innerHTML='<div class="outbox '+ocls+'">'+outText+'</div>'+rln+lln;
      if(S.ttsOn||S.autoRead)speak(outText+(robbed?' Vous avez ete depouille.':''));
    }
    var nb=document.getElementById('nextbtn');if(nb)nb.style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }

  if(c.dice){
    showDice(c.text,function(r,cat){
      var outText,lootId,deltas,robbed=false;

      if(r===1&&(c.type==='combat'||sc.type==='combat')){
        snd_damnation();
        var nbox2=document.getElementById('nbox');
        if(nbox2){var ca2=document.getElementById('carea');if(ca2)ca2.style.opacity='0';
          nbox2.innerHTML='<div class="outbox ob">&#127922; 1 &mdash; FUMBLE FATAL. Une erreur catastrophique. La mort vient vite, comme un dernier acte de misericorde.</div>';}
        setTimeout(function(){renderDeath();},2200);
        return;
      }

      if(r===1&&sc.type==='trap'){
        stripAll();
        var nbox3=document.getElementById('nbox');
        if(nbox3){var ca3=document.getElementById('carea');if(ca3)ca3.style.opacity='0';
          nbox3.innerHTML='<div class="outbox ob">&#127922; 1 &mdash; FUMBLE. '+(c.outBad||'Catastrophe.')+'</div>'
            +'<div class="robln">&#9888; DEPOUILLE &mdash; Tout votre equipement est perdu</div>';}
        S.pendingDeltas={hp:-25,res:-20,honor:-10,xp:5};
        var nb3=document.getElementById('nextbtn');if(nb3)nb3.style.display='block';
        window.scrollTo({top:0,behavior:'smooth'});
        return;
      }

      if(cat.fumble||!cat.good){
        outText=c.outBad||('Resultat : '+cat.cat+'. '+c.out);
        robbed=c.rob===true;
        lootId=null;
        deltas={hp:Math.min((c.hp||0),-10),res:(c.res||0),honor:Math.min((c.honor||0)-5,-5),xp:Math.max(5,(c.xp||0)-5)};
      }else if(cat.crit){
        outText=c.outGood||('CRITIQUE ! '+c.out);
        robbed=false;
        lootId=c.lootGood||c.loot||null;
        deltas={hp:Math.max((c.hp||0),0),res:Math.max((c.res||0),0),honor:(c.honor||0)+10,xp:(c.xp||0)+15};
      }else{
        outText=c.out;
        robbed=false;
        lootId=c.loot||null;
        deltas={hp:(c.hp||0),res:(c.res||0),honor:(c.honor||0),xp:(c.xp||0)};
      }
      applyAndShow(outText,lootId,deltas,robbed);
    });
  }else{
    applyAndShow(c.out,c.loot||null,{hp:(c.hp||0),res:(c.res||0),honor:(c.honor||0),xp:(c.xp||0)},false);
  }
}

function advancePage(){
  snd_pageTurn();
  var d=S.pendingDeltas||{};
  S.pendingDeltas=null;
  var nb=document.getElementById('nextbtn');if(nb)nb.style.display='none';
  nextScene(null,d);
}

function typeWriter(txt,onDone){
  var el=document.getElementById('ntxt');
  if(!el){if(onDone)onDone();return;}
  el.innerHTML='';
  var paras=txt.split('\n\n').filter(function(p){return p.trim();});
  if(!paras.length){if(onDone)onDone();return;}
  if(txt.length>500||window.innerWidth<380){
    el.innerHTML=paras.map(function(p){return '<p>'+p+'</p>';}).join('');
    if(onDone)onDone();return;
  }
  var pi=0,ci=0;
  var cur=document.createElement('p');el.appendChild(cur);
  var iv=setInterval(function(){
    var para=paras[pi];
    if(ci<para.length){cur.textContent+=para[ci++];}
    else{pi++;ci=0;if(pi<paras.length){cur=document.createElement('p');el.appendChild(cur);}
      else{clearInterval(iv);if(onDone)onDone();}}
  },11);
}

/* INTRO */
function showIntro(){
  stopSpeak();
  var saveBtn=hasSave()?'<div style="margin-top:.9rem;text-align:center"><button class="btns" onclick="loadGame()" style="display:inline-block">&#128194; Reprendre la partie sauvegardee</button></div>':'';
  setMain(mkpanel(
    '<p class="ilore">Dans le 41eme millenaire, il n\'y a pas de paix parmi les etoiles — seulement un bain de sang éternel et le sacrifice de millions au nom de l\'Imperium.</p>'
    +'<div class="lq">Seul l\'Homme peut fagonner son destin dans l\'obscurite absolue de ce millenaire.</div>'
    +'<p class="ilore">Vous tenez le Codex de l\'Aventure Imperiale — un tome dont vous etes le heros. Chaque de jeté, chaque choix fait, fagonnera votre destin.</p>'
    +mkdiv('&#9769;')
    +'<p style="text-align:center;font-family:\'Cinzel\',serif;font-size:.66rem;letter-spacing:.22em;color:var(--parch2)">CHOISISSEZ VOTRE DESTIN</p>'
    +'<div class="fgrid">'
    +FACTIONS.map(function(f){return '<div class="fc" onclick="selectFaction(\''+f.id+'\')"><span class="fi">'+f.ico+'</span><div class="fn">'+f.name+'</div><div class="fd">'+f.desc+'</div><div class="fsl">'+f.sl+'</div></div>';}).join('')
    +'</div>'+saveBtn
  ));
}

function selectFaction(id){
  S.faction=id;S.fdata=FACTIONS.filter(function(f){return f.id===id;})[0];S.honor=S.fdata.startHonor;
  showNameInput();
}

function showNameInput(){
  var f=S.fdata;
  var it=ITEMS[f.startItem];
  setMain(mkpanel(
    '<div style="text-align:center;margin-bottom:.8rem"><div class="fbadge">'+f.ico+' '+f.name+' &mdash; '+f.chapter+'</div></div>'
    +'<div class="lq">'+f.lore+'</div>'
    +'<div style="margin-top:.6rem;padding:.5rem .7rem;background:var(--bg3);border:1px solid var(--bd);display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;text-align:center">'
    +'<div><span style="font-family:\'Cinzel\',serif;font-size:.5rem;color:var(--parch3);display:block;letter-spacing:.1em">ATTAQUE</span><span style="font-family:\'Cinzel\',serif;font-size:1.1rem;color:var(--gold)">'+f.baseAtk+'</span></div>'
    +'<div><span style="font-family:\'Cinzel\',serif;font-size:.5rem;color:var(--parch3);display:block;letter-spacing:.1em">DEFENSE</span><span style="font-family:\'Cinzel\',serif;font-size:1.1rem;color:var(--gold)">'+f.baseDef+'</span></div>'
    +'<div><span style="font-family:\'Cinzel\',serif;font-size:.5rem;color:var(--parch3);display:block;letter-spacing:.1em">PV MAX</span><span style="font-family:\'Cinzel\',serif;font-size:1.1rem;color:var(--gold)">'+f.startHp+'</span></div>'
    +'</div>'
    +'<div style="margin-top:.55rem;padding:.45rem .65rem;background:var(--bg2);border:1px solid var(--bd);display:flex;align-items:center;gap:.55rem">'
    +'<span style="font-size:1.2rem">'+it.ico+'</span>'
    +'<div><div style="font-family:\'Cinzel\',serif;font-size:.62rem;color:var(--gold);letter-spacing:.05em">'+it.name+'</div>'
    +'<div style="font-size:.72rem;color:var(--parch2);font-style:italic">'+it.desc+'</div></div></div>'
    +mkdiv()
    +'<p style="font-family:\'Cinzel\',serif;font-size:.68rem;letter-spacing:.14em;color:var(--parch2);text-align:center;margin-bottom:.6rem">NOMMEZ VOTRE GUERRIER</p>'
    +'<div class="niw">'
    +'<input class="ni" id="nf" type="text" placeholder="Entrez votre nom..." maxlength="28" autocomplete="off"/>'
    +'<button class="btnp" onclick="startGame()">&#9769; COMMENCER</button>'
    +'</div>'
    +'<button class="btns" style="margin:0 auto" onclick="showIntro()">&#8592; Changer de Faction</button>'
  ));
  setTimeout(function(){
    var inp=document.getElementById('nf');
    if(inp){inp.focus();inp.addEventListener('keydown',function(e){if(e.key==='Enter')startGame();});}
  },60);
}

function startGame(){
  var nf=document.getElementById('nf');
  var defs=['Brother Aldric','Commissaire Vorh','Inquisiteur Kaelith','Magos 7-Delta','Vorn Ironfang','Kael le Maudit'];
  S.name=(nf?nf.value.trim():'')||rand(defs);
  S.act=0;S.usedScenes=[];S.pageNum=1;
  S.hp=S.fdata.startHp;S.maxHp=S.fdata.startHp;
  S.res=100;S.honor=S.fdata.startHonor;S.xp=0;
  S.baseAtk=S.fdata.baseAtk;S.baseDef=S.fdata.baseDef;
  S.equip={weapon:null,armor:null,head:null};
  S.pack=[null,null,null,null];S.inventory=[];
  S.pendingDeltas=null;
  addItem(S.fdata.startItem);
  nextScene(null,null);
}

/* ENDINGS */
function renderEnding(){
  stopSpeak();
  var h=S.honor,sym,title,txt,sc;
  if(h>=70){sym='&#9769;';title='Gloire Éternelle pour l\'Emperor';sc='Légendaire';
    txt=S.name+' entre dans la legende de l\'Imperium. Vos exploits seront graves dans les Annales de Guerre pour des millenaires.';}
  else if(h>=45){sym='&#9876;';title='Devoir Accompli';sc='Honorable';
    txt='La mission est terminée. '+S.name+' a servi l\'Imperium avec honneur. L\'Emperor approuve.';}
  else if(h>=20){sym='&#128128;';title='Le Prix de la Survie';sc='Compromis';
    txt=S.name+' a survecu. Mais a quel prix ? Les choix faits dans l\'ombre pesent sur l\'ame.';}
  else{sym='&#127752;';title='L\'Hérésie Consumée';sc='Damné';
    txt='L\'ame de '+S.name+' appartient desormais aux Dieux du Chaos. Les Dieux rient.';}
  var atk=getAtk(),def=getDef();
  var eqN=[S.equip.weapon,S.equip.armor,S.equip.head].filter(Boolean).map(function(x){return x.ico+' '+x.name;}).join(' &middot; ');
  setMain(renderStats()+mkpanel(
    '<div class="epanel">'
    +'<span class="esym">'+sym+'</span>'
    +'<div class="etitle">'+title+'</div>'
    +mkdiv()
    +'<div class="pgnum">&mdash; Epilogue &mdash;</div>'
    +'<p class="etxt">'+txt+'</p>'
    +(eqN?'<div style="margin:.45rem 0;font-family:\'Cinzel\',serif;font-size:.6rem;color:var(--parch2)">Équipé : '+eqN+'</div>':'')
    +'<p style="font-family:\'Cinzel\',serif;font-size:.58rem;letter-spacing:.16em;color:var(--parch2);margin-bottom:.9rem">HONNEUR : '+h+'/100 &mdash; '+sc+' &middot; XP : '+S.xp+' &middot; ATK '+atk+' &middot; DEF '+def+'</p>'
    +'<button class="btnp" onclick="restartSame()" style="margin:0 auto .5rem;display:block">&#8635; Rejouer cette faction</button>'
    +'<button class="btns" onclick="showIntro()" style="margin:0 auto">&#8592; Autre faction</button>'
    +'</div>'
  ));
  if(S.ttsOn||S.autoRead)speak(txt);
}

function renderDeath(){
  stopSpeak();snd_damnation();
  var txts=[
    S.name+' est tombe au combat. L\'ame, si elle etait pure, rejoindra les legions éternelles de l\'Emperor.',
    'Dans ses derniers instants, '+S.name+' vit le visage de l\'Emperor. L\'Imperium ne manque pas de guerriers. Il manque de victoires.'
  ];
  var txt=rand(txts);
  setMain(mkpanel(
    '<div class="epanel">'
    +'<span class="esym" style="color:var(--blood)">&#128128;</span>'
    +'<div class="etitle" style="color:var(--blood)">Mort pour l\'Emperor</div>'
    +mkdiv()
    +'<p class="etxt">'+txt+'</p>'
    +'<div class="lq">Pour mourir dans la gloire de l\'Emperor est le plus grand honneur qui soit.</div>'
    +'<button class="btnp" onclick="restartSame()" style="margin:0 auto .5rem;display:block">&#8635; Recommencer</button>'
    +'<button class="btns" onclick="showIntro()" style="margin:0 auto">&#8592; Autre faction</button>'
    +'</div>'
  ));
  if(S.ttsOn||S.autoRead)speak(txt);
}

function restartSame(){
  S.act=0;S.usedScenes=[];S.pageNum=1;
  S.hp=S.fdata.startHp;S.maxHp=S.fdata.startHp;
  S.res=100;S.honor=S.fdata.startHonor;S.xp=0;
  S.equip={weapon:null,armor:null,head:null};
  S.pack=[null,null,null,null];S.inventory=[];
  S.pendingDeltas=null;
  addItem(S.fdata.startItem);
  nextScene(null,null);
}

showIntro();
</script>
