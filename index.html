var TL={explore:'&#128294; Exploration',combat:'&#9876; Combat',chest:'&#128230; Coffre',lore:'&#128218; Archives',
  npc:'&#128100; Rencontre',trap:'&#9888; Piégé',event:'&#11088; Evenement',faith:'&#10013; Foi',sacrifice:'&#128148; Sacrifice'};
var TC={explore:'t-exp',combat:'t-com',chest:'t-che',lore:'t-lor',npc:'t-npc',trap:'t-tra',event:'t-eve',faith:'t-exp',sacrifice:'t-tra'};
var CC={chest:'cc',npc:'cn',combat:'co',explore:'ce'};

var SCENES=[
{id:'ruins_entry',phase:'early',tags:['all'],type:'explore',title:'Chapitre I — Les Ruines de Valdris-Prime',
 nar:function(s){var t='Il y a trois semaines, Valdris-Prime était une cité de deux millions d\'âmes. Aujourd\'hui : le silence. Un silence qui pèse sur les poumons comme une dalle de granit.';t+='\n\nVous avancez sur des dalles jonchées de cendres et d\'os calcinés. Les fresques de l\'Emperor ont été systematiquement mutilées — les yeux crevés, les mains arrachées. Ce n\'est pas de la guerre. C\'est du message.';t+='\n\nTrois options s\'ouvrent devant vous. À gauche, une lumière orangée filtre sous une porte et une odeur métallique d\'huile de machine. À droite, des escaliers plongent vers une obscurité complète, comme une gorge ouverte. Et droit devant, dans une grande salle, une silhouette parfaitement immobile — trop immobile pour être vivante. Peut-être.';return t;},
 choices:[
  {text:'Investiguer la lumière orangée.',ico:'&#128294;',type:'chest',hint:'Fouille — récompense possible',hp:-5,res:0,honor:5,xp:10,out:'Un atelier d\'armurier abandonné en hâte. Sur l\'établi, un coffre intact — à l\'intérieur, une armure renforcée que vous enfilez aussitôt. Mieux équipé, vous repassez dans le couloir principal. La silhouette est toujours là, mais quelque chose a changé. Elle s\'est légèrement tournée vers vous.',loot:'armure1'},
  {text:'Descendre dans les sous-niveaux obscurs.',ico:'&#128369;',type:'explore',hint:'Danger inconnu',hp:-15,res:-10,honor:5,xp:15,dice:true,out:'Vous chutez dans une chambre secrète. Des caisses de munitions intactes vous entourent — quelqu\'un stockait ici en prévision d\'un siège qui n\'a jamais eu lieu. Vous remplissez vos poches et remontez par une autre issue. Vous débouchez dans le couloir principal, derrière la silhouette. Maintenant vous voyez son dos. Et la blessure dans ce dos.',loot:'munitions',outBad:'La chute est mauvaise. Vous vous relevez en sang dans une cave vide. Pas de butin, mais vous survivez — et une bouche d\'aération vous ramène au niveau principal. La silhouette est toujours là. Elle n\'a pas bougé d\'un centimètre.',outGood:'Atterrissage parfait sur des caisses de matériel médical. Vous repartez soigné, chargé — et vous remontez par-derrière la silhouette. C\'est un Garde Impérial mort debout, maintenu par sa propre armure coincée dans les débris.',lootGood:'kit_med'},
  {text:'Avancer vers la silhouette.',ico:'&#128100;',type:'npc',hint:'Rencontre — allié ou ennemi',hp:0,res:0,honor:10,xp:10,out:'Un Garde Impérial blessé, à peine conscient, appuyé contre un pilier. Il vous donne les positions des dernières patrouilles ennemies avant de s\'évanouir. Vous l\'allongez contre le mur, lui laissez une ration de secours, et vous enfoncez dans les ruines. L\'information qu\'il vous a donnée vaut de l\'or.'}
 ]},
{id:'after_entry',phase:'early',tags:['all'],type:'explore',title:'Chapitre II — Ce que Cache l\'Obscurité',
 nar:function(s){var t='Vous avancez dans les entrailles de la cité morte. Chaque couloir ressemble au précédent — mêmes décombres, même odeur de brûlé, même silence pesant.';t+='\n\nMais quelque chose a changé. Des traces de pas récentes dans la poussière. Pas les vôtres. Quelqu\'un était ici il y a moins d\'une heure, marchant vite, en direction de ce que les plans de la cité indiquent comme le quartier administratif.';t+='\n\nEt autre chose : un son. Ténu, intermittent. Un choc régulier, venant d\'une direction perpendiculaire aux traces de pas. Comme quelqu\'un qui frappe contre un mur. Ou contre un sol. Régulièrement. Avec obstination.';return t;},
 choices:[
  {text:'Suivre les traces de pas — identifier qui est là.',ico:'&#128373;',type:'explore',hint:'Filature — risque modéré',hp:-5,res:0,honor:5,xp:15,dice:true,out:'Les traces mènent à un carrefour effondré. Vous apercevez la silhouette qui les a laissées — un éclaireur ennemi, en train de cartographier vos positions. Il ne vous a pas entendu. Pour l\'instant. Vous avez l\'avantage de la surprise, et ses cartes représentent une information précieuse. Vous agissez.',outBad:'L\'éclaireur vous repère. Il lance une grenade fumigène et disparaît dans la fumée. Vous toussez, les yeux brûlants — mais au sol, il a laissé tomber une chose : sa radio. Encore active.',outGood:'Vous le neutralisez silencieusement. Sur lui : des cartes du secteur, des codes de communication, et un ordre signé qui va changer tout ce que vous pensiez savoir sur cette mission.',loot:'donnees',lootGood:'coords'},
  {text:'Aller vers le son régulier — trouver son origine.',ico:'&#128266;',type:'npc',hint:'Rencontre mystérieuse',hp:0,res:0,honor:10,xp:20,out:'Derrière une porte d\'acier coincée, vous trouvez un enfant — une fille de dix ans environ, qui frappe méthodiquement sur la cloison depuis ce qui ressemble à des heures. Elle lève les yeux sur vous sans peur. Sans surprise non plus. Comme si elle savait que vous viendriez. Elle connaît un passage. Elle veut vous le montrer. Et quelque chose dans son regard vous dit qu\'elle dit la vérité.'},
  {text:'Ignorer les deux — progresser vers l\'objectif.',ico:'&#127939;',type:'explore',hint:'Direct — économise les forces',hp:0,res:5,honor:-5,xp:5,out:'Vous laissez l\'éclaireur et le mystère derrière vous. L\'objectif d\'abord. Toujours l\'objectif. Vous progressez de trois cent mètres avant de tomber sur une barricade ennemie fraîchement montée. Ils savaient que vous veniez. L\'éclaireur avait peut-être déjà transmis.'}
 ]},
{id:'cathedrale',phase:'early',tags:['all'],type:'lore',title:'Chapitre III — La Cathédrale du Dernier Souffle',
 nar:function(s){var t='La cathédrale de Valdris-Prime se dresse encore, comme si elle refusait de mourir avec le reste de la cité. Ses vitraux sont en éclats — mais les armatures de plomb sont tordues vers l\'intérieur, comme si quelque chose d\'immense avait tenté d\'entrer par les fenêtres.';t+='\n\nDes symboles de Nurgle ont été tracés au sol. L\'autel principal a été inversé. Au-dessus, une inscription en gothique ancien : « Nous étions ici avant vous. Nous serons ici après vous. »';t+='\n\nAu pied de l\'autel, un journal de cuir reste bizarrement intact. Sur un pilier latéral, une épée luit d\'une faible lueur bleue. Et derrière l\'autel retourné, un courant d\'air trahit un passage caché — dont quelqu\'un a tenté de murer l\'entrée à la hâte.';return t;},
 choices:[
  {text:'Lire le journal du Chapelain.',ico:'&#128218;',type:'lore',hint:'Connaissance — informations critiques',hp:0,res:0,honor:10,xp:20,out:'Vous lisez vite, debout, une main sur votre arme. La dernière entrée date de quatre jours : « Ils sont parmi nous depuis le début. Frère Hadrian, Soeur Mavia, le Général lui-même. Je comprends maintenant pourquoi les défenses ont toujours cédé au mauvais moment. » Vous refermez le journal et le glissez dans votre armure. Puis vous traversez la cathédrale d\'un pas plus méfiant qu\'avant.'},
  {text:'Prendre l\'épée sur le pilier.',ico:'&#128481;',type:'chest',hint:'Loot garanti',hp:0,res:-5,honor:0,xp:10,out:'Vous saisissez la poignée. Elle pulse d\'une chaleur rassurante — bénie par un Chapelain avant que tout cela commence. Les runes s\'activent au contact de votre gant. Arme en main, vous rejoignez le passage derrière l\'autel. L\'air qui en sort est froid et sent le soufre. Mais vous avancez. C\'est pour ça que vous êtes là.',loot:'epee_plas'},
  {text:'Emprunter le passage secret derrière l\'autel.',ico:'&#128682;',type:'explore',hint:'Chemin alternatif',hp:-10,res:-5,honor:5,xp:15,dice:true,out:'Le passage débouche dans les jardins envahis par une végétation mutante aux couleurs impossibles. Vous traversez en retenant votre souffle. De l\'autre côté, une arche gravée de coordonnées — et sous l\'arche, le cadavre d\'un Inquisiteur mort depuis peu, un sourire étrange sur les lèvres. Il serrait quelque chose dans sa main.',outBad:'Une créature mutante vous attaque dans le passage. Vous la repoussez à la baïonnette — mais pas avant qu\'elle vous ait laissé sa marque. Blessé, vous débouchez dans les jardins. Le chemin est libre. Continuez.',outGood:'Passage sans encombre. Sous l\'arche, le cadavre d\'un Inquisiteur — et dans sa main, des coordonnées que vous ne devriez pas connaître.',lootGood:'coords'}
 ]},
{id:'armory_cache',phase:'early',tags:['all'],type:'chest',title:'Chapitre IV — La Cache',
 nar:function(s){var t='Le panneau coulissant n\'aurait jamais été trouvé sans l\'instinct du guerrier — ou du destin. Derrière, une armurerie de fortune constituée pièce par pièce, en secret, pendant des mois. Des semaines de préparation pour une urgence qui n\'est manifestement jamais venue — ou qui est venue trop tôt.';t+='\n\nDes crochets muraux. Des outils. Et sur l\'établi central, une caisse métallique munie d\'une serrure à combinaison numérique gravée de symboles impériaux anciens — le genre qu\'on apprend sur Terra. Quelqu\'un de haut placé a préparé cela. Pour qui ? Pourquoi ici ? Et surtout : pourquoi cette personne n\'est-elle jamais venue récupérer son dû ?';return t;},
 choices:[
  {text:'Forcer la serrure — brute force.',ico:'&#128170;',type:'chest',hint:'Loot garanti',hp:-5,res:0,honor:0,xp:10,dice:true,out:'La serrure cède. À l\'intérieur : grenades, pansements, et une note manuscrite que vous n\'avez pas le temps de lire maintenant. Vous fourrez tout dans votre sac et repoussez le panneau. Dans le couloir, un son de pas. Quelqu\'un d\'autre cherche cette cache.',loot:'munitions',outBad:'La serrure résiste et déclenche une alarme silencieuse — un voyant rouge clignote quelque part dans le mur. Des pas se rapprochent déjà. Vous refermez le panneau et vous mettez à couvert. La cache reste fermée. Mais au moins, vous êtes en vie.',outGood:'La serrure cède en vingt secondes. À l\'intérieur, en plus du kit de survie : une armure de plaques fraîchement entretenue, comme si quelqu\'un l\'avait préparée pour vous. Vous l\'enfilez et repartez plus solide qu\'avant.',lootGood:'armure1'},
  {text:'Déchiffrer la combinaison symbolique.',ico:'&#128269;',type:'lore',hint:'Loot supérieur si réussi',hp:0,res:-5,honor:5,xp:20,dice:true,out:'Les symboles impériaux anciens se déroulent comme une prière. La combinaison : la date de fondation du chapitre — information que seul quelqu\'un du dedans connaît. La caisse s\'ouvre. Vous récupérez l\'armure et repassez le panneau. La note au fond de la caisse dit simplement : « Si vous lisez ceci, il est trop tard pour moi. Mais pas pour vous. »',loot:'armure1',outBad:'Les symboles vous échappent. Cinq minutes perdues, et les pas dans le couloir se rapprochent. Vous refermez le panneau et reculez. La cache reste fermée — pour l\'instant.',outGood:'Combinaison résolue en quelques secondes. Armure de céramite intacte, et sous elle, un dossier chiffré qui fait soudain sens avec ce que vous avez lu dans le journal du Chapelain.',lootGood:'armure2'},
  {text:'Prendre uniquement les armes décrochées — vite.',ico:'&#128481;',type:'explore',hint:'Loot modeste, sans risque',hp:0,res:15,honor:0,xp:10,out:'Bolter rechargé et deux chargeurs supplémentaires. Trente secondes, pas plus. Vous repoussez le panneau et continuez. Derrière vous, le cliquetis d\'une serrure forcée — quelqu\'un d\'autre vient de trouver la cache. Mais vous, vous êtes déjà loin.',loot:'bolter2'}
 ]},
{id:'ork_ambush',phase:'early',tags:['marine','guard','wolves'],type:'combat',enemy:{name:'Nob Ork',mc:6,pe:20},title:'Chapitre V — La Marée Verte',
 nar:function(s){var t='Ils surgissent des décombres comme si la ville elle-même les vomissait — verts, massifs, hurlants, complètement offensés par votre existence. Douze. Non, davantage. Vous comptez encore quand le Nob de tête vous regarde — et vous comprenez que compter était une erreur. Vous auriez déjà dû tirer.';t+='\n\nLe Nob est une abomination de ferraille et de muscle. Sa mâchoire inférieure a été remplacée par une plaque d\'acier rouillé. Quand il parle, ça ressemble à un moteur qui rend l\'âme.\n\nWAAAAGH ! HUMIES MORTS !\n\nIls chargent. Trois secondes.';return t;},
 choices:[
  {text:'Charger le Nob — tuer la tête.',ico:'&#9876;',type:'combat',hint:'Combat direct',hp:-25,res:-15,honor:20,xp:25,dice:true,out:'Le Nob tombe sous vos coups — sa mâchoire d\'acier claque une dernière fois dans le vide. Sans meneur, les Boyz se dispersent en se battant entre eux. Vous enjambez le corps et avancez dans le couloir qu\'ils gardaient. Derrière vous, le bruit de la horde qui s\'entre-déchire. Devant vous, le silence — et ce que vous cherchez.',outBad:'Le Nob vous repousse. Vous reculez saignant, perdant du terrain. Mais derrière vous, les ruines offrent un couloir trop étroit pour sa taille. Vous y plongez — il ragit, coincé. Vous continuez dans les profondeurs de la cité. Une autre route.',outGood:'Vous décapitez la hiérarchie en dix secondes. Les Boyz fuient dans toutes les directions. Sur le Nob : une armure de plaques qu\'un techno-adepte pourrait recycler. Vous la saisissez et progressez. Le couloir devant vous s\'ouvre sur une place que vous reconnaissez sur vos cartes.',lootGood:'armure1'},
  {text:'Tenir une position défensive.',ico:'&#128737;',type:'combat',hint:'Défense',hp:-15,res:-20,honor:10,xp:15,dice:true,out:'Vous choisissez un angle, vous baissez, et vous commencez à tirer. Méthodiquement. Un par un. Le sol est couvert de vert quand le dernier Ork fuit en hurlant. Vous rechargez, inspectez les corps — des munitions récupérables — et franchissez la position ennemie. L\'autre côté donne sur une rue que vous pensiez inaccessible.',loot:'munitions',outBad:'La position est débordée par les côtés. Vous cédez du terrain, battez en retraite par un escalier. Pertes légères. Vous débouchez sur un toit avec une vue parfaite sur le secteur et une compréhension nouvelle du terrain.',outGood:'Défense parfaite. Pas une égratignure, et leurs munitions finissent dans votre sac. Vous franchissez la position et débouchez sur la place centrale — vide, silencieuse, exactement comme vous en aviez besoin.'},
  {text:'Faire exploser une structure sur eux.',ico:'&#128163;',type:'explore',hint:'Tactique — économise les forces',hp:-10,res:-25,honor:15,xp:20,out:'Le bâtiment s\'effondre sur la majorité du groupe dans un tonnerre de poussière et de ferraille. Trois survivants fuient en hurlant dans trois directions différentes. Vous traversez les décombres encore chauds. L\'effondrement a ouvert une brèche dans le mur du fond — une brèche qui donne directement sur votre objectif.'}
 ]},
{id:'bibliotheque',phase:'mid',tags:['all'],type:'lore',title:'Chapitre VI — L\'Ultima Bibliotheca',
 nar:function(s){var t='La bibliothèque est intacte. Complètement intacte. Alors que le reste de la forteresse-monastère n\'est que ruines fumantes, les milliers de volumes ici sont en parfait état — comme si quelque chose avait délibérément protégé cet endroit. Mais pourquoi ?';t+='\n\nTrois choses attirent votre attention. Une armoire métallique scellée du sceau de l\'Inquisition — on ne laisse pas ça par hasard. Un Pupitre Tactique holographique qui tourne encore, affichant des positions ennemies. Et dans un coin, une fontaine votive dont l\'eau est d\'un bleu irréel, comme si l\'Emperor lui-même refusait qu\'elle s\'arrête.';t+='\n\nVous avez peut-être dix minutes avant que quelqu\'un remarque votre présence ici. Choisissez vite.';return t;},
 choices:[
  {text:'Crocheter l\'armoire de l\'Inquisition.',ico:'&#128274;',type:'chest',hint:'Risque — récompense secrète',hp:0,res:-10,honor:-10,xp:15,dice:true,out:'Des rapports classifiés sur des agents doubles dans vos propres rangs — et un artefact xénos que l\'Inquisiteur avait confisqué pour son usage personnel. Vous refermez l\'armoire, glissez les documents dans votre armure, et quittez la bibliothèque par la fenêtre arrière. Ce que vous venez de lire change tout. Absolument tout.',loot:'dossiers',outBad:'Un mécanisme libère du gaz paralysant. Vous vous réveillez sur le sol, délesté de vos ressources — mais vivant. Quelqu\'un vous a fouillé et épargné. Pourquoi ? Vous n\'avez pas le temps de comprendre. Vous reprenez votre route, plus pauvre mais toujours debout.',rob:true,outGood:'L\'armoire révèle en plus d\'une relique d\'armure bénie par un Chapelain — un objet que son propriétaire n\'aurait jamais laissé sans raison grave. Vous prenez tout et sortez. La relique pulse doucement dans votre main, comme un cœur.',lootGood:'relique'},
  {text:'Étudier le Pupitre Tactique.',ico:'&#128506;',type:'explore',hint:'Intelligence — avantage futur',hp:0,res:-5,honor:10,xp:20,out:'Deux positions d\'embuscade ennemies que vous auriez traversées sans le savoir. Vous les mémorisez, reprogrammez vos itinéraires mentaux, et quittez la bibliothèque par la sortie ouest — la seule que le Pupitre n\'a pas signalée comme surveillée. La connaissance est une armure. Parfois meilleure que l\'acier.',loot:'donnees'},
  {text:'Boire à la fontaine votive.',ico:'&#128167;',type:'event',hint:'Soin garanti — l\'Emperor veille',hp:25,res:0,honor:15,xp:10,out:'L\'eau brûle comme du feu sacré en descendant dans votre gorge. Vos blessures se referment l\'une après l\'autre avec une rapidité impossible. Un calme absolu s\'installe — pas la sérénité du repos, mais celle du guerrier qui sait exactement ce qu\'il a à faire. Vous repartez. Plus fort. Plus sûr. Plus dangereux.'}
 ]},
{id:'fallen_champion',phase:'mid',tags:['all'],type:'chest',title:'Chapitre VII — Frère Aldric',
 nar:function(s){var t='Il avait choisi ce couloir avec soin. Dos au mur, face à l\'unique entrée — les ennemis seraient forcés d\'arriver un par un. C\'était un bon plan.';t+='\n\nLes huit cadavres autour de lui confirment qu\'il a fonctionné. Jusqu\'au neuvième. Celui qui a eu raison de lui. Un couteau dans le dos — il y avait un dixième adversaire, quelqu\'un qui savait attendre.';t+='\n\nSon médaillon : Frère Aldric, IVe Compagnie. Ses paupières sont à mi-chemin — comme s\'il regardait encore quelque chose que lui seul peut voir. Son équipement est intact. Et dans son vambrace gauche, une lumière clignote doucement. Un message non transmis.';return t;},
 choices:[
  {text:'Récupérer son armement.',ico:'&#9876;',type:'chest',hint:'Équipement Astartes',hp:0,res:20,honor:0,xp:15,out:'Son bolter est encore chaud. Grenades intactes. Vous récupérez tout avec un respect silencieux. Les vivants servent mieux l\'Emperor que les morts bien armés — Aldric l\'aurait voulu ainsi. Vous repartez chargé, et vous laissez son corps dans la position qu\'il avait choisie. Il gardera le couloir une dernière fois.',loot:'bolter2'},
  {text:'Prononcer sa litanie funèbre.',ico:'&#128591;',type:'faith',hint:'Honneur — quelque chose se renforce',hp:10,res:0,honor:20,xp:15,out:'Vous récitez la litanie d\'une voix basse, les mots appris par cœur il y a si longtemps. L\'air change autour de vous — ou peut-être est-ce vous qui changez. Quand vous vous relevez, vous sentez quelque chose de différent. Pas dans vos muscles. Dans votre certitude. Vous continuez, et cette certitude vous accompagne comme une présence.'},
  {text:'Déchiffrer le message non transmis.',ico:'&#128203;',type:'lore',hint:'Renseignement — change la mission',hp:0,res:0,honor:10,xp:25,out:'Le message chiffré se décode en vingt secondes. Position exacte d\'un générateur ennemi central — et autre chose, une ligne que vous relisez deux fois : « Si quelqu\'un trouve ceci, méfiez-vous du commandant de secteur. Il sait que vous venez. » Vous mémorisez les coordonnées et reprenez la route. Maintenant vous savez. Et savoir, c\'est survivre.',loot:'coords'}
 ]},
{id:'explosive_trap',phase:'mid',tags:['all'],type:'trap',title:'Chapitre VIII — Le Fil',
 nar:function(s){var t='Votre pied s\'immobilise à un centimètre du sol. L\'instinct du guerrier — celui qu\'on acquiert dans le sang de cent batailles — vous arrête net.';t+='\n\nLe fil. Monofilament métallique, quasi-invisible. Il traverse le couloir à exactement hauteur de cheville, angle calculé pour être imperceptible dans la pénombre. Les charges de démolition sont dissimulées derrière les plaques murales. Ce n\'est pas le travail d\'un désespéré. C\'est le travail d\'un ingénieur qui connaît ce couloir.';t+='\n\nQuelqu\'un était ici avant vous. Quelqu\'un qui ne voulait pas que vous passiez. La caisse de ravitaillement dix mètres plus loin est peut-être aussi piégée. Ou peut-être pas.';return t;},
 choices:[
  {text:'Désamorcer avec précision.',ico:'&#128295;',type:'trap',hint:'Technique — récompense si réussi',hp:-5,res:-10,honor:5,xp:20,dice:true,out:'Vos doigts travaillent avec une précision de chirurgien. Le fil cède. La charge est neutralisée. Vous ouvrez ensuite la caisse — matériel médical intact, et sous lui, une carte annotée à la main avec les positions des autres pièges du secteur. Quelqu\'un du côté ennemi venait de changer de camp. Vous continuez avec cette carte.',loot:'kit_med',outBad:'Une mini-explosion vous frappe de plein fouet. Vous vous relevez sonné, saignant, les oreilles sifflantes. La caisse a brûlé dans l\'explosion — pas de butin. Mais vous êtes toujours debout, et le couloir derrière vous est maintenant clairement dégagé pour votre retraite si besoin.',outGood:'Désamorçage parfait en quinze secondes. La caisse contient du matériel médical ET une armure légère abandonnée là pour une raison que vous ne comprenez pas encore. Vous emportez les deux et reprenez votre progression. Le couloir s\'ouvre sur une nouvelle zone.',lootGood:'armure1'},
  {text:'Lancer un objet sur le fil — couvert.',ico:'&#128233;',type:'trap',hint:'Sécurité — caisse détruite',hp:-20,res:0,honor:0,xp:10,out:'L\'explosion est violente. Des éclats vous atteignent malgré la couverture — douleur, sang, mais rien de mortel. La caisse a brûlé. Dommage. Mais la déflagration a fait autre chose : elle a ouvert une brèche dans le mur adjacent que vous n\'aviez pas vue sur vos plans. Une brèche qui donne sur un couloir parallèle, non répertorié. Parfois la destruction ouvre des portes.'},
  {text:'Enjamber le fil avec précision maximale.',ico:'&#129462;',type:'trap',hint:'Tout ou rien — dés décisifs',hp:0,res:0,honor:5,xp:15,dice:true,out:'Votre équilibre est parfait. Vous passez sans un bruit. La caisse contient des données tactiques chiffrées. Vous continuez sans dépenser une seule balle, plus rapide que jamais. L\'avantage est votre.',loot:'donnees',outBad:'Votre pied effleure le fil. L\'explosion vous projette en arrière dans les décombres — et quand vous reprenez vos esprits, votre équipement a disparu. Des mains dans l\'obscurité ont tout pris pendant que vous étiez inconscient. Vous vous relevez, nu de tout sauf de votre volonté. Ça devra suffire.',rob:true,outGood:'Enjambée silencieuse et parfaite. La caisse contient à la fois des données et du matériel médical. Vous avancez rechargé et informé, le fil intact derrière vous — un cadeau pour quiconque suivrait votre trace.',lootGood:'kit_med'}
 ]},
{id:'survivor_group',phase:'mid',tags:['all'],type:'npc',title:'Chapitre IX — Soeur Miriam',
 nar:function(s){var t='L\'odeur vous frappe avant de les voir : sueur, peur concentrée, et rations impériales ouvertes depuis trop longtemps. Vingt-trois civils, entassés dans une chapelle depuis neuf jours. Des enfants blottis contre leurs parents. Un vieil homme qui tient un aquila en cuivre comme si sa vie en dépendait.';t+='\n\nLeur responsable se lève. Soeur Miriam, femme d\'une cinquantaine d\'années, regard direct, voix posée malgré la fatigue écrite sur chaque ligne de son visage. Elle vous regarde dans les yeux avec une franchise qui vous prend par surprise.\n\nVous venez nous sauver ? Ou vous venez prendre ce qu\'il nous reste ?';return t;},
 choices:[
  {text:'Les escorter vers la zone sécurisée.',ico:'&#128694;',type:'sacrifice',hint:'Coûteux — honneur maximal',hp:-10,res:-20,honor:30,xp:20,out:'Deux heures d\'escorte sous les tirs. Trois blessés légers. Vingt-trois personnes atteignent la sécurité. Miriam vous serre la main sans un mot — mais dans ce silence, il y a plus que n\'importe quel discours. Vous repartez allégé d\'une partie de vos ressources, mais chargé d\'autre chose. Quelque chose que l\'armure ne peut pas peser. Vous avancez.'},
  {text:'Leur donner provisions et instructions.',ico:'&#128506;',type:'explore',hint:'Aide partielle',hp:0,res:-15,honor:15,xp:15,out:'Vous leur laissez la moitié de vos rations et une carte annotée à la main. Miriam hoche la tête. « Faites votre travail. On trouvera le chemin. » Vous vous regardez une dernière seconde, puis vous repartez. Le doute vous accompagne — feront-ils le chemin ? Vous ne le saurez jamais. Vous avancez quand même.'},
  {text:'Recruter les volontaires capables.',ico:'&#128101;',type:'npc',hint:'Renfort',hp:0,res:0,honor:10,xp:10,out:'Cinq volontaires se lèvent — dont un ancien Garde mécanicien qui connaît le réseau de tunnels sous la ville comme sa poche. Il vous trace une route que personne d\'autre ne connaît. Vous progressez ensemble, plus vite, en évitant trois patrouilles que vous n\'auriez jamais vues venir. L\'entraide, parfois, est une arme.'}
 ]},
{id:'warp_anomaly',phase:'mid',tags:['all'],type:'trap',title:'Chapitre X — La Fissure',
 nar:function(s){var t='La réalité se fissure. Ce n\'est pas une métaphore.';t+='\n\nDans le coin de la salle, la où le mur rencontre le sol, quelque chose a cédé dans le tissu de l\'espace normal. Une déchirure. Elle crépite comme de l\'électricité statique à échelle gigantesque. Des couleurs y apparaissent qui n\'ont pas de nom dans le lexique humain.';t+='\n\nDerrière la fissure, des formes — l\'idée de formes, le concept de quelque chose qui veut avoir un corps et n\'en a pas encore. Elles poussent contre la membrane de réalité comme des doigts contre du tissu tendu.\n\nLa fissure grossit. Dans dix minutes elle sera suffisamment large. Et quelque chose derrière elle sait déjà que vous êtes là.';return t;},
 choices:[
  {text:'Sceller la fissure par la prière et la foi.',ico:'&#10013;',type:'faith',hint:'Efficace si l\'honneur est élevé',hp:-10,res:-5,honor:20,xp:25,dice:true,out:'Vous imposez votre volonté contre le Warp. Mot par mot, la liturgie pousse les formes en arrière. La fissure se referme dans un bruit de verre brisé à l\'envers. Vous restez à genoux un long moment, épuisé jusqu\'à l\'os. Puis vous vous relevez. La salle est silencieuse. Et au sol, à l\'endroit exact de la cicatrice, quelque chose a été déposé — comme un remerciement.',outBad:'La fissure résiste. Quelque chose vous effleure — des doigts froids qui traversent votre âme comme si elle était de papier. Vous reculez en vacillant. La fissure pulse, satisfaite. Vous fuyez par la sortie nord. La chose derrière ne peut pas encore vous suivre. Pas encore.',outGood:'La fissure se referme instantanément, comme aspirée de l\'intérieur. Un objet de foi chute au sol à l\'endroit de la cicatrice — un artefact que la fissure a rejeté, comme si même le Warp ne voulait pas le garder.',lootGood:'relique'},
  {text:'Grenade plasma pour fermer la fissure.',ico:'&#128163;',type:'combat',hint:'Force brute',hp:-15,res:-25,honor:5,xp:15,out:'La décharge ionise la fissure et la force à se refermer dans une explosion de lumière ultraviolette. Les formes derrière poussent un hurlement qui n\'a pas de fréquence — vous le sentez dans vos dents. Puis silence. La salle est intacte. Vous rechargez et avancez, les paumes brûlantes. La porte de l\'autre côté donne sur exactement ce que vous cherchez.'},
  {text:'Ignorer la fissure et progresser vite.',ico:'&#127939;',type:'explore',hint:'Rapide — la fissure reste ouverte derrière vous',hp:-5,res:0,honor:-10,xp:5,out:'Vous traversez en courant. Quelque chose vous effleure dans la semi-réalité — des doigts froids qui traversent votre âme. Vous sortez de l\'autre côté en tremblant. La fissure reste ouverte derrière vous. Vous avez gagné du temps, pas réglé le problème. Mais le problème est derrière vous, et votre objectif est devant.'}
 ]},
{id:'vision_emperor',phase:'early',tags:['marine','guard','wolves','inquisitor'],type:'event',title:'Chapitre IV — La Vision',
 nar:function(s){var t='Cela arrive entre deux battements de cœur.';t+='\n\nLa réalité ne disparaît pas — elle devient transparente. À travers elle, vous voyez Terra. Vous voyez le Trône d\'Or. Vous le voyez, Lui — ce squelette de lumière et de volonté absolue, assis sur le siège de Sa propre agonie depuis dix mille ans.';t+='\n\nIl tourne la tête vers vous. Pas d\'yeux. Pas de visage. Et pourtant vous savez, avec une certitude qui écrase tout, qu\'Il vous voit. Qu\'Il vous a toujours vu.\n\nLa vision dure peut-être une seconde. Peut-être une éternité. Quand elle se retire, vos joues sont humides. Vous n\'avez aucun souvenir d\'avoir pleuré.';return t;},
 choices:[
  {text:'Méditer sur la vision — laisser la foi se renforcer.',ico:'&#128591;',type:'faith',hint:'Restauration et honneur',hp:15,res:0,honor:25,xp:20,out:'Dix minutes immobile, les genoux sur les dalles froides. Quand vous vous relevez, quelque chose a changé dans vos épaules — elles portent le même poids, mais différemment. La peur est absente. Pas remplacée par l\'insouciance — remplacée par la certitude. Vous avancez. L\'Emperor a les yeux sur vous. Ça suffit.'},
  {text:'Agir immédiatement — suivre l\'intuition.',ico:'&#127939;',type:'explore',hint:'Bonus XP et découverte',hp:0,res:0,honor:15,xp:30,dice:true,out:'Vous suivez l\'intuition laissée par la vision — un couloir à gauche que vous auriez ignoré, une porte que vous auriez laissée fermée. De l\'autre côté : exactement ce dont vous aviez besoin, au bon endroit, au bon moment. La providence impériale existe. Vous venez d\'en avoir la preuve.',outBad:'L\'intuition vous emmène dans une impasse sous les tirs ennemis. Vous reculez, blessé. La vision mentait peut-être — ou peut-être que ce détour était nécessaire pour que vous arriviez au bon endroit au bon moment.',outGood:'La providence est précise. Ce que vous trouvez là change votre manière d\'aborder la suite de la mission.',lootGood:'casque'},
  {text:'Ignorer la vision — rester rationnel.',ico:'&#129504;',type:'explore',hint:'Rationnel',hp:0,res:10,honor:0,xp:10,out:'Vous chassez la vision. Des hallucinations en zone de combat sont normales. Le cerveau sous stress produit des images. Vous continuez à avancer, méthodique, efficace. Quelque chose, cependant, reste dans le coin de votre esprit — une certitude tranquille que vous ne vous expliquez pas. Vous avancez avec ça.'}
 ]},
{id:'plague_village',phase:'mid',tags:['all'],type:'event',title:'Chapitre IX — Le Village de la Mort Douce',
 nar:function(s){var t='Le village de Keth\'al aurait dû être mort depuis quatre jours. Les symptômes — les nécroses rampantes, les nodules qui bougent sous la peau — font de Nurgle une évidence. Et pourtant les habitants marchent encore. Et ils sourient.';t+='\n\nC\'est le sourire qui vous trouble le plus.';t+='\n\nQuatre cents âmes. Le Commissaire régional a déjà transmis les coordonnées pour la purge orbitale. Sa voix dans votre oreillette est plate, professionnelle. Mais à vos pieds, une petite fille vous tend une fleur des champs toute froissée. Ses yeux sont intacts. Pas encore contaminés. Pas encore.';return t;},
 choices:[
  {text:'Ordonner la quarantaine et chercher un remède.',ico:'&#127973;',type:'sacrifice',hint:'Humanité — coûteux mais défendable',hp:-5,res:-20,honor:20,xp:20,dice:true,out:'La quarantaine tient. Un Biologis trouve la source — un artefact xénos dans le puits du village. Détruit, la propagation cesse. Soixante personnes survivent. Vous quittez le village au lever du jour, épuisé et allégé de la moitié de vos ressources. Mais la petite fille est en vie. Vous avancez avec ça.',outBad:'La quarantaine cède. La maladie se répand au-delà du périmètre. Le Commissaire ordonne la purge élargie. Vous reculez en courant, les yeux fixés sur votre propre main — les symptômes mettent quatre jours à apparaître. Quatre jours pour finir la mission.',outGood:'Quarantaine parfaite. L\'artefact détruit, cent vingt personnes survivent. Le médaillon que la petite fille glisse dans votre main en partant — vous ne savez pas encore ce qu\'il signifie. Mais vous le gardez.'},
  {text:'Autoriser la purge orbitale immédiate.',ico:'&#9732;',type:'combat',hint:'Efficace — zéro risque de propagation',hp:0,res:0,honor:-15,xp:10,out:'L\'orbite brûle proprement. La contamination est stoppée. Vous regardez les colonnes de fumée sans expression. L\'Emperor exige parfois l\'impensable. Vous l\'avez fait. Vous avancez. Mais la fleur que la petite fille vous avait tendue est encore dans votre poche. Vous ne l\'avez pas remarqué avant maintenant.'},
  {text:'Interroger les survivants avant de décider.',ico:'&#128172;',type:'npc',hint:'Peut révéler une troisième option',hp:-10,res:-10,honor:10,xp:25,dice:true,out:'Une vieille femme vous conduit directement à la source et révèle qu\'un Cultiste de Nurgle a délibérément contaminé le puits trois jours avant l\'arrivée des troupes impériales. La purge peut être chirurgicale. Cent personnes survivent. Et vous repartez avec le nom du Cultiste, qui n\'est pas seul.',loot:'donnees',outBad:'Les survivants paniquent et s\'éparpillent dans les ruines. Impossible de les interroger. Le Commissaire ordonne la purge. Vous regardez. Vous ne pouvez rien faire.',outGood:'Témoignage complet. Cent vingt personnes survivent. Et le nom que la vieille femme vous donne — ce nom que vous reconnaissez — change tout ce que vous pensiez savoir sur cette mission.',lootGood:'coords'}
 ]},
{id:'traitor_general',phase:'late',tags:['all'],type:'event',title:'Chapitre XIII — Le Traître',
 nar:function(s){var t='Le Général Mordechai Veyne commande le Front Sud depuis quatorze mois. Quatorze mois pendant lesquels les offensives impériales ont échoué avec une régularité qui dépasse la statistique, la malchance, et même l\'incompétence.';t+='\n\nVous avez le dossier. Trente-deux pages de preuves. Six bataillons massacrés dans des embuscades parfaites. Des coordonnées vendues. Des noms d\'agents compromis.';t+='\n\nEt il est là, à cinq mètres de vous, penché sur sa table, dictant des ordres d\'une voix calme et assurée. Il ne sait pas que vous savez. Demain à l\'aube, une offensive de quarante mille hommes s\'ébranle. Si Mordechai en connaît les détails...';return t;},
 choices:[
  {text:'L\'arrêter publiquement — faire éclater la vérité.',ico:'&#128226;',type:'faith',hint:'Justice — moral mais déstabilisant',hp:0,res:0,honor:20,xp:20,out:'Le scandale secoue le commandement jusqu\'au plus haut échelon. L\'offensive est retardée de quarante-huit heures. Mordechai est emmené par deux Inquisiteurs qui semblaient l\'attendre. Semblaient l\'attendre depuis longtemps. Vous repartez avec votre réputation renforcée — et une question qui ne vous quittera pas : qui savait déjà, et depuis quand ?'},
  {text:'L\'éliminer discrètement cette nuit.',ico:'&#128481;',type:'explore',hint:'Efficace — l\'honneur en souffre',hp:-5,res:-5,honor:-10,xp:15,dice:true,out:'Mort accidentelle lors d\'une inspection de nuit. L\'offensive part à l\'heure, bénéficiant d\'un avantage de surprise total. Six bataillons survivent grâce à votre décision. Vous ne dormez plus pareil. Mais vous avancez. Ce que vous avez fait, vous l\'avez fait pour eux.',outBad:'Un témoin vous observe depuis l\'ombre. Mordechai est vivant, et maintenant il sait que vous savez. La partie vient de changer de nature. Vous reculez dans les profondeurs de la base. La chasse commence.',outGood:'Exécution propre, aucun témoin, aucune trace. L\'offensive bénéficiera d\'un avantage de surprise total. Vous avancez dans la nuit, plus léger d\'un poids que vous portiez sans le savoir.'},
  {text:'Le retourner contre ses maîtres — double jeu.',ico:'&#127917;',type:'explore',hint:'Risque élevé — récompense maximale',hp:0,res:10,honor:5,xp:30,out:'Mordechai, acculé, choisit de collaborer. Il envoie de fausses positions aux forces du Chaos pendant quarante-huit heures. L\'offensive bénéficie d\'un avantage de surprise absolu. Double victoire. Double secret. Mordechai disparaît ensuite dans un programme de protection de témoin dont vous ne connaîtrez jamais les détails. Vous avancez. Certaines vérités sont mieux gardées dans l\'obscurité.',loot:'donnees'}
 ]},
{id:'chaos_marines',phase:'late',tags:['marine','guard','wolves','inquisitor'],type:'combat',enemy:{name:'Guerrier du Chaos',mc:8,pe:22},title:'Chapitre XIV — Les Fils de la Ruine',
 nar:function(s){var t='Ils vous attendent. Ce n\'est pas une embuscade — ils vous ont délibérément laissé approcher. Quatre Marines du Chaos qui occupent le corridor avec la décontraction de gens qui n\'ont pas eu peur depuis très longtemps.';t+='\n\nLeurs armures sont des oeuvres d\'horreur : gravées de visages hurlants, couvertes de symboles qui changent si vous les regardez trop longtemps. Le plus grand porte un brassard où sont cloués des crânes en rang serrés. Chacun a appartenu à quelqu\'un.';t+='\n\nRejoins-nous, dit-il. Sa voix est presque aimable. Ou tombe ici. Au moins, tombe en guerrier.\n\nDerrière eux, vous apercevez ce que vous êtes venu chercher. Il faut passer. Il faut.';return t;},
 choices:[
  {text:'Pour l\'Emperor — attaque frontale.',ico:'&#9769;',type:'combat',hint:'Honneur maximal',hp:-30,res:-20,honor:25,xp:30,dice:true,out:'Deux Marines du Chaos tombent. Les deux autres reculent en crachant des malédictions en langues oubliées. Vous enjambez les corps sans vous arrêter. Ce que vous cherchez est à vingt mètres. Vous avancez, encore sous adrénaline, encore saignant, et vous tendez la main vers l\'objectif.',outBad:'Vous êtes repoussé violemment. Repli forcé de cinquante mètres. Mais en reculant, vous avez repéré une faille dans leur formation. Vous avez un plan maintenant. Mieux armé d\'intelligence que de balles.',outGood:'Assaut parfait. Tous les quatre neutralisés en moins de deux minutes. Sur le chef, une armure que vous pouvez récupérer. Et derrière eux : votre objectif, intact, qui vous attend comme s\'il avait toujours su que vous viendriez.',lootGood:'armure2'},
  {text:'Feindre la considération — puis frapper.',ico:'&#127917;',type:'combat',hint:'Ruse — moins de dégâts',hp:-20,res:-10,honor:10,xp:20,dice:true,out:'À la seconde exacte où leur garde baisse, vous frappez. Deux morts avant qu\'ils comprennent ce qui arrive. Les deux autres fuient dans un accès de quelque chose qui ressemble à de la peur. Vous traversez la position au pas de course et vous saisissez l\'objectif. Le retour sera difficile. Mais vous l\'avez.',outBad:'Votre feinte est percée. Ils attaquent en coordination parfaite — ils avaient prévu cette possibilité. Vous reculez à travers une fenêtre et tombez un étage. Douloureux, mais vivant. Le contournement par le niveau inférieur vous prendra vingt minutes. Mais vous arriverez.',loot:'armure1'},
  {text:'Contourner par un conduit d\'aération.',ico:'&#128062;',type:'explore',hint:'Aucune perte — objectif retardé',hp:-5,res:-10,honor:-5,xp:10,out:'Quarante minutes dans les conduits, dans l\'obscurité, à ramper sur les coudes. Vous réapparaissez derrière eux alors qu\'ils cherchent encore devant. Vous saisissez l\'objectif et repartez par où vous êtes venu. Ils ne vous rattraperont pas — ils cherchent dans la mauvaise direction.'}
 ]},
{id:'pillards',phase:'mid',tags:['all'],type:'trap',title:'Chapitre XI — Les Survivants',
 nar:function(s){var t='La première silhouette surgit de l\'ombre. Puis une autre. Cinq au total — mais vous suspectez qu\'il en reste derrière vous. Des gens désespérés qui avaient le temps de préparer cette rencontre, contrairement à vous.';t+='\n\nIls ne sont pas des soldats. Ils sont pires : des survivants. Maigres, blessés, les yeux de gens qui ont vu leur monde s\'effondrer et ont décidé que votre équipement les aiderait à survivre un jour de plus.';t+='\n\nLeur chef — un homme dont la moitié du visage est tissu cicatriciel — vous tient en joue avec un pistolet assemblé à partir de trois autres cassés. Son regard est calme. Résigné.\n\nL\'équipement ou la vie. On a besoin de tout ce que vous portez.';return t;},
 choices:[
  {text:'Résister — attaquer les pillards en force.',ico:'&#9876;',type:'combat',hint:'Combat — risque de mort',hp:-30,res:-10,honor:10,xp:20,dice:true,out:'Vous en neutralisez trois avant qu\'ils se dispersent. Blessé mais debout, équipement intact. Vous regardez le chef fuir dans les décombres — il y retournera demain, plus désespéré qu\'avant. Cette pensée vous pèse pendant que vous avancez. Mais vous avancez quand même.',outBad:'Ils sont trop nombreux. Un coup à la nuque vous assomme. Quand vous reprenez conscience, tout a disparu. Vous êtes seul dans les décombres avec votre seule volonté — et ça, personne ne peut le prendre. Vous vous relevez et vous repartez.',rob:true,outGood:'Réflexes parfaits. Les cinq pillards fuient ou tombent. L\'un d\'eux a laissé ses provisions dans sa fuite précipitée — vous les ajoutez à vos réserves et continuez. La culpabilité et la survie font rarement bon ménage.',loot:'munitions'},
  {text:'Négocier — offrir des ressources contre votre liberté.',ico:'&#128172;',type:'npc',hint:'Perte de ressources — équipement intact',hp:0,res:-40,honor:-5,xp:10,dice:true,out:'Ils acceptent vos ressources et vous laissent passer. Humiliant. Efficace. Vous continuez, allégé de la moitié de vos provisions mais intact. Le chef vous regarde partir avec quelque chose qui ressemble à du respect. Dans cet enfer, la négociation est aussi une forme de courage.',outBad:'Ils prennent les ressources ET l\'équipement. Mordechai encore une fois en retard. Vous vous relevez dépouillé et vous repartez avec ce qui vous reste : votre formation, vos réflexes, et votre colère.',rob:true,outGood:'Votre calme impressionne le chef. Il prend peu et glisse une information : un raccourci que seuls les habitants d\'avant-guerre connaissent. Il vous a donné plus que vous ne lui avez donné.'},
  {text:'Fuir à toute vitesse dans les ruines.',ico:'&#127939;',type:'explore',hint:'Fuite — chance pure',hp:-15,res:0,honor:0,xp:10,dice:true,out:'Vous disparaissez dans les ruines avant qu\'ils réagissent. Ils abandonnent la poursuite après deux couloirs. Vous émergez dans une zone que vous ne connaissiez pas — et qui se révèle être un raccourci de vingt minutes vers votre objectif. Parfois fuir mène quelque part.',outBad:'Ils vous rattrapent dans un couloir sans issue. Vous vous défendez mais êtes submergé. Vous vous réveillez dépouillé, seul, avec le soleil qui se lève. Une journée entière de retard. Et la mission qui continue.',rob:true,outGood:'Sprint parfait. Vous semez les pillards en moins de deux minutes et débouchez, hors d\'haleine, dans une zone que vous n\'auriez jamais explorée autrement. Ce que vous y trouvez vaut le détour.'}
 ]},
{id:'finale_heretic',phase:'finale',tags:['marine','guard','wolves','inquisitor'],type:'combat',enemy:{name:'Lord Malachar',mc:10,pe:30},title:'Épilogue I — Lord Malachar',
 nar:function(s){var t='Vous avez traversé l\'enfer pour arriver ici. Littéralement.';t+='\n\nLa salle du trône de Lord Malachar n\'a plus rien d\'impérial. Les colonnes sont des vertèbres géantes, les murs palpitent d\'une lente respiration, et le trône lui-même semble avoir poussé, organique, autour de l\'homme qui y siège depuis des millénaires.';t+='\n\nIl ne se lève pas quand vous entrez. Il vous regarde — et dans ce regard vous percevez quelque chose d\'inattendu. Pas de la haine. Pas du mépris.\n\nDe la curiosité.\n\nUn guerrier qui est allé si loin, dit-il. Sa voix emplit l\'espace comme si les murs parlaient. Mourir ici sera glorieux, '+s.name+'. Presque autant que de me rejoindre.\n\nL\'air crackle. Le moment final est venu.';return t;},
 choices:[
  {text:'Pour l\'Emperor — et pour tous ceux qui sont tombés !',ico:'&#9769;',type:'combat',hint:'Le chemin de la gloire',hp:-40,res:-20,honor:40,xp:50,dice:true,out:'Le duel dure une heure. Le palais tremble autour de vous. Lord Malachar tombe en maudissant votre nom dans sept langues maudites et se dissout dans les flammes du Warp. Vous vous relevez, couvert de sang, mais debout. Victorieux. La salle s\'effondre derrière vous tandis que vous marchez vers la sortie — et vers la lumière.',outBad:'Lord Malachar est trop puissant. Vous reculez, blessé, cherchant une autre stratégie. Mais vous ne tomberez pas ici. Pas maintenant.',outGood:'Le duel est parfait. Malachar tombe stupéfait — vaincu par un guerrier plus rapide que lui ne l\'anticipait. Quelque chose de précieux chute de son armure brisée.',lootGood:'armure2'},
  {text:'Faire s\'effondrer la salle sur lui.',ico:'&#128163;',type:'explore',hint:'Le chemin du stratège',hp:-20,res:-35,honor:25,xp:40,dice:true,out:'Les charges font leur travail. Le plafond s\'effondre sur Malachar dans un tonnerre de pierre consacrée. Vous plongez par une fenêtre brisée une seconde avant que le toit ne cède. Dehors, vous vous relevez couvert de poussière et de victoire. La salle brûle derrière vous. L\'objectif est atteint.',outBad:'Les charges déclenchent une réaction magique — Malachar en ressort renforcé, furieux. L\'effondrement vous a blessé. La partie continue dans les ruines fumantes.',outGood:'Effondrement parfait. Malachar disparaît sous des tonnes de pierre consacrée. Vous êtes déjà en train de courir vers la sortie quand les derniers décombres tombent.'},
  {text:'Attendre le moment de faiblesse — puis frapper.',ico:'&#127917;',type:'explore',hint:'Le chemin de la patience',hp:-25,res:-10,honor:30,xp:45,dice:true,out:'Il monologue. Vous attendez. Deux minutes. Trois. Et puis — une seconde, une seule, où son attention se détourne de vous pour se poser sur quelque chose dans le passé. La lame traverse son armure dans cet instant. Il tombe, stupéfait. Même les Champions du Chaos ont une seconde d\'inattention. Vous la trouvez. Vous repartez.',outBad:'Il ne baisse jamais vraiment sa garde. Vous êtes contraint au combat en position défavorable, dos au mur.',outGood:'Frapper au bon moment. La lame traverse directement son armure sans résistance. Victoire par patience — la plus difficile à obtenir, la plus douce à savourer.'}
 ]},
{id:'finale_hive',phase:'finale',tags:['marine','guard','wolves'],type:'combat',enemy:{name:'Norn-Reine',mc:8,pe:35},title:'Épilogue II — La Norn-Reine',
 nar:function(s){var t='Deux kilomètres de chair vivante pour arriver jusqu\'ici. Deux kilomètres de tissus synaptiques et de tunnels que la Norn-Reine a extrudés d\'elle-même — sauf que cette toile pèse trois cent mille tonnes et recouvre deux continents.';t+='\n\nLa chambre centrale est une cathédrale de biologie. La Norn-Reine occupe son centre comme un organe vital. Trois milliards de créatures sur cette planète dépendent de son signal synaptique. Si elle meurt, elles perdent la raison. Ce qui est pire que de mourir.';t+='\n\nElle vous perçoit. Pas avec des yeux. Avec quelque chose de bien plus profond. Et pendant une fraction de seconde, vous captez une pensée qui n\'est pas la vôtre :\n\nJe savais que tu viendrais. Depuis le début.';return t;},
 choices:[
  {text:'Charger — la tuer au prix de votre santé mentale.',ico:'&#128170;',type:'combat',hint:'Sacrifice ultime',hp:-45,res:-20,honor:45,xp:50,dice:true,out:'La douleur psychique est totale — vos souvenirs se brouillent, votre identité vacille une seconde terrifiante. Mais vous avancez. La Norn-Reine meurt en produisant un hurlement synaptique planétaire. L\'essaim s\'effondre en quelques minutes. Vous sortez vivant, à moitié vous-même, pleurant et riant. Héros à jamais. Mais changé. Pour toujours.',outBad:'La douleur psychique vous terrasse avant d\'atteindre la cible. Vous sortez en rampant, brisé mais vivant. La Norn-Reine survit — pour l\'instant. La mission continue par d\'autres moyens.',outGood:'Résistance mentale parfaite. La Norn-Reine meurt en moins d\'une minute. Vous sortez debout, souverain, et vous regardez l\'essaim s\'effondrer autour de vous comme une vague qui se retire.'},
  {text:'Bombardement orbital ciblé.',ico:'&#128640;',type:'explore',hint:'Stratégie à distance',hp:-15,res:-35,honor:20,xp:35,dice:true,out:'Coordonnées transmises. Frappe orbitale en quatre minutes. Vous courez vers la sortie en comptant les secondes. La chambre explose derrière vous dans un rugissement de feu orbital. L\'essaim s\'effondre. Vous émergez sous un ciel de cendres — et vous respirez l\'air libre pour la première fois depuis ce qui vous semble une éternité.',outBad:'Les coordonnées sont légèrement fausses. La frappe manque la chambre centrale. La Norn-Reine survit, blessée et furieuse. L\'essaim se réorganise. La mission continue.',outGood:'Frappe parfaite. La chambre est désintégrée en moins de trente secondes. Vous sortez avant même que la poussière retombe.'},
  {text:'Inverser la connexion synaptique.',ico:'&#128260;',type:'explore',hint:'Génie tactique',hp:-20,res:-30,honor:30,xp:45,dice:true,out:'Le signal d\'inversion transforme l\'essaim en masse auto-dévorante. Spectaculaire, horrible, et d\'une efficacité absolue. La Norn-Reine hurle dans un vide psychique de sa propre création. Vous sortez en marchant, lentement, pendant que la planète se nettoie elle-même. La victoire la plus étrange de votre vie.',outBad:'L\'inversion échoue partiellement — l\'essaim est perturbé mais fonctionnel. La Norn-Reine tourne sa colère vers vous. Il faut une autre solution.',outGood:'Inversion totale. Trois milliards de créatures se retournent contre leur propre mère. Vous regardez ce spectacle impossible, immobile, pendant une longue minute. Puis vous repartez.'}
 ]},
{id:'finale_techpriest',phase:'finale',tags:['techpriest','inquisitor'],type:'combat',title:'Épilogue III — L\'Overlord',
 nar:function(s){var t='Les systèmes mécaniques cessent de fonctionner dans un rayon de trente mètres autour de lui. Vos capteurs s\'éteignent un par un. L\'éclairage de votre casque vacille. Et le silence s\'installe — le silence des machines qui s\'arrêtent — que vous, Prêtre-Technicien, ressentez comme une amputation.';t+='\n\nSzarekh n\'est pas debout. Il est simplement présent, comme si debout était un concept trop trivial pour lui. Cinquante millions d\'années de mémoire déroulée dans un corps de métal vivant.';t+='\n\nOrganique, dit-il. Sa voix ressemble au son que ferait un orgue construit à partir de glas et de tonnerre. Éphémère. Êtes-vous venu mourir dans ma chambre ? Ou avez-vous quelque chose d\'intéressant à me proposer ?';return t;},
 choices:[
  {text:'Activer le virus Nécrodermis.',ico:'&#128137;',type:'explore',hint:'Préparation — tout ou rien',hp:-20,res:-35,honor:25,xp:50,dice:true,out:'Le virus se propage dans ses circuits avec une lenteur terrifiante — puis soudainement rapide. Szarekh tente de se télécharger dans un corps de secours. Vous coupez la connexion à la milliseconde. Il s\'éteint avec un son comme un soupir millénaire. La chambre reprend vie — vos systèmes redémarrent l\'un après l\'autre. Vous repartez dans le bourdonnement retrouvé de votre propre mécanique.',outBad:'Le virus est détecté et neutralisé en trois secondes. Szarekh se lève, furieux. La partie continue sur son terrain.',outGood:'Propagation parfaite en moins de cinq secondes. Szarekh disparaît sans un mot. Vous repartez dans un silence complet — et quelque part dans ce silence, vous entendez votre propre cœur.'},
  {text:'Combat direct avec armes anti-Nécron.',ico:'&#9876;',type:'combat',hint:'Combat technologique',hp:-30,res:-20,honor:25,xp:35,dice:true,out:'Chaque coup échange destruction contre régénération — mais vous connaissez ce cycle. Vous cherchez le noeud de contrôle pendant qu\'il régénère. Vous le trouvez. Vous le détruisez. L\'Overlord s\'effondre en métal inerte dans un silence absolu. Vous enjambez les pièces et repartez. La mission continue.',outBad:'Le Nécron régénère chaque blessure. Vous reculez épuisé, cherchant une autre approche. La chambre est plongée dans un silence métallique et pesant.',outGood:'Précision chirurgicale. Le noeud de contrôle détruit du premier coup. Szarekh s\'effondre avant de comprendre ce qui lui arrive. Vous repartez avec une avance précieuse.',lootGood:'armure2'},
  {text:'Parler à l\'Overlord — un accord millénaire.',ico:'&#128172;',type:'npc',hint:'Diplomatique — imprévisible',hp:-5,res:15,honor:-10,xp:35,dice:true,out:'Szarekh est... intéressé. Un accord est signé en protocole machine — ses forces reculent de trois secteurs en échange de quelque chose que vous n\'avez pas encore compris avoir promis. Vous repartez avec l\'avantage tactique et une dette envers une entité millénaire. Chaque victoire a un prix.',outBad:'Szarekh n\'a aucun intérêt à parler. Il attaque immédiatement, la conversation terminée avant même d\'avoir commencé.',outGood:'L\'accord est favorable — ses forces reculent sur sept secteurs. Vous repartez plus vite et plus loin que prévu. Avec, dans le dos, le sentiment que quelque chose d\'infiniment vieux vous regarde encore.'}
 ]},
{id:'finale_chaos',phase:'finale',tags:['chaos'],type:'event',title:'Épilogue IV — L\'Ascension',
 nar:function(s){var t='Ils parlent tous en même temps, et leur voix ne fait qu\'une — un accord parfait qui résonne directement dans les os de votre crâne.';t+='\n\nTu as prouvé ta valeur. L\'ascension t\'attend.';t+='\n\nDevant vous, un Champion des Ultramarines en armure immaculée, venu vous arrêter seul, comme si l\'univers entier regardait. Il ne dit rien. Il attend. Dans son regard, pas de haine — juste une tristesse infinie et une détermination plus ancienne que la peur.';t+='\n\nDerrière vous, le Warp. Devant vous, l\'Empire. Entre les deux, l\'âme de '+s.name+' — la seule chose que personne ne peut prendre, mais que vous pouvez encore choisir de donner.';return t;},
 choices:[
  {text:'Accepter l\'Ascension — devenir Prince Démon.',ico:'&#127752;',type:'explore',hint:'La damnation glorieuse',hp:50,res:30,honor:-50,xp:40,out:'La transformation est totale. La douleur est absolue, puis disparaît. Vous n\'êtes plus humain. Vous êtes éternel. Quelque chose en vous — ce que vous étiez — pleure quelque part très loin, et le son s\'éteint. Les Dieux rient. Et quelque part, très loin, l\'Emperor pleure un fils perdu.'},
  {text:'Refuser et affronter le Champion.',ico:'&#9876;',type:'combat',hint:'Rédemption possible',hp:-35,res:-20,honor:35,xp:50,dice:true,out:'Vous refusez les Dieux dans un silence qui semble durer une éternité. Le Champion avance. Le combat est brutal et magnifique. Vous gagnez. Et vous restez humain — damné, renégat, maudit — mais humain. Les Dieux vous méprisent désormais. Quelque chose dans votre âme respire pour la première fois depuis très longtemps. Vous avancez vers l\'horizon.',outBad:'Le Champion est plus fort que prévu. Vous tombez. Mais vous tombez debout dans vos convictions — et parfois, c\'est tout ce qu\'il reste.',outGood:'Duel parfait. Le Champion s\'incline devant votre résistance aux Dieux. « Vous méritez mieux que ce qu\'ils vous ont fait », dit-il avant de disparaître. Vous repartez seul, libre, et plus vivant que vous ne l\'avez jamais été.'},
  {text:'Négocier — prendre le pouvoir sans perdre l\'âme.',ico:'&#127917;',type:'explore',hint:'Le pari de Tzeentch',hp:-10,res:20,honor:-20,xp:35,dice:true,out:'Tzeentch apprécie l\'audace. Il vous accorde une parcelle de pouvoir démonique sans Ascension complète. Le Champion tombe. Vous êtes vivant, puissant, et désormais marionnette d\'un Dieu. Avez-vous vraiment gagné ? La question vous accompagnera longtemps. Vous avancez quand même.',outBad:'Les Dieux rejettent la négociation avec un éclat de rire qui résonne dans vos os. Vous êtes attaqué de toutes parts.',outGood:'Tzeentch rit. L\'accord parfait — vous gardez votre humanité et le pouvoir. Pour l\'instant. La liberté a des conditions, et vous venez de signer un contrat que vous lirez toute votre vie.'}
 ]}
];

/* SCENE POOL */
function pickScene(){
  var phase=S.act<=4?'early':S.act<=10?'mid':S.act<=16?'late':'finale';
  var fid=S.faction;
  var pool=SCENES.filter(function(sc){
    if(S.usedScenes.indexOf(sc.id)>=0)return false;
    if(sc.phase!=='any'&&sc.phase!==phase)return false;
    return sc.tags.indexOf('all')>=0||sc.tags.indexOf(fid)>=0;
  });
  if(!pool.length)pool=SCENES.filter(function(sc){return sc.phase===phase&&S.usedScenes.indexOf(sc.id)<0;});
  if(!pool.length)pool=SCENES.filter(function(sc){return sc.phase==='late'&&S.usedScenes.indexOf(sc.id)<0;});
  if(!pool.length)pool=SCENES.filter(function(sc){return S.usedScenes.indexOf(sc.id)<0;});
  if(!pool.length)return SCENES[0];
  return pool[Math.floor(Math.random()*pool.length)];
}

/* FLOW */
function nextScene(ct,d){
  if(d){
    S.hp=clamp(S.hp+(d.hp||0),0,getMaxHp());
    S.res=clamp(S.res+(d.res||0));
    S.honor=clamp(S.honor+(d.honor||0));
    S.xp=Math.max(0,S.xp+(d.xp||0));
    if(S.hp<=0){renderDeath();return;}
  }
  // Doctrine passives at chapter start
  if(S.doctrines.indexOf('ravitaillement')>=0){ S.res=clamp(S.res+5); }
  if(S.doctrines.indexOf('geoloc')>=0){ S.res=clamp(S.res+10); }
  if(S.doctrines.indexOf('regen')>=0 && !S.lastCombatWon){ S.hp=clamp(S.hp+2,0,getMaxHp()); }
  S.lastCombatWon=false;
  S.rerollUsed=false; // reset reroll each chapter
  S.act++;
  if(S.act>S.maxActs){renderEnding();return;}
  var sc=pickScene();S.usedScenes.push(sc.id);S.currentScene=sc;
  renderScene(sc,d);
}

function renderScene(sc,pd){
  var isF=S.act>=S.maxActs;
  S.pageNum+=Math.floor(Math.random()*8)+4;
  if(sc.type==='combat')snd_battle();

  var notifH='<div id="narea">';
  if(pd){
    if(pd.hp)  notifH+='<span class="notif '+(pd.hp>0?'np':'nn')+'">'+(pd.hp>0?'+':'')+pd.hp+' PV</span>';
    if(pd.res) notifH+='<span class="notif '+(pd.res>0?'np':'nn')+'">'+(pd.res>0?'+':'')+pd.res+' RES</span>';
    if(pd.honor)notifH+='<span class="notif '+(pd.honor>0?'np':'nn')+'">'+(pd.honor>0?'+':'')+pd.honor+' HON</span>';
    if(pd.xp)  notifH+='<span class="notif np">+'+pd.xp+' XP</span>';
  }
  notifH+='</div>';

  var narTxt=typeof sc.nar==='function'?sc.nar(S):sc.nar;
  S.curNar=narTxt;

  var choH=(sc.choices||[]).map(function(c,i){
    var cclass=CC[c.type]?' '+CC[c.type]:'';
    var dtag=c.dice?'<span class="dtag">'+(c.type==='combat'?'&#9876; MC '+getMC():'&#127922; DÉ')+'</span>':'';
    return '<button class="cbtn'+cclass+'" onclick="pickChoice('+i+')">'+
      +'<span class="clet">'+String.fromCharCode(65+i)+'.</span>'+dtag+(c.ico||'')+' '+c.text
      +(c.hint?'<span class="chint">&#8627; '+c.hint+'</span>':'')
      +'</button>';
  }).join('');

  var typeTag=sc.type?'<span class="stag '+(TC[sc.type]||'t-eve')+'">'+(TL[sc.type]||sc.type.toUpperCase())+'</span>':'';

  setMain(
    renderStats()+renderInv()+renderDocBar()+notifH+renderTopBar()
    +mkpanel(
      '<div class="chmark">Chapitre '+S.act+' / '+S.maxActs+' &middot; '+S.name+' &middot; '+S.fdata.name+'</div>'
      +'<div style="text-align:center;margin-bottom:.55rem">'+typeTag+'</div>'
      +'<div id="stitle">'+sc.title+'</div>'
      +mkdiv('&#10022;')
      +'<div class="pgnum">&mdash; Page '+S.pageNum+' &mdash;</div>'
      +'<div id="nbox"><span id="ntxt"></span><span class="tcur" id="tcur"></span></div>'
      +'<button id="nextbtn" onclick="advancePage()">Tourner la page &#8594;</button>'
      +'<div id="carea" style="opacity:0;pointer-events:none;margin-top:1.1rem">'+choH+'</div>'
      +(isF?'<p style="font-family:\'Cinzel\',serif;font-size:.54rem;letter-spacing:.18em;color:var(--blood);text-align:center;margin-top:.65rem">&#9876; CONFRONTATION FINALE &#9876;</p>':'')
    )
  );

  typeWriter(narTxt,function(){
    var cur=document.getElementById('tcur');if(cur)cur.remove();
    var ca=document.getElementById('carea');if(ca){ca.style.opacity='1';ca.style.pointerEvents='';}
  });
}

function pickChoice(idx){
  var sc=S.currentScene;var c=sc.choices[idx];if(!c)return;
  document.querySelectorAll('.cbtn').forEach(function(b){b.disabled=true;});
  if(c.type==='combat'||sc.type==='combat')snd_battle();

  // DOCTRINE instinct : trap scenes immune
  if(sc.type==='trap' && S.doctrines.indexOf('instinct')>=0 && c.dice){
    // Auto-success on traps
    setTimeout(function(){
      var autoText = c.out+' (Votre Instinct du Guerrier vous a permis de détecter et déjouer le piège instantanément.)';
      var lootId = c.loot||null;
      var deltas={hp:0,res:(c.res||0),honor:(c.honor||0)+5,xp:(c.xp||0)+5};
      S.pendingDeltas=deltas;
      if(lootId)addItem(lootId);
      var nbox=document.getElementById('nbox');
      if(nbox){var ca=document.getElementById('carea');if(ca)ca.style.opacity='0';
        nbox.innerHTML='<div class="outbox og">&#128065; INSTINCT &mdash; '+autoText+'</div>'+(lootId&&ITEMS[lootId]?'<div class="lootln">'+ITEMS[lootId].ico+' '+ITEMS[lootId].name+'</div>':'');}
      var nb=document.getElementById('nextbtn');if(nb)nb.style.display='block';
    },300);
    return;
  }

  // DOCTRINE egide : warp scenes immune  
  if(sc.id==='warp_anomaly' && S.doctrines.indexOf('egide')>=0 && c.dice){
    setTimeout(function(){
      var autoText = c.out+' (Votre Égide Psychique vous protège totalement des flots du Warp.)';
      var lootId = c.loot||null;
      var deltas={hp:0,res:(c.res||0),honor:(c.honor||0)+10,xp:(c.xp||0)+10};
      S.pendingDeltas=deltas;
      if(lootId)addItem(lootId);
      var nbox=document.getElementById('nbox');
      if(nbox){var ca=document.getElementById('carea');if(ca)ca.style.opacity='0';
        nbox.innerHTML='<div class="outbox og">&#128737; ÉGIDE &mdash; '+autoText+'</div>';}
      var nb=document.getElementById('nextbtn');if(nb)nb.style.display='block';
    },300);
    return;
  }

  // COMBAT ENGINE — route combat dice through QPF system
  if(c.type==='combat' && c.dice){
    openCombat(idx);
    return;
  }

  function applyAndShow(outText,lootId,deltas,robbed){
    if(robbed)stripAll();
    if(lootId)addItem(lootId);
    S.pendingDeltas=deltas;
    var nbox=document.getElementById('nbox');
    if(nbox){
      var ca=document.getElementById('carea');if(ca)ca.style.opacity='0';
      var ocls=robbed?'ob':(deltas.hp>0||deltas.honor>0)?'og':deltas.hp<-20?'ob':lootId?'oc':'';
      var lln=lootId&&ITEMS[lootId]?'<div class="lootln">&#128230; Objet trouve : '+ITEMS[lootId].ico+' '+ITEMS[lootId].name+' &mdash; '+ITEMS[lootId].desc+'</div>':'';
      var rln=robbed?'<div class="robln">&#9888; DEPOUILLE &mdash; Tout votre equipement est perdu</div>':'';
      nbox.innerHTML='<div class="outbox '+ocls+'">'+outText+'</div>'+rln+lln;
    }
    var nb=document.getElementById('nextbtn');if(nb)nb.style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }

  if(c.dice){
    showDice(c.text,function(r,cat){
      var outText,lootId,deltas,robbed=false;

      if(r===1&&(c.type==='combat'||sc.type==='combat')){
        snd_damnation();
        var nbox2=document.getElementById('nbox');
        if(nbox2){var ca2=document.getElementById('carea');if(ca2)ca2.style.opacity='0';
          nbox2.innerHTML='<div class="outbox ob">&#127922; 1 &mdash; FUMBLE FATAL. Une erreur catastrophique. La mort vient vite, comme un dernier acte de misericorde.</div>';}
        setTimeout(function(){renderDeath();},2200);
        return;
      }

      if(r===1&&sc.type==='trap'){
        stripAll();
        var nbox3=document.getElementById('nbox');
        if(nbox3){var ca3=document.getElementById('carea');if(ca3)ca3.style.opacity='0';
          nbox3.innerHTML='<div class="outbox ob">&#127922; 1 &mdash; FUMBLE. '+(c.outBad||'Catastrophe.')+'</div>'
            +'<div class="robln">&#9888; DEPOUILLE &mdash; Tout votre equipement est perdu</div>';}
        S.pendingDeltas={hp:-25,res:-20,honor:-10,xp:5};
        var nb3=document.getElementById('nextbtn');if(nb3)nb3.style.display='block';
        window.scrollTo({top:0,behavior:'smooth'});
        return;
      }

      if(cat.fumble||!cat.good){
        outText=c.outBad||('Resultat : '+cat.cat+'. '+c.out);
        robbed=c.rob===true;
        lootId=null;
        deltas={hp:Math.min((c.hp||0),-10),res:(c.res||0),honor:Math.min((c.honor||0)-5,-5),xp:Math.max(5,(c.xp||0)-5)};
      }else if(cat.crit){
        outText=c.outGood||('CRITIQUE ! '+c.out);
        robbed=false;
        lootId=c.lootGood||c.loot||null;
        deltas={hp:Math.max((c.hp||0),0),res:Math.max((c.res||0),0),honor:(c.honor||0)+10,xp:(c.xp||0)+15};
      }else{
        outText=c.out;
        robbed=false;
        lootId=c.loot||null;
        deltas={hp:(c.hp||0),res:(c.res||0),honor:(c.honor||0),xp:(c.xp||0)};
      }
      applyAndShow(outText,lootId,deltas,robbed);
    });
  }else{
    applyAndShow(c.out,c.loot||null,{hp:(c.hp||0),res:(c.res||0),honor:(c.honor||0),xp:(c.xp||0)},false);
  }
}

function advancePage(){
  snd_pageTurn();
  var d=S.pendingDeltas||{};
  S.pendingDeltas=null;
  var nb=document.getElementById('nextbtn');if(nb)nb.style.display='none';
  nextScene(null,d);
}

function typeWriter(txt,onDone){
  var el=document.getElementById('ntxt');
  if(!el){if(onDone)onDone();return;}
  el.innerHTML='';
  var paras=txt.split('\n\n').filter(function(p){return p.trim();});
  if(!paras.length){if(onDone)onDone();return;}
  if(txt.length>500||window.innerWidth<380){
    el.innerHTML=paras.map(function(p){return '<p>'+p+'</p>';}).join('');
    if(onDone)onDone();return;
  }
  var pi=0,ci=0;
  var cur=document.createElement('p');el.appendChild(cur);
  var iv=setInterval(function(){
    var para=paras[pi];
    if(ci<para.length){cur.textContent+=para[ci++];}
    else{pi++;ci=0;if(pi<paras.length){cur=document.createElement('p');el.appendChild(cur);}
      else{clearInterval(iv);if(onDone)onDone();}}
  },11);
}

/* INTRO */
function showIntro(){
  var saveBtn=hasSave()?'<div style="margin-top:.9rem;text-align:center"><button class="btns" onclick="loadGame()" style="display:inline-block">&#128194; Reprendre la partie sauvegardee</button></div>':'';
  setMain(mkpanel(
    '<p class="ilore">Dans le 41eme millenaire, il n\'y a pas de paix parmi les etoiles — seulement un bain de sang éternel et le sacrifice de millions au nom de l\'Imperium.</p>'
    +'<div class="lq">Seul l\'Homme peut fagonner son destin dans l\'obscurite absolue de ce millenaire.</div>'
    +'<p class="ilore">Vous tenez le Codex de l\'Aventure Imperiale — un tome dont vous etes le heros. Chaque de jeté, chaque choix fait, fagonnera votre destin.</p>'
    +mkdiv('&#9769;')
    +'<p style="text-align:center;font-family:\'Cinzel\',serif;font-size:.66rem;letter-spacing:.22em;color:var(--parch2)">CHOISISSEZ VOTRE DESTIN</p>'
    +'<div class="fgrid">'
    +FACTIONS.map(function(f){return '<div class="fc" onclick="selectFaction(\''+f.id+'\')"><span class="fi">'+f.ico+'</span><div class="fn">'+f.name+'</div><div class="fd">'+f.desc+'</div><div class="fsl">'+f.sl+'</div></div>';}).join('')
    +'</div>'+saveBtn
  ));
}

function selectFaction(id){
  S.faction=id;S.fdata=FACTIONS.filter(function(f){return f.id===id;})[0];S.honor=S.fdata.startHonor;
  showDoctrineSelect();
}

function showNameInput(){
  var f=S.fdata;
  var it=ITEMS[f.startItem];
  setMain(mkpanel(
    '<div style="text-align:center;margin-bottom:.8rem"><div class="fbadge">'+f.ico+' '+f.name+' &mdash; '+f.chapter+'</div></div>'
    +'<div class="lq">'+f.lore+'</div>'
    +'<div style="margin-top:.6rem;padding:.5rem .7rem;background:var(--bg3);border:1px solid var(--bd);display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;text-align:center">'
    +'<div><span style="font-family:\'Cinzel\',serif;font-size:.5rem;color:var(--parch3);display:block;letter-spacing:.1em">ATTAQUE</span><span style="font-family:\'Cinzel\',serif;font-size:1.1rem;color:var(--gold)">'+f.baseAtk+'</span></div>'
    +'<div><span style="font-family:\'Cinzel\',serif;font-size:.5rem;color:var(--parch3);display:block;letter-spacing:.1em">DEFENSE</span><span style="font-family:\'Cinzel\',serif;font-size:1.1rem;color:var(--gold)">'+f.baseDef+'</span></div>'
    +'<div><span style="font-family:\'Cinzel\',serif;font-size:.5rem;color:var(--parch3);display:block;letter-spacing:.1em">PV MAX</span><span style="font-family:\'Cinzel\',serif;font-size:1.1rem;color:var(--gold)">'+f.startHp+'</span></div>'
    +'</div>'
    +'<div style="margin-top:.55rem;padding:.45rem .65rem;background:var(--bg2);border:1px solid var(--bd);display:flex;align-items:center;gap:.55rem">'
    +(it.id==='bolter'?'<img src="'+bolterSrc()+'" class="bolter-img" alt="'+it.name+'" />':'<span style="font-size:1.2rem">'+it.ico+'</span>')
    +'<div><div style="font-family:\'Cinzel\',serif;font-size:.62rem;color:var(--gold);letter-spacing:.05em">'+it.name+'</div>'
    +'<div style="font-size:.72rem;color:var(--parch2);font-style:italic">'+it.desc+'</div></div></div>'
    +mkdiv()
    +'<p style="font-family:\'Cinzel\',serif;font-size:.68rem;letter-spacing:.14em;color:var(--parch2);text-align:center;margin-bottom:.6rem">NOMMEZ VOTRE GUERRIER</p>'
    +'<div class="niw">'
    +'<input class="ni" id="nf" type="text" placeholder="Entrez votre nom..." maxlength="28" autocomplete="off"/>'
    +'<button class="btnp" onclick="startGame()">&#9769; COMMENCER</button>'
    +'</div>'
    +'<button class="btns" style="margin:0 auto" onclick="showIntro()">&#8592; Changer de Faction</button>'
  ));
  setTimeout(function(){
    var inp=document.getElementById('nf');
    if(inp){inp.focus();inp.addEventListener('keydown',function(e){if(e.key==='Enter')startGame();});}
  },60);
}

function startGame(){
  var nf=document.getElementById('nf');
  var defs=['Brother Aldric','Commissaire Vorh','Inquisiteur Kaelith','Magos 7-Delta','Vorn Ironfang','Kael le Maudit'];
  S.name=(nf?nf.value.trim():'')||rand(defs);
  S.act=0;S.usedScenes=[];S.pageNum=1;
  S.hp=S.fdata.startHp;S.maxHp=S.fdata.startHp;
  S.res=100;S.honor=S.fdata.startHonor;S.xp=0;
  S.baseAtk=S.fdata.baseAtk;S.baseDef=S.fdata.baseDef;
  S.equip={weapon:null,armor:null,head:null,trinket:null};
  S.pack=[null,null,null,null];S.inventory=[];
  S.pendingDeltas=null;
  S.rations=2;S.rerollUsed=false;S.lastCombatWon=false;
  addItem(S.fdata.startItem);
  nextScene(null,null);
}

/* ENDINGS */
function renderEnding(){
  var h=S.honor,sym,title,txt,sc;
  if(h>=70){sym='&#9769;';title='Gloire Éternelle pour l\'Emperor';sc='Légendaire';
    txt=S.name+' entre dans la legende de l\'Imperium. Vos exploits seront graves dans les Annales de Guerre pour des millenaires.';}
  else if(h>=45){sym='&#9876;';title='Devoir Accompli';sc='Honorable';
    txt='La mission est terminée. '+S.name+' a servi l\'Imperium avec honneur. L\'Emperor approuve.';}
  else if(h>=20){sym='&#128128;';title='Le Prix de la Survie';sc='Compromis';
    txt=S.name+' a survecu. Mais a quel prix ? Les choix faits dans l\'ombre pesent sur l\'ame.';}
  else{sym='&#127752;';title='L\'Hérésie Consumée';sc='Damné';
    txt='L\'ame de '+S.name+' appartient desormais aux Dieux du Chaos. Les Dieux rient.';}
  var atk=getAtk(),def=getDef();
  var eqN=[S.equip.weapon,S.equip.armor,S.equip.head].filter(Boolean).map(function(x){return x.ico+' '+x.name;}).join(' &middot; ');
  setMain(renderStats()+mkpanel(
    '<div class="epanel">'
    +'<span class="esym">'+sym+'</span>'
    +'<div class="etitle">'+title+'</div>'
    +mkdiv()
    +'<div class="pgnum">&mdash; Epilogue &mdash;</div>'
    +'<p class="etxt">'+txt+'</p>'
    +(eqN?'<div style="margin:.45rem 0;font-family:\'Cinzel\',serif;font-size:.6rem;color:var(--parch2)">Équipé : '+eqN+'</div>':'')
    +'<p style="font-family:\'Cinzel\',serif;font-size:.58rem;letter-spacing:.16em;color:var(--parch2);margin-bottom:.9rem">HONNEUR : '+h+'/100 &mdash; '+sc+' &middot; XP : '+S.xp+' &middot; ATK '+atk+' &middot; DEF '+def+'</p>'
    +'<button class="btnp" onclick="restartSame()" style="margin:0 auto .5rem;display:block">&#8635; Rejouer cette faction</button>'
    +'<button class="btns" onclick="showIntro()" style="margin:0 auto">&#8592; Autre faction</button>'
    +'</div>'
  ));
}

function renderDeath(){
snd_damnation();
  var txts=[
    S.name+' est tombe au combat. L\'ame, si elle etait pure, rejoindra les legions éternelles de l\'Emperor.',
    'Dans ses derniers instants, '+S.name+' vit le visage de l\'Emperor. L\'Imperium ne manque pas de guerriers. Il manque de victoires.'
  ];
  var txt=rand(txts);
  setMain(mkpanel(
    '<div class="epanel">'
    +'<span class="esym" style="color:var(--blood)">&#128128;</span>'
    +'<div class="etitle" style="color:var(--blood)">Mort pour l\'Emperor</div>'
    +mkdiv()
    +'<p class="etxt">'+txt+'</p>'
    +'<div class="lq">Pour mourir dans la gloire de l\'Emperor est le plus grand honneur qui soit.</div>'
    +'<button class="btnp" onclick="restartSame()" style="margin:0 auto .5rem;display:block">&#8635; Recommencer</button>'
    +'<button class="btns" onclick="showIntro()" style="margin:0 auto">&#8592; Autre faction</button>'
    +'</div>'
  ));
}

function restartSame(){
  S.act=0;S.usedScenes=[];S.pageNum=1;
  S.hp=S.fdata.startHp;S.maxHp=S.fdata.startHp;
  S.res=100;S.honor=S.fdata.startHonor;S.xp=0;
  S.equip={weapon:null,armor:null,head:null,trinket:null};
  S.pack=[null,null,null,null];S.inventory=[];
  S.pendingDeltas=null;
  addItem(S.fdata.startItem);
  nextScene(null,null);
}

showIntro();
