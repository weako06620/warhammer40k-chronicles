<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Warhammer 40,000 — Chroniques de l'Imperium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#07050300;
  --bg0s:#07050300;
  --bg1:#110d09;
  --bg2:#1a1208;
  --bg3:#241a0c;
  --bd:#3a2810;
  --bd2:#5a3e18;
  --gold:#c9a84c;
  --gold2:#e8c96a;
  --parch:#d4b896;
  --parch2:#b89870;
  --crim:#8b1a1a;
  --crim2:#b52020;
  --blood:#cc2222;
  --steel:#7a8a96;
  --chaos:#6b0f8b;
}
body{
  background:#080604;
  color:var(--parch);
  font-family:'Crimson Text',Georgia,serif;
  font-size:17px;
  min-height:100vh;
  overflow-x:hidden;
  background-image:
    radial-gradient(ellipse at 15% 0%,rgba(139,26,26,.14) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 100%,rgba(107,15,139,.09) 0%,transparent 55%);
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.035) 2px,rgba(0,0,0,.035) 4px);
  pointer-events:none;z-index:9999;
}
#app{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem;position:relative}

/* HEADER */
.hdr{text-align:center;padding:2rem 0 1rem;position:relative}
.aquila{font-size:2.8rem;color:var(--gold);line-height:1;margin-bottom:.4rem;opacity:.9;display:block}
.t-main{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.3rem,5vw,2.3rem);
  font-weight:700;color:var(--gold);
  letter-spacing:.06em;
  text-shadow:0 0 40px rgba(201,168,76,.35),0 2px 6px rgba(0,0,0,.9);
  line-height:1.2
}
.t-sub{
  font-family:'Cinzel',serif;
  font-size:clamp(.6rem,2.5vw,.85rem);
  color:var(--parch2);letter-spacing:.28em;
  text-transform:uppercase;margin-top:.4rem
}

/* PANEL */
.panel{
  border:1px solid var(--bd);
  background:var(--bg1);
  position:relative;
  padding:clamp(1rem,4vw,1.8rem)
}
.panel .c1,.panel .c2,.panel .c3,.panel .c4{
  position:absolute;width:16px;height:16px;
  border-color:var(--gold);border-style:solid
}
.c1{top:-1px;left:-1px;border-width:2px 0 0 2px}
.c2{top:-1px;right:-1px;border-width:2px 2px 0 0}
.c3{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.c4{bottom:-1px;right:-1px;border-width:0 2px 2px 0}

/* DIVIDER */
.div{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0;color:var(--bd2)}
.div::before,.div::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--bd2),transparent)}
.div span{color:var(--gold);font-size:.9rem;flex-shrink:0}

/* STATS */
#sbar{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1.2rem}
.sb{background:var(--bg2);border:1px solid var(--bd);padding:.5rem .6rem;text-align:center}
.sl{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.18em;color:var(--parch2);text-transform:uppercase;display:block;margin-bottom:3px;line-height:1.3}
.sv{font-family:'Cinzel',serif;font-size:clamp(.9rem,3vw,1.1rem);font-weight:600;color:var(--gold)}
.sbo{width:100%;height:3px;background:var(--bg3);margin-top:4px;overflow:hidden}
.sbi{height:100%;transition:width .6s ease}
.bh{background:linear-gradient(90deg,#6b1010,#cc2222)}
.br{background:linear-gradient(90deg,#10386b,#2266cc)}
.bn{background:linear-gradient(90deg,#5a4a0a,#c9a84c)}

/* SCENE */
#stitle{
  font-family:'Cinzel',serif;
  font-size:clamp(1rem,3.5vw,1.25rem);
  font-weight:600;color:var(--gold);
  text-align:center;margin-bottom:1rem;letter-spacing:.04em;line-height:1.3
}
#nbox{line-height:1.9;font-size:clamp(.95rem,2.5vw,1.05rem);color:var(--parch);min-height:100px}
.tcur{display:inline-block;width:2px;height:1.1em;background:var(--gold);vertical-align:text-bottom;animation:blink 1s step-end infinite;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* CHOICES */
#carea{margin-top:1.5rem;display:flex;flex-direction:column;gap:.6rem}
.cbtn{
  background:var(--bg2);border:1px solid var(--bd2);color:var(--parch);
  font-family:'Crimson Text',serif;font-size:clamp(.9rem,2.5vw,1rem);
  padding:.8rem 1rem .8rem 1.1rem;cursor:pointer;text-align:left;
  position:relative;transition:all .2s;line-height:1.5;width:100%;overflow:hidden
}
.cbtn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--crim);transition:background .2s}
.cbtn:hover{background:var(--bg3);border-color:var(--gold);color:var(--gold2)}
.cbtn:hover::before{background:var(--gold)}
.cbtn:active{transform:scale(.99)}
.cbtn:disabled{opacity:.35;cursor:not-allowed}
.ctag{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;margin-right:.4rem;color:var(--crim2)}

/* FACTION GRID */
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-top:1rem}
@media(max-width:520px){.fgrid{grid-template-columns:repeat(2,1fr);gap:.6rem}}
.fc{
  border:1px solid var(--bd);background:var(--bg2);
  padding:clamp(.8rem,3vw,1.1rem) .8rem;cursor:pointer;text-align:center;
  transition:all .25s;position:relative;overflow:hidden
}
.fc:hover{border-color:var(--gold);transform:translateY(-2px);background:var(--bg3)}
.fi{font-size:clamp(1.6rem,5vw,2rem);margin-bottom:.4rem;display:block}
.fn{font-family:'Cinzel',serif;font-size:clamp(.65rem,2vw,.8rem);font-weight:600;color:var(--gold);letter-spacing:.04em}
.fd{font-size:clamp(.7rem,2vw,.78rem);color:var(--parch2);margin-top:.3rem;line-height:1.35;font-style:italic}
.fsl{font-family:'Cinzel',serif;font-size:.52rem;color:var(--steel);letter-spacing:.08em;margin-top:.5rem;border-top:1px solid var(--bd);padding-top:.4rem}

/* INPUT */
.niw{margin-top:1.2rem;display:flex;gap:.6rem;flex-wrap:wrap}
.ni{
  flex:1;min-width:160px;background:var(--bg2);border:1px solid var(--bd2);
  color:var(--parch);font-family:'Cinzel',serif;font-size:.9rem;
  padding:.7rem .9rem;outline:none;letter-spacing:.04em;transition:border-color .2s
}
.ni:focus{border-color:var(--gold)}
.ni::placeholder{color:var(--bd2)}

/* BUTTONS */
.btnp{
  background:var(--crim);border:1px solid var(--crim2);color:var(--gold);
  font-family:'Cinzel',serif;font-size:.75rem;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;
  padding:.7rem 1.2rem;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0
}
.btnp:hover{background:var(--crim2);border-color:var(--gold)}
.btnp:disabled{opacity:.4;cursor:not-allowed}
.btns{
  background:transparent;border:1px solid var(--bd2);color:var(--parch2);
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;
  padding:.55rem 1rem;cursor:pointer;transition:all .2s;display:block;margin-top:.8rem
}
.btns:hover{border-color:var(--gold);color:var(--gold)}

/* LOADING */
.lw{text-align:center;padding:2.5rem 1rem}
.skull{font-size:2.2rem;animation:ps 1.5s ease-in-out infinite;display:block;margin-bottom:.7rem}
@keyframes ps{0%,100%{opacity:.4;transform:scale(.95)}50%{opacity:1;transform:scale(1.05)}}
.ltxt{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;animation:fl 2s ease-in-out infinite;color:var(--parch2)}
@keyframes fl{0%,100%{opacity:1}50%{opacity:.55}}

/* NOTIF */
#narea{min-height:26px;display:flex;justify-content:center;gap:.4rem;flex-wrap:wrap;margin:.4rem 0;align-items:center}
.notif{display:inline-block;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.08em;padding:2px 6px;animation:fu 2.5s ease forwards}
.np{color:#5ccc5c;background:rgba(92,204,92,.1)}
.nn{color:#cc5c5c;background:rgba(204,92,92,.1)}
@keyframes fu{0%{opacity:0;transform:translateY(6px)}15%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateY(-6px)}}

/* ENDING */
.epanel{text-align:center;padding:.5rem}
.esym{font-size:2.8rem;margin-bottom:.8rem;display:block}
.etitle{font-family:'Cinzel Decorative',serif;font-size:clamp(1.1rem,4vw,1.4rem);color:var(--gold);margin-bottom:.7rem}
.etxt{font-style:italic;line-height:1.85;color:var(--parch);margin-bottom:1.2rem;font-size:clamp(.9rem,2.5vw,1rem)}

/* LORE */
.lq{font-style:italic;color:var(--parch2);font-size:.88rem;text-align:center;border-left:2px solid var(--crim);padding:.5rem .9rem;margin:1.2rem 0;line-height:1.6}

/* COUNTER */
.sc{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;color:var(--bd2);text-align:right;text-transform:uppercase;margin-bottom:.5rem}

/* BADGE */
.fbadge{display:inline-flex;align-items:center;gap:.5rem;background:var(--bg3);border:1px solid var(--bd2);padding:.35rem .7rem;font-family:'Cinzel',serif;font-size:.7rem;color:var(--gold);letter-spacing:.06em;margin-bottom:.9rem}
.intro-lore{font-style:italic;color:var(--parch2);line-height:1.85;font-size:.95rem;margin-bottom:1rem}

/* OUTCOME PREVIEW */
.cstat{font-size:.7rem;color:var(--parch2);margin-top:.3rem;font-family:'Cinzel',serif;letter-spacing:.05em}
.cstat span{margin-right:.4rem}
.cstat .pos{color:#7ccc7c}.cstat .neg{color:#cc7c7c}
</style>
</head>
<body>
<div id="app">
  <header class="hdr">
    <span class="aquila">☩</span>
    <h1 class="t-main">Warhammer 40,000</h1>
    <p class="t-sub">Chroniques de l'Imperium</p>
  </header>
  <main id="main"></main>
</div>

<script>
/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const S = {
  phase:'intro',faction:null,fdata:null,name:'',
  hp:100,res:100,honor:50,
  act:0,maxActs:6,
  usedScenes:[],
  choices:[]
};

/* ═══════════════════════════════════════
   FACTIONS
═══════════════════════════════════════ */
const FACTIONS=[
  {id:'marine',icon:'⚔️',name:'Space Marine',chapter:'Ultramarines',
   desc:'Champion de l\'Imperium, forgé dans l\'acier sacré',
   sl:'FORCE · ENDURANCE · HONNEUR',
   reslabel:'Munitions',startHonor:70,
   lore:'Un Astartes des Ultramarines, fils de Roboute Guilliman.'},
  {id:'inquisitor',icon:'👁',name:'Inquisiteur',chapter:'Ordo Hereticus',
   desc:'Chasseur d\'hérétiques, bras de la purification',
   sl:'RUSE · PSYCHÉ · AUTORITÉ',
   reslabel:'Énergie Psyker',startHonor:50,
   lore:'Mandaté par le Haut Capitulaire pour purifier trois secteurs.'},
  {id:'guard',icon:'🛡',name:'Garde Impérial',chapter:'8ème Cadian',
   desc:'Soldat mortel face à l\'ennemi immortel',
   sl:'COURAGE · SACRIFICE · NOMBRE',
   reslabel:'Ravitaillement',startHonor:50,
   lore:'Vétéran cadien, vingt campagnes au service du Trône Doré.'},
  {id:'techpriest',icon:'⚙️',name:'Prêtre-Technicien',chapter:'Adeptus Mechanicus',
   desc:'Serviteur du Dieu-Machine, quêteur de savoir perdu',
   sl:'LOGIQUE · OMNISSIAH · BIONIQUE',
   reslabel:'Énergie Mechadendrite',startHonor:40,
   lore:'Magos de Mars, en quête de technologie Perdue sur des mondes maudits.'},
  {id:'wolves',icon:'🐺',name:'Space Wolf',chapter:'Loups de Fenris',
   desc:'Guerrier barbare béni par la marque de Russ',
   sl:'FÉROCITÉ · CLAN · INSTINCT',
   reslabel:'Rage Bestiale',startHonor:60,
   lore:'Long Fang des Loups de Fenris, portant la cicatrice du Canis Helix.'},
  {id:'chaos',icon:'🌀',name:'Guerrier du Chaos',chapter:'Légion Renégate',
   desc:'Renégat glorifié par les Dieux de la Ruine',
   sl:'CORRUPTION · PUISSANCE · MALICE',
   reslabel:'Faveur Chaotique',startHonor:20,
   lore:'Astartes renégat, maudit et exalté par les Pouvoirs du Warp.'}
];

/* ═══════════════════════════════════════
   SCENARIO ENGINE
   Each scenario: id, tags (faction ids or 'all'), phase (early/mid/late/finale),
   title, narrative(state), choices[]
   Choice: text, tag, hp, res, honor, outcome (string appended after)
═══════════════════════════════════════ */
const SCENES=[

/* ══ EARLY (act 1-2) ══ */
{id:'tyranid_vanguard',tags:['marine','guard','wolves','all'],phase:'early',
 title:"L'Avant-garde de la Ruche",
 nar:s=>`Les capteurs détectent des biomorphes Tyranides en approche — des Gargouillers par milliers, précédant l'essaim principal. La ville de Port-Méridian brûle à l'horizon. ${s.name}, vos ordres ? Le Général Vorkan demande si vous tenez le pont ou repliez les civils.`,
 choices:[
  {text:"Tenir le pont coûte que coûte — aucun Tyranide ne passe.",tag:'COMBAT',hp:-30,res:-20,honor:+25,
   out:"Votre résistance brise la première vague. Des centaines de monstres meurent, mais la ligne est jonchée de morts. Le pont tient."},
  {text:"Installer des pièges et des mines puis se replier en bon ordre.",tag:'TACTIQUE',hp:-10,res:-25,honor:+10,
   out:"La retraite organisée permet de sauver des milliers de civils. La ville est perdue mais les troupes survivent pour le lendemain."},
  {text:"Sacrifier l'arrière-garde pour permettre l'évacuation totale.",tag:'SACRIFICE',hp:-20,res:-10,honor:+30,
   out:"L'arrière-garde meurt jusqu'au dernier. Leur sacrifice est inscrit dans les Annales de Guerre. Les civils sont sauvés."}
 ]},

{id:'chaos_altar',tags:['inquisitor','guard','marine','wolves'],phase:'early',
 title:"L'Autel de l'Abomination",
 nar:s=>`Une salle secrète découverte sous la cathédrale contient un autel dédié à Nurgle. Huit cultistes en prière ne vous ont pas encore vus. Des runes gravées dans le sol pulsent d'une lumière verdâtre maladive. ${s.name}, chaque seconde passée ici corrompt l'air.`,
 choices:[
  {text:"Ouvrir le feu immédiatement — purifier la salle par le bolter.",tag:'COMBAT',hp:-15,res:-20,honor:+20,
   out:"Les cultistes meurent avant d'avoir pu réagir. L'autel est profané mais des spores de Nurgle flottent dans l'air. Vous toussez du sang."},
  {text:"Observer et identifier leur rituel avant d'agir.",tag:'RUSE',hp:-5,res:-5,honor:+5,
   out:"Votre patience révèle le nom du démon qu'ils invoquent. Cette information sera précieuse contre l'Inquisition."},
  {text:"Appeler un Psyker pour sceller le site dans le Warp.",tag:'FOI',hp:-10,res:-30,honor:+15,
   out:"Le Psyker scelle le portail au prix de sa santé mentale. L'autel est neutralisé. Le sacrifice en valait-il la peine ?"}
 ]},

{id:'ork_waaagh',tags:['marine','guard','wolves'],phase:'early',
 title:"WAAAGH ! — La Marée Verte",
 nar:s=>`Des milliers d'Orks déferlent sur la plaine de Volkus IV en hurlant leur guerre sauvage. Leurs Squigs bondissent en avant tandis que les Kans d'Attaque pilonnent les positions fortifiées. ${s.name}, la vague verte sera là dans dix minutes.`,
 choices:[
  {text:"Charger dans un assaut en coin pour décapiter la hiérarchie Ork.",tag:'COMBAT',hp:-25,res:-15,honor:+20,
   out:"Vous tuez le Nob chef. Les Orks, privés de meneur, combattent entre eux. Le WAAAGH se désintègre dans la confusion."},
  {text:"Tenir la ligne défensive avec artillerie lourde.",tag:'TACTIQUE',hp:-15,res:-30,honor:+10,
   out:"L'artillerie décime les rangs ennemis. La défense tient, mais les munitions sont quasi épuisées pour la prochaine bataille."},
  {text:"Infiltrer le camp Ork et saboter les Kans d'Attaque.",tag:'RUSE',hp:-10,res:-15,honor:+15,
   out:"Sabotage réussi. Les Kans explosent dans leurs propres rangs. La confusion parmi les Orks est délicieuse à observer."}
 ]},

{id:'plague_village',tags:['all'],phase:'early',
 title:"Le Village de la Mort Silencieuse",
 nar:s=>`Un village de mille âmes est touché par une maladie inconnue. Certains survivants montrent des mutations — des nœuds de chair, des yeux supplémentaires. Ce n'est pas une maladie naturelle. La marque de Nurgle est présente. Vous avez deux heures avant que le Commissaire de zone n'ordonne la purge totale.`,
 choices:[
  {text:"Chercher des survivants sains et les évacuer avant la purge.",tag:'SACRIFICE',hp:-10,res:-20,honor:+20,
   out:"Vous sauvez cent vingt-trois personnes encore pures. Le reste brûle. Des visages hantent vos rêves."},
  {text:"Trouver la source de la contagion et la détruire.",tag:'EXPLORATION',hp:-20,res:-15,honor:+15,
   out:"Sous le puits du village : un artefact de Nurgle. Vous le brisez au prix d'une exposition aux miasmes. La maladie cesse."},
  {text:"Brûler le village immédiatement — la purge protège les autres.",tag:'COMBAT',hp:-5,res:-10,honor:-10,
   out:"Le village brûle en quelques minutes. Efficace. Brutal. Inquisition approuve. Mais votre honneur s'efface légèrement."}
 ]},

{id:'mechstrike',tags:['techpriest'],phase:'early',
 title:"Les Forges Maudites de Sigma-9",
 nar:s=>`La forge-station Sigma-9 ne répond plus depuis soixante-douze heures. En y entrant, ${s.name} découvre des Serviteurs errants, les yeux révulsés, attaquant le personnel. Un signal parasite corrompt leurs cortex-processeurs. L'Omnissiah est déshonoré.`,
 choices:[
  {text:"Émettre un signal de désactivation d'urgence — arrêter tous les Serviteurs.",tag:'LOGIQUE',hp:-5,res:-25,honor:+15,
   out:"Les Serviteurs s'éteignent. La forge est silencieuse. Vous retrouvez le nœud de corruption dans les conduits de données."},
  {text:"Combattre les Serviteurs corrompus un par un pour récupérer leurs données.",tag:'COMBAT',hp:-25,res:-15,honor:+10,
   out:"Combat brutal contre vos propres créations. Vos mechadendrites sont endommagées. Mais vous avez récupéré des données précieuses."},
  {text:"Identifier et supprimer le signal parasite à la source.",tag:'EXPLORATION',hp:-10,res:-20,honor:+20,
   out:"Dans le cœur de la forge, un Cogitator infecté par un virus Necron diffuse le signal. Vous le purgez. Sigma-9 est sauvée."}
 ]},

{id:'chaos_temptation',tags:['chaos'],phase:'early',
 title:"L'Appel de Tzeentch",
 nar:s=>`Un Herald de Tzeentch vous offre une vision : la carte de l'ennemi, tous ses plans dévoilés — mais en échange, vous devez ouvrir un Portail du Warp dans une ville Impériale peuplée. La tentation est réelle. Le pouvoir, immédiat.`,
 choices:[
  {text:"Accepter l'offre — le pouvoir prime sur tout.",tag:'HÉRÉSIE',hp:+10,res:+30,honor:-30,
   out:"Le Portail s'ouvre. Des démons se déversent sur la ville. Tzeentch rit. Vous avez la carte. Et leur sang sur les mains."},
  {text:"Refuser et attaquer le Herald.",tag:'COMBAT',hp:-20,res:-10,honor:+15,
   out:"Le Herald se dissout en tentacules de lumière avant de mourir. Votre résistance vous coûte cher, mais votre âme reste vôtre... pour l'instant."},
  {text:"Négocier un arrangement moins coûteux.",tag:'RUSE',hp:-5,res:+15,honor:-10,
   out:"Tzeentch aime les négociateurs. Il vous donne une information partielle. Quelque chose a été donné en échange — vous ne savez pas encore quoi."}
 ]},

/* ══ MID (act 3-4) ══ */
{id:'necron_tomb',tags:['all'],phase:'mid',
 title:"La Tombe qui ne Doit Pas S'Ouvrir",
 nar:s=>`Sous la surface de Khemris VII, une tombe Necron pulse d'énergie hyperchromatique. Les archéologues de l'Adeptus Mechanicus ont déclenché par mégarde le protocole d'éveil. Des Guerriers Immortels se dressent un par un dans la pénombre verte. ${s.name}, la tombe entière se réveille autour de vous.`,
 choices:[
  {text:"Foncer vers le Pylône Central pour déclencher le retour en dormance.",tag:'EXPLORATION',hp:-25,res:-20,honor:+20,
   out:"Vous atteignez le Pylône au prix de lourdes blessures. La tombe replonge en sommeil. Dans dix mille ans, ce sera le problème de quelqu'un d'autre."},
  {text:"Tenir une position défensive et appeler une frappe orbitale.",tag:'TACTIQUE',hp:-15,res:-30,honor:+10,
   out:"La frappe orbitale vitrifies l'entrée. Les Necrons sont scellés à l'intérieur. Pour l'instant. Le site est marqué sur toutes les cartes."},
  {text:"Voler la technologie Necron avant de fuir.",tag:'RUSE',hp:-10,res:+20,honor:-15,
   out:"Vous fuyez avec des artefacts Necron d'une valeur inestimable. L'Inquisition posera des questions. Beaucoup de questions."}
 ]},

{id:'tau_diplomat',tags:['marine','guard','inquisitor'],phase:'mid',
 title:"L'Ambassadeur du Tau",
 nar:s=>`Un Étherals Tau demande audience. Il offre une trêve locale : les Tau se retirent de trois secteurs en échange de la libération de prisonniers de guerre. C'est contraire à l'idéologie impériale — mais pragmatiquement, cela sauverait des dizaines de milliers de vies.`,
 choices:[

/* ═══════════════════════════════════════
   SCENE SELECTION
═══════════════════════════════════════ */
function pickScene(){
  const act = S.act;
  let phase;
  if(act<=2) phase='early';
  else if(act<=4) phase='mid';
  else if(act===5) phase='late';
  else phase='finale';

  const fid = S.faction;
  const compatible = SCENES.filter(sc=>{
    if(S.usedScenes.includes(sc.id)) return false;
    if(sc.phase!==phase) return false;
    if(sc.tags.includes('all')||sc.tags.includes(fid)) return true;
    return false;
  });
  // fallback: ignore faction filter
  const pool = compatible.length>0 ? compatible :
    SCENES.filter(sc=>sc.phase===phase&&!S.usedScenes.includes(sc.id));
  // ultimate fallback: any unused
  const final = pool.length>0 ? pool :
    SCENES.filter(sc=>!S.usedScenes.includes(sc.id));
  if(final.length===0) return SCENES[Math.floor(Math.random()*SCENES.length)];
  return final[Math.floor(Math.random()*final.length)];
}

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function $$(...args){return args.join('')}
function rand(a){return a[Math.floor(Math.random()*a.length)]}
function clamp(v,mn=0,mx=100){return Math.min(mx,Math.max(mn,v))}
function panel(inner){return`<div class="panel"><div class="c1"></div><div class="c2"></div><div class="c3"></div><div class="c4"></div>${inner}</div>`}
function div(icon='✦'){return`<div class="div"><span>${icon}</span></div>`}

function renderStats(){
  const f=S.fdata;
  const rl=f?f.reslabel:'Ressources';
  const hn=S.honor>60?'Gloire':S.honor>30?'Honneur':'Déchéance';
  return`<div id="sbar">
    <div class="sb"><span class="sl">Points de Vie</span><span class="sv">${S.hp}</span><div class="sbo"><div class="sbi bh" style="width:${S.hp}%"></div></div></div>
    <div class="sb"><span class="sl">${rl}</span><span class="sv">${S.res}</span><div class="sbo"><div class="sbi br" style="width:${S.res}%"></div></div></div>
    <div class="sb"><span class="sl">${hn}</span><span class="sv">${S.honor}</span><div class="sbo"><div class="sbi bn" style="width:${S.honor}%"></div></div></div>
  </div>`
}

function setMain(h){document.getElementById('main').innerHTML=h}

function statPreview(hp,res,hon){
  const parts=[];
  if(hp) parts.push(`<span class="${hp>0?'pos':'neg'}">${hp>0?'+':''}${hp} PV</span>`);
  if(res) parts.push(`<span class="${res>0?'pos':'neg'}">${res>0?'+':''}${res} RES</span>`);
  if(hon) parts.push(`<span class="${hon>0?'pos':'neg'}">${hon>0?'+':''}${hon} HON</span>`);
  return parts.length?`<div class="cstat">${parts.join('')}</div>`:'';
}

function startGame(){
  const nf=document.getElementById('nf');
  S.name=(nf?nf.value.trim():'')||rand(['Brother Aldric','Commissaire Vorh','Inquisiteur Kaelith','Magos 7-Delta','Vorn Ironfang','Kael le Maudit']);
  S.act=0;S.usedScenes=[];S.hp=100;S.res=100;S.honor=S.fdata.startHonor;
  S.phase='game';
  nextScene(null,null);
}

/* ═══════════════════════════════════════
   SCENE FLOW
═══════════════════════════════════════ */
function nextScene(choiceText, deltas){
  // Apply deltas
  if(deltas){
    S.hp=clamp(S.hp+(deltas.hp||0));
    S.res=clamp(S.res+(deltas.res||0));
    S.honor=clamp(S.honor+(deltas.honor||0));
    if(S.hp<=0){renderDeath();return;}
  }
  S.act++;
  if(S.act>S.maxActs){renderEnding(null);return;}

  const scene=pickScene();
  S.usedScenes.push(scene.id);
  S.currentScene=scene;
  renderScene(scene,deltas);
}

function renderScene(scene,prevDeltas){
  const isLast=S.act>=S.maxActs;
  const actLabel=`ACTE ${S.act} / ${S.maxActs} — ${S.name} · ${S.fdata.name}`;

  // Notif deltas
  let notifHTML='';
  if(prevDeltas){
    const parts=[];
    if(prevDeltas.hp) parts.push(`<span class="notif ${prevDeltas.hp>0?'np':'nn'}">${prevDeltas.hp>0?'+':''}${prevDeltas.hp} PV</span>`);
    if(prevDeltas.res) parts.push(`<span class="notif ${prevDeltas.res>0?'np':'nn'}">${prevDeltas.res>0?'+':''}${prevDeltas.res} RES</span>`);
    if(prevDeltas.honor) parts.push(`<span class="notif ${prevDeltas.honor>0?'np':'nn'}">${prevDeltas.honor>0?'+':''}${prevDeltas.honor} HON</span>`);
    notifHTML=`<div id="narea">${parts.join('')}</div>`;
  } else notifHTML=`<div id="narea"></div>`;

  const choices=(scene.choices||[]).map((c,i)=>`
    <button class="cbtn" onclick="pickChoice(${i})">
      <span class="ctag">[${c.tag}]</span>${c.text}
      ${statPreview(c.hp,c.res,c.honor)}
    </button>`).join('');

  setMain(`
    ${renderStats()}
    ${notifHTML}
    ${panel(`
      <div class="sc">${actLabel}</div>
      <div id="stitle">${scene.title}</div>
      ${div('✦')}
      <div id="nbox"><span id="ntxt"></span><span class="tcur"></span></div>
      <div id="carea" style="opacity:0;pointer-events:none;margin-top:1.5rem">${choices}</div>
      ${isLast?'<p style="font-family:Cinzel,serif;font-size:.6rem;letter-spacing:.18em;color:var(--blood);text-align:center;margin-top:.8rem">⚔ CONFRONTATION FINALE ⚔</p>':''}
    `)}
  `);

  const narrative=typeof scene.nar==='function'?scene.nar(S):scene.nar;
  typeText(narrative,()=>{
    document.querySelector('.tcur')?.remove();
    const ca=document.getElementById('carea');
    if(ca){ca.style.opacity='1';ca.style.pointerEvents='';}
  });
}

function pickChoice(idx){
  const scene=S.currentScene;
  const c=scene.choices[idx];
  if(!c)return;
  document.querySelectorAll('.cbtn').forEach(b=>b.disabled=true);

  // Show outcome briefly then advance
  const nbox=document.getElementById('nbox');
  if(nbox){
    const ca=document.getElementById('carea');
    if(ca) ca.style.opacity='0';
    nbox.innerHTML=`<em style="color:var(--parch2)">${c.out}</em>`;
  }

  setTimeout(()=>{
    nextScene(`Choix: ${c.text}`,{hp:c.hp||0,res:c.res||0,honor:c.honor||0});
  },2200);
}

function typeText(text,onDone,speed=14){
  const el=document.getElementById('ntxt');
  if(!el){onDone&&onDone();return;}
  let i=0;el.textContent='';
  // Skip animation for long texts on mobile
  const skip=text.length>500;
  if(skip){el.textContent=text;onDone&&onDone();return;}
  const iv=setInterval(()=>{
    if(i<text.length){el.textContent+=text[i++];}
    else{clearInterval(iv);onDone&&onDone();}
  },speed);
}

/* ═══════════════════════════════════════
   ENDINGS
═══════════════════════════════════════ */
function renderEnding(){
  const h=S.honor;
  let sym,title,txt;
  if(h>=70){
    sym='☩';title='Gloire Éternelle pour l\'Emperor';
    txt=`${S.name} entre dans la légende de l'Imperium. Ses exploits seront gravés dans les Annales de Guerre, chantés par des milliers de bardes sur des milliers de mondes. Un Saint de Bataille, un héros véritable. L'Emperor lui-même reconnaîtrait sa valeur.`;
  } else if(h>=45){
    sym='⚔️';title='Devoir Accompli';
    txt=`La mission est terminée. ${S.name} a servi l'Imperium avec honneur — ni saint ni démon, simplement un guerrier dans un univers impitoyable. L'Emperor approuve. Et c'est suffisant.`;
  } else if(h>=20){
    sym='💀';title='Le Prix de la Survie';
    txt=`${S.name} a survécu. Mais à quel prix ? Les choix faits dans l'ombre pèsent désormais sur l'âme. Les Inquisiteurs murmureront. La corruption ronge lentement ce qui reste d'honneur. L'Emperor voit tout.`;
  } else {
    sym='🌀';title='L\'Hérésie Consumée';
    txt=`L'âme de ${S.name} appartient aux Dieux du Chaos. Ce qui fut autrefois un guerrier de l'Imperium est désormais un outil de la Ruine Éternelle. Les Dieux rient. Et quelque part, très loin, l'Emperor pleure.`;
  }

  const scoreLabel=h>=70?'Légendaire':h>=45?'Honorable':h>=20?'Compromis':'Damné';

  setMain(`
    ${renderStats()}
    ${panel(`
      <div class="epanel">
        <span class="esym">${sym}</span>
        <div class="etitle">${title}</div>
        ${div()}
        <p class="etxt">${txt}</p>
        <p style="font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.18em;color:var(--parch2);margin-bottom:1.2rem">
          HONNEUR FINAL: ${h}/100 — ${scoreLabel}
        </p>
        <button class="btnp" onclick="restartSame()" style="margin:0 auto .7rem;display:block">↻ REJOUER (même faction)</button>
        <button class="btns" onclick="showIntro()" style="margin:0 auto">← Changer de Faction</button>
      </div>
    `)}
  `);
}

function renderDeath(){
  setMain(`
    ${panel(`
      <div class="epanel">
        <span class="esym" style="color:var(--blood)">💀</span>
        <div class="etitle" style="color:var(--blood)">Mort pour l'Emperor</div>
        ${div()}
        <p class="etxt">${S.name} est tombé au combat. Le corps revient à la poussière. L'âme, si elle était pure, rejoindra peut-être les légions éternelles de l'Emperor. L'Imperium pleure ses martyrs — puis avance.</p>
        <div class="lq" style="margin-bottom:1.2rem">« Pour mourir dans la gloire de l'Emperor est le plus grand honneur qui soit. »</div>
        <button class="btnp" onclick="restartSame()" style="margin:0 auto .7rem;display:block">↻ RECOMMENCER</button>
        <button class="btns" onclick="showIntro()" style="margin:0 auto">← Changer de Faction</button>
      </div>
    `)}
  `);
}

function restartSame(){
  S.act=0;S.usedScenes=[];S.hp=100;S.res=100;S.honor=S.fdata.startHonor;
  S.phase='game';
  nextScene(null,null);
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
showIntro();
</script>
</body>
</html>
